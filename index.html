  }

  async function ensureBookFilesLoaded(book) {
    if (!book || !book.basePath) {
      return;
    }
    const bookJsonPath = `${book.basePath}/book.json`;
    const dataJsonPath = `${book.basePath}/data.json`;
    const appHtmlPath = `${book.basePath}/app.html`;
    const hasBookFiles =
      getFileFromMap(bookJsonPath) ||
      getFileFromMap(dataJsonPath) ||
      getFileFromMap(appHtmlPath);
    const includeMedia = book.format !== "structured";
    if (state.directoryHandle) {
      if (!hasBookFiles) {
        await buildFileMapForBookFromDirectoryHandle(book.basePath, { includeMedia });
      }
      return;
    }
    if (state.fileEntries.length) {
      buildFileMapForBookFromSelection(book.basePath, { includeMedia });
      return;
    }
    if (hasBookFiles) {
      return;
    }
  }

  async function buildFileMapForBookFromDirectoryHandle(basePath, options = {}) {
    if (!state.directoryHandle || !basePath) {
      return;
    }
    const includeMedia = options.includeMedia !== false;
    const append = options.append === true;
    const mediaOnly = options.mediaOnly === true;
    const root = state.rootFolder || "";
    const parts = basePath.split("/").filter(Boolean);
    const relativeParts =
      root && parts[0] === root ? parts.slice(1) : parts.slice();
    let dirHandle = state.directoryHandle;
    for (const part of relativeParts) {
      dirHandle = await dirHandle.getDirectoryHandle(part);
    }
    if (!append) {
      clearFileMapCaches();
    }
    const walk = async (handle, prefixParts) => {
      for await (const entry of handle.values()) {
        if (entry.kind === "file") {
          const file = await entry.getFile();
          const path = prefixParts.concat(entry.name).join("/");
          registerFile(path, file);
        } else if (entry.kind === "directory") {
          const nextParts = prefixParts.concat(entry.name);
          if (!includeMedia) {
            const joined = nextParts.join("/").toLowerCase();
            if (joined.includes("/content/media")) {
              continue;
            }
          }
          await walk(entry, nextParts);
        }
      }
    };
    if (mediaOnly) {
      const contentDir = await getDirectoryHandleSafe(dirHandle, "content");
      const mediaDir = await getDirectoryHandleSafe(contentDir, "media");
      if (!mediaDir) {
        return;
      }
      await walk(mediaDir, [basePath, "content", "media"]);
      return;
    }
    await walk(dirHandle, [basePath]);
  }

  async function getDirectoryHandleForBasePath(basePath) {
    if (!state.directoryHandle || !basePath) {
      return null;
    }
    const root = state.rootFolder || "";
    const parts = basePath.split("/").filter(Boolean);
    const relativeParts =
      root && parts[0] === root ? parts.slice(1) : parts.slice();
    let dirHandle = state.directoryHandle;
    try {
      for (const part of relativeParts) {
        dirHandle = await dirHandle.getDirectoryHandle(part);
      }
      return dirHandle;
    } catch (error) {
      return null;
    }
  }

  function buildFileMapForBookFromSelection(basePath, options = {}) {
    if (!basePath || !state.fileEntries.length) {
      return;
    }
    const includeMedia = options.includeMedia !== false;
    state.fileMap.clear();
    state.fileMapLower.clear();
    const prefix = basePath.replace(REGEX.trailingSlash, "") + "/";
    state.fileEntries.forEach(({ path, file }) => {
      if (path === basePath || path.startsWith(prefix)) {
        if (!includeMedia && path.toLowerCase().includes("/content/media/")) {
          return;
        }
        registerFile(path, file);
      }
    });
  }

  async function readJsonFromMap(path) {
    const file = getFileFromMap(path);
    if (!file) {
      return null;
    }
    try {
      const text = await file.text();
      return JSON.parse(text);
    } catch (error) {
      return null;
    }
  }

  function clearFileCache() {
    if (typeof state.pageTransitionCleanup === "function") {
      state.pageTransitionCleanup();
    }
    clearPageSwipePreview();
    state.pageTurnScrollLock = 0;
    document.body.classList.remove("page-turn-no-scroll");
    if (els.viewer) {
      els.viewer.classList.remove("hide-scrollbar");
    }
    state.pageSwipe.active = false;
    state.pageSwipe.pointerId = null;
    clearFileMapCaches();
    state.rootFolder = "";
    state.hasRelativePaths = false;
    state.lastSelectionSignature = "";
    state.fileEntries = [];
    state.bookMetaCache.clear();
    state.structuredIndexLoad = null;
    state.structuredIndex = null;
    state.structuredIndexPromise = null;
    state.structuredIndexByOriginal = null;
    state.structuredMaterials = null;
    state.structuredAppMaterials = null;
    state.structuredAppMaterialsPromise = null;
    state.structuredTocIndex = null;
    state.structuredBookConfigIndex = null;
    state.structuredDefaultTitleReplacements = [];
    state.structuredTocPromise = null;
    state.pageTransitionCleanup = null;
    state.pageBase = 1;
    state.bookFormat = "legacy";
    state.appHtmlCache = null;
    state.appHtmlCacheBasePath = "";
  }

  function clearFileMapCaches() {
    state.fileMap.clear();
    state.fileMapLower.clear();
    state.fileUrlCache.forEach((url) => URL.revokeObjectURL(url));
    state.fileUrlCache.clear();
  }

  function normalizeFilePath(value) {
    let path = String(value || "");
    path = path.replace(new RegExp("\\\\", "g"), "/");
    path = path.replace(REGEX.fileProtocol, "");
    path = path.replace(REGEX.leadingSlashes, "");
    path = path.replace(REGEX.leadingDotSlash, "");
    return path;
  }

  function isStructuredPageRequest(path) {
    const lower = normalizeFilePath(path).toLowerCase();
    return lower.includes("/content/pages/page_") && isStructuredScaleImagePath(lower);
  }

  function isMediaPath(path) {
    return String(path || "").toLowerCase().includes("/content/media/");
  }

  function hasMediaFilesInMap() {
    for (const lowerKey of state.fileMapLower.keys()) {
      if (lowerKey.includes("/content/media/")) {
        return true;
      }
    }
    return false;
  }

  function getBookContainerFromPath(path) {
    const normalized = normalizeFilePath(path);
    const parts = normalized.split("/").filter(Boolean);
    if (!parts.length) {
      return "";
    }
    if (state.rootFolder && parts[0] === state.rootFolder) {
      if (parts.length === 1) {
        return parts[0];
      }
      const next = parts[1];
      if (next === "content" || next === "pages") {
        return parts[0];
      }
      return next;
    }
    return parts[0];
  }

  function registerFile(path, file) {
    state.fileMap.set(path, file);
    state.fileMapLower.set(path.toLowerCase(), path);
  }

  function getFileFromMap(path, options = {}) {
    const key = normalizeFilePath(path);
    if (!key) {
      return null;
    }
    const allowMedia = options.allowMedia === true;
    const isStructuredPage = isStructuredPageRequest(key);
    if (state.fileMap.has(key)) {
      if (!allowMedia && isStructuredPage && isMediaPath(key)) {
        return null;
      }
      return state.fileMap.get(key);
    }
    const lower = key.toLowerCase();
    const actual = state.fileMapLower.get(lower);
    if (actual) {
      if (!allowMedia && isStructuredPage && isMediaPath(actual)) {
        return null;
      }
      return state.fileMap.get(actual);
    }
    return findFileBySuffix(lower, { allowMedia, isStructuredPage });
  }

  function getFileFromEntries(path, options = {}) {
    const key = normalizeFilePath(path);
    if (!key || !state.fileEntries.length) {
      return null;
    }
    const allowMedia = options.allowMedia === true;
    const isStructuredPage = isStructuredPageRequest(key);
    const lower = key.toLowerCase();
    for (const entry of state.fileEntries) {
      if (entry.lower === lower) {
        if (!allowMedia && isStructuredPage && isMediaPath(entry.lower)) {
          continue;
        }
        return entry.file;
      }
    }
    const parts = lower.split("/");
    const suffix = parts.slice(-3).join("/");
    if (!suffix) {
      return null;
    }
    for (const entry of state.fileEntries) {
      if (entry.lower.endsWith(suffix)) {
        if (!allowMedia && isStructuredPage && isMediaPath(entry.lower)) {
          continue;
        }
        return entry.file;
      }
    }
    return null;
  }

  function findFileBySuffix(lowerPath, options = {}) {
    if (!lowerPath) {
      return null;
    }
    const allowMedia = options.allowMedia === true;
    const isStructuredPage = options.isStructuredPage === true;
    const parts = lowerPath.split("/");
    const suffix = parts.slice(-3).join("/");
    if (!suffix) {
      return null;
    }
    for (const [lowerKey, actualKey] of state.fileMapLower.entries()) {
      if (lowerKey.endsWith(suffix)) {
        if (!allowMedia && isStructuredPage && isMediaPath(lowerKey)) {
          continue;
        }
        return state.fileMap.get(actualKey);
      }
    }
    return null;

  function extractProduktTitle(text, basePath = "") {

    try {

  function cleanDisplayTitle(value) {
    let text = String(value || "");
    text = text.replace(/\bKlassen\b/gi, "Klasse");
    text = text.replace(/[.-]+/g, " ");
    const suffixes = [];
    text = text.replace(/\b(GK|LK)\b/gi, (match) => {
      const token = match.toUpperCase();
      if (!suffixes.includes(token)) {
        suffixes.push(token);
      }
      return "";
    });
    text = text
      .replace(/\s{2,}/g, " ")
      .replace(/\s+([,;:])/, "$1")
      .replace(/^[,;:–-]+|[,;:–-]+$/g, "")
      .trim();
    if (suffixes.length) {
      text = `${text}${text ? " " : ""}${suffixes.join(" ")}`;
    }
    return text.trim();
  }

  function getSpecialTitleForBasePath(basePath) {

  function getStructuredTitleReplacementsForBasePath(basePath) {
    const replacements = [];
    if (
      Array.isArray(state.structuredDefaultTitleReplacements) &&
      state.structuredDefaultTitleReplacements.length
    ) {
      replacements.push(...state.structuredDefaultTitleReplacements);
    }
    const config = getStructuredBookConfigForBasePath(basePath);
    if (config && Array.isArray(config.titleReplacements) && config.titleReplacements.length) {
      replacements.push(...config.titleReplacements);

    return replacements;
  }

  function applyStructuredTitleReplacements(value, basePath) {
    const replacements = getStructuredTitleReplacementsForBasePath(basePath);
    if (!replacements.length) {
      return value;
    }
    let text = String(value || "");
    replacements.forEach((entry) => {
      if (!entry || typeof entry !== "object") {
        return;
      }
      const findText = String(entry.find || "").trim();
      if (!findText) {
        return;
      }
      const replaceText = String(entry.replace || "");
      const pattern = new RegExp(`\\b${escapeRegExp(findText)}\\b`, "gi");
      text = text.replace(pattern, () => replaceText);
    });
    return text;
  }

  function normalizeBookTitleForBasePath(value, basePath = "") {
    const replaced = applyStructuredTitleReplacements(value, basePath);
    return cleanDisplayTitle(replaced);
  }

  function cleanStructuredSubtitle(text, basePath = "") {
    let value = String(text || "");
    if (!value) {
      return "";
    }
    ["Ausgabe", "G9", "G8"].forEach((token) => {
      const regex = new RegExp(`\\b${escapeRegExp(token)}\\b`, "gi");
      value = value.replace(regex, "");
    });
    [
      /\/\s*erh\u00f6htes Anforderungsniveau/gi,
      /\/\s*grundlegendes Anforderungsniveau/gi,
      /\bab\s*\d{4}\b/gi,
    ].forEach((pattern) => {
      value = value.replace(pattern, "");
    });
    if (/\bKlassen?\s*12\s*\/\s*13\b/gi.test(value)) {
      value = value.replace(/\bQualifikationsphase\b/gi, "");
    }
    if (/\bKlassen?\s*11\b/gi.test(value)) {
      value = value.replace(/\bEinführungsphase\b/gi, "");
    }
    value = value
      .replace(/\bGrundkurs\b/gi, "GK")
      .replace(/\bLeistungskurs\b/gi, "LK")
      .replace(/\bNiedersachsen\b/gi, "Nds")
      .replace(/\bNordrhein-Westfalen\b/gi, "NRW");
    value = applyStructuredTitleReplacements(value, basePath);
    const numberMatches = [];
    const numberRegex = /\b\d+\b/g;
    let numberMatch = numberRegex.exec(value);
    while (numberMatch) {
      numberMatches.push({
        number: numberMatch[0],
        index: numberMatch.index,
        length: numberMatch[0].length,
      });
      numberMatch = numberRegex.exec(value);
    }
    if (numberMatches.length > 1) {
      const counts = new Map();
      numberMatches.forEach((entry) => {
        counts.set(entry.number, (counts.get(entry.number) || 0) + 1);
      });
      const removals = [];
      const seen = new Set();
      numberMatches.forEach((entry) => {
        if (seen.has(entry.number)) {
          return;
        }
        seen.add(entry.number);
        if ((counts.get(entry.number) || 0) > 1) {
          removals.push(entry);
        }
      });
      if (removals.length) {
        removals
          .sort((a, b) => b.index - a.index)
          .forEach((entry) => {
            value = value.slice(0, entry.index) + value.slice(entry.index + entry.length);
          });
      }
    }
    return cleanDisplayTitle(value);
  }

  function normalizeStructuredTitleReplacements(value) {
    const normalized = [];
    const pushEntry = (findValue, replaceValue) => {
      const findText = String(findValue == null ? "" : findValue).trim();
      if (!findText) {
        return;
      }
      normalized.push({
        find: findText,
        replace: replaceValue == null ? "" : String(replaceValue),
      });
    };
    if (Array.isArray(value)) {
      value.forEach((entry) => {
        if (!entry) {
          return;
        }
        if (typeof entry === "string") {
          pushEntry(entry, "");
          return;
        }
        if (typeof entry !== "object") {
          return;
        }
        const findValue =
          entry.find ?? entry.match ?? entry.from ?? entry.source ?? entry.search ?? "";
        const replaceValue =
          entry.replace ?? entry.replacement ?? entry.to ?? entry.target ?? "";
        pushEntry(findValue, replaceValue);
      });
    } else if (value && typeof value === "object") {
      Object.entries(value).forEach(([findText, replaceText]) => {
        pushEntry(findText, replaceText);
      });
    }
    return normalized;
  }

  function normalizeStructuredBookConfig(book) {
    if (!book || typeof book !== "object") {
      return null;

    const config = {};
    const rawTitle =
      typeof book.special_title === "string"
        ? book.special_title
        : typeof book.specialTitle === "string"
        ? book.specialTitle
        : typeof book.title_override === "string"
        ? book.title_override
        : typeof book.titleOverride === "string"
        ? book.titleOverride
        : "";
    const specialTitle = cleanDisplayTitle(String(rawTitle || "").trim());
    if (specialTitle) {
      config.specialTitle = specialTitle;
    }
    const rawArabicStart =
      book.zero_based_arabic_start ??
      book.zeroBasedArabicStart ??
      book.arabic_start ??
      book.arabicStart;
    if (rawArabicStart !== undefined && rawArabicStart !== null && rawArabicStart !== "") {
      const parsed = Number(rawArabicStart);
      if (Number.isFinite(parsed) && parsed >= 1) {
        config.zeroBasedArabicStart = Math.round(parsed);
      }
    }
    const titleReplacements = normalizeStructuredTitleReplacements(
      book.title_replacements ?? book.titleReplacements
    );
    if (titleReplacements.length) {
      config.titleReplacements = titleReplacements;

    return Object.keys(config).length ? config : null;

  function getStructuredBookConfigForBasePath(basePath) {

  function normalizeStructuredTocItems(items) {
    if (!Array.isArray(items)) {
      return [];
    }
    const normalized = [];
    items.forEach((item) => {
      if (!item || typeof item !== "object") {
        return;
      }
      const entry = {};
      const rawTitle =
        typeof item.title === "string" ? item.title : item.title != null ? String(item.title) : "";
      const rawNumber =
        item.number !== undefined && item.number !== null && item.number !== ""
          ? String(item.number)
          : "";
      const rawSubtitle =
        typeof item.subtitle === "string"
          ? item.subtitle
          : item.subtitle != null
          ? String(item.subtitle)
          : "";
      let titleText = rawTitle.trim();
      if (rawNumber) {
        titleText = titleText ? `${rawNumber} ${titleText}` : rawNumber;
      }
      const subtitleText = rawSubtitle.trim();
      if (subtitleText) {
        titleText = titleText ? `${titleText} – ${subtitleText}` : subtitleText;
      }
      if (titleText) {
        entry.title = titleText;
      }
      if (item.label !== undefined && item.label !== null && item.label !== "") {
        entry.label = String(item.label);
      }
      if (item.page !== undefined && item.page !== null && item.page !== "") {
        const pageNum = Number(item.page);
        entry.page = Number.isFinite(pageNum) ? pageNum : item.page;
      }
      if (Array.isArray(item.children) && item.children.length) {
        const children = normalizeStructuredTocItems(item.children);
        if (children.length) {
          entry.children = children;
        }
      }
      normalized.push(entry);
    });
    return normalized;
  }

  function getMinTocPage(items) {
    let min = null;
    const visit = (list) => {
      list.forEach((item) => {
        if (item && item.page !== undefined && item.page !== null && item.page !== "") {
          const value = Number(item.page);
          if (Number.isFinite(value)) {
            if (min === null || value < min) {
              min = value;
            }
          }
        }
        if (item && Array.isArray(item.children) && item.children.length) {
          visit(item.children);
        }
      });
    };
    if (Array.isArray(items)) {
      visit(items);
    }
    return min;
  }

  function hasTocTitle(items, title) {
    if (!Array.isArray(items) || !title) {
      return false;
    }
    const target = String(title).trim().toLowerCase();
    let found = false;
    const visit = (list) => {
      for (const item of list) {
        if (!item) {
          continue;
        }
        const itemTitle = String(item.title || "").trim().toLowerCase();
        if (itemTitle === target) {
          found = true;
          return;
        }
        if (Array.isArray(item.children) && item.children.length) {
          visit(item.children);
          if (found) {
            return;
          }
        }
      }
    };
    visit(items);
    return found;
  }

  function addInhaltsverzeichnisEntry(items, offset) {
    if (!Array.isArray(items) || !items.length) {
      return items;
    }
    if (hasTocTitle(items, "Inhaltsverzeichnis")) {
      return items;
    }
    const minPage = getMinTocPage(items);
    if (!Number.isFinite(minPage)) {
      return items;
    }
    const distance = Number.isFinite(offset) ? offset : 2;
    const page = Math.max(1, Math.round(minPage - distance));
    const entry = { title: "Inhaltsverzeichnis", page };
    return [entry].concat(items);
  }

  function buildStructuredTocIndex(data) {
    const index = new Map();
    if (!data || !Array.isArray(data.books)) {
      return index;
    }
    data.books.forEach((book) => {
      if (!book || typeof book !== "object") {
        return;
      }
      const id = normalizeStructuredBookId(book.book_id || book.bookId || book.id || "");
      if (!id) {
        return;
      }
      const toc = normalizeStructuredTocItems(book.toc);
      const enriched = addInhaltsverzeichnisEntry(toc, 2);
      if (enriched.length) {
        index.set(id, enriched);
      }
    });
    return index;
  }

  function buildStructuredBookConfigIndex(data) {

  async function readStructuredTocJsonFromSelection() {
    if (!state.fileEntries || !state.fileEntries.length) {
      return null;

    const root = String(state.rootFolder || "").toLowerCase();
    const preferred = root ? `${root}/tocs.json` : "";
    let match = null;
    for (const entry of state.fileEntries) {
      if (!entry || !entry.lower) {
        continue;
      }
      if (preferred && entry.lower === preferred) {
        match = entry;
        break;
      }
      if (
        !match &&
        (
          entry.lower === "tocs.json" ||
          entry.lower.endsWith("/tocs.json")
        )
      ) {
        match = entry;
      }
    }
    if (!match || !match.file) {
      return null;
    }
    try {
      const text = await match.file.text();
      return JSON.parse(text);
    } catch (error) {
      return null;
    }
  }

  async function ensureStructuredTocIndex() {
    if (state.structuredTocIndex) {
      return state.structuredTocIndex;
    }
    if (state.structuredTocPromise) {
      return state.structuredTocPromise;
    }
    state.structuredTocPromise = (async () => {
      let data = null;
      if (state.directoryHandle) {
        data = await readStructuredTocJsonFromDirectoryHandle();
      } else if (state.fileEntries && state.fileEntries.length) {
        data = await readStructuredTocJsonFromSelection();
      }
      state.structuredDefaultTitleReplacements = normalizeStructuredTitleReplacements(
        data && typeof data === "object"
          ? data.title_replacements ?? data.titleReplacements
          : null
      );
      state.structuredTocIndex = buildStructuredTocIndex(data);
      state.structuredBookConfigIndex = buildStructuredBookConfigIndex(data);
      return state.structuredTocIndex;
    })().finally(() => {
      state.structuredTocPromise = null;
    });
    return state.structuredTocPromise;
  }

  async function getStructuredTocForBasePath(basePath) {
    const index = await ensureStructuredTocIndex();
    if (!index || !index.size) {
      return null;

    const id = getStructuredBookIdForBasePath(basePath);
    if (!id) {

    const toc = index.get(id);
    return Array.isArray(toc) && toc.length ? toc : null;
  }

  function buildStructuredSearchIndex(pages) {
    const results = [];
    pages.forEach((entry, index) => {
      const content = entry && entry.content ? entry.content : null;
      const text = content && content.text ? String(content.text) : "";
      if (!text) {
        return;
      }
      const page = parseStructuredPageNumber(content && content.wordPositionSvg, index);
      results.push({ page, search: text });
    });
    return results;
  }

  function buildStructuredTocFromPages(pages) {
    if (!Array.isArray(pages)) {
      return [];
    }
    const candidates = [];
    pages.forEach((entry, index) => {
      if (!entry || !entry.content || !entry.content.text) {
        return;
      }
      const rawText = normalizeStructuredTocText(entry.content.text);
      if (!rawText) {
        return;
      }
      const hasInhaltsverzeichnis = containsWord(rawText, "inhaltsverzeichnis");
      const hasInhalt = !hasInhaltsverzeichnis && containsWord(rawText, "inhalt");
      const hasPageNumbers = hasLikelyPageNumberPattern(rawText);
      const areas = collectStructuredTocAreas(entry);
      if (
        (hasInhaltsverzeichnis && (areas.length >= 4 || hasPageNumbers)) ||
        (hasInhalt && areas.length >= 4)
      ) {
        candidates.push({
          index,
          text: rawText,
          areas,
        });
      }
    });
    if (!candidates.length) {
      return [];
    }
    candidates.sort((a, b) => a.index - b.index);
    const filtered = filterTocCandidates(candidates);
    const toc = [];
    filtered.forEach((candidate) => {
      const entries = buildStructuredTocEntries(candidate.text, candidate.areas);
      if (entries.length >= 2) {
        toc.push(...entries);
      }
    });
    if (!toc.length && filtered.length !== candidates.length) {
      candidates.forEach((candidate) => {
        const entries = buildStructuredTocEntries(candidate.text, candidate.areas);
        if (entries.length >= 2) {
          toc.push(...entries);
        }
      });
    }
    return toc;
  }

  function buildStructuredTocFromAppHtml(appHtml) {
    const raw = String(appHtml || "");
    if (!raw) {
      return [];
    }
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(raw, "text/html");
      const pages = Array.from(doc.querySelectorAll(".page"));
      const candidates = [];
      pages.forEach((pageEl, index) => {
        const textNode = pageEl.querySelector(".searchable .text");
        const text = textNode ? normalizeStructuredTocText(textNode.textContent) : "";
        if (!text) {
          return;
        }
        const hasInhaltsverzeichnis = containsWord(text, "inhaltsverzeichnis");
        const hasInhalt = !hasInhaltsverzeichnis && containsWord(text, "inhalt");
        const hasPageNumbers = hasLikelyPageNumberPattern(text);
        const anchors = Array.from(
          pageEl.querySelectorAll("a[href*='?page='], a[href*='#page=']")
        );
        const areas = anchors
          .map((anchor) => {
            const page = parseStructuredPageFromUrl(anchor.getAttribute("href"));
            if (!Number.isFinite(page)) {
              return null;
            }
            const style = anchor.getAttribute("style") || "";
            const x = parseStyleNumber(style, "left");
            const y = parseStyleNumber(style, "top");
            return {
              page,
              x: Number.isFinite(x) ? x : 0,
              y: Number.isFinite(y) ? y : 0,
            };
          })
          .filter(Boolean);
        areas.sort((a, b) => (a.x !== b.x ? a.x - b.x : a.y - b.y));
        if (
          (hasInhaltsverzeichnis && (areas.length >= 4 || hasPageNumbers)) ||
          (hasInhalt && areas.length >= 4)
        ) {
          candidates.push({
            index,
            text,
            areas,
          });
        }
      });
      if (!candidates.length) {
        return [];
      }
      candidates.sort((a, b) => a.index - b.index);
      const filtered = filterTocCandidates(candidates);
      const toc = [];
      filtered.forEach((candidate) => {
        const entries = buildStructuredTocEntries(candidate.text, candidate.areas);
        if (entries.length >= 2) {
          toc.push(...entries);
        }
      });
      if (!toc.length && filtered.length !== candidates.length) {
        candidates.forEach((candidate) => {
          const entries = buildStructuredTocEntries(candidate.text, candidate.areas);
          if (entries.length >= 2) {
            toc.push(...entries);
          }
        });
      }
      return toc;
    } catch (error) {
      return [];
    }
  }

  function buildStructuredTocEntries(text, areas) {
    const fromNumbers = buildStructuredTocEntriesFromNumberedText(text);
    if (fromNumbers.length >= 2) {
      return fromNumbers;
    }
    if (!Array.isArray(areas) || areas.length === 0) {
      return [];
    }
    const labels = extractStructuredTocLabelsFromText(text, areas.length);
    return areas.map((area, index) => {
      const title = labels[index] ? labels[index] : `Seite ${area.page}`;
      const item = { title, page: area.page };
      if (labels[index]) {
        item.label = String(area.page);
      }
      return item;
    });
  }

  function normalizeStructuredTocText(text) {
    return String(text || "").replace(/\s+/g, " ").trim();
  }

  function filterTocCandidates(candidates) {
    if (!Array.isArray(candidates) || candidates.length === 0) {
      return [];
    }
    const firstIndex = candidates[0].index;
    const maxIndex = firstIndex + 8;
    return candidates.filter((candidate) => candidate.index <= maxIndex);
  }

  function containsWord(text, word) {
    const raw = String(text || "");
    if (!raw || !word) {
      return false;
    }
    const boundary = "(^|[^0-9A-Za-zÄÖÜäöüß])";
    const endBoundary = "($|[^0-9A-Za-zÄÖÜäöüß])";
    const regex = new RegExp(`${boundary}${escapeRegExp(word)}${endBoundary}`, "i");
    return regex.test(raw);
  }

  function hasLikelyPageNumberPattern(text) {
    const raw = normalizeStructuredTocText(text);
    if (!raw) {
      return false;
    }
    const pairMatches = raw.match(/\b\d{1,3}\s*\/\s*\d{1,3}\b/g);
    if (pairMatches && pairMatches.length >= 2) {
      return true;
    }
    const numberMatches = raw.match(/\b\d{1,3}\b/g) || [];
    const smallNumbers = numberMatches
      .map((value) => parseInt(value, 10))
      .filter((value) => Number.isFinite(value) && value >= 1 && value <= 400);
    return smallNumbers.length >= 6;
  }

  function collectStructuredTocAreas(entry) {
    const areas = [];
    const layers = Array.isArray(entry.layers) ? entry.layers : [];
    layers.forEach((layer) => {
      const list = Array.isArray(layer.areas) ? layer.areas : [];
      list.forEach((area) => {
        const page = parseStructuredPageFromUrl(area && area.url);
        if (!Number.isFinite(page)) {
          return;
        }
        areas.push({
          page,
          x: Number(area.x) || 0,
          y: Number(area.y) || 0,
        });
      });
    });
    areas.sort((a, b) => {
      if (a.x !== b.x) {
        return a.x - b.x;
      }
      return a.y - b.y;
    });
    return areas;
  }

  function parseStructuredPageFromUrl(url) {
    const value = String(url || "");
    const match = value.match(/[?&]page=(\d+)/i) || value.match(/#page=(\d+)/i);
    if (!match) {
      return null;
    }
    const parsed = parseInt(match[1], 10);
    return Number.isFinite(parsed) ? parsed : null;
  }

  function parseStyleNumber(style, prop) {
    const raw = String(style || "");
    const regex = new RegExp(`${escapeRegExp(prop)}\\s*:\\s*([\\d.]+)`, "i");
    const match = raw.match(regex);
    if (!match) {
      return null;
    }
    const value = parseFloat(match[1]);
    return Number.isFinite(value) ? value : null;
  }

  function buildStructuredTocEntriesFromNumberedText(rawText) {
    let text = normalizeStructuredTocText(rawText);
    if (!text) {
      return [];
    }
    const lower = text.toLowerCase();
    const headerIndex = lower.lastIndexOf("inhaltsverzeichnis");
    if (headerIndex >= 0) {
      text = text.slice(headerIndex + "inhaltsverzeichnis".length).trim();
    }
    const marker = findLastMarker(text, [
      "seiten im sb",
      "seiten im schülerbuch",
      "seiten im serviceband",
      "seiten im serviceb",
      "seiten im serviceblätter",
      "seiten in der handreichung",
    ]);
    if (marker) {
      text = text.slice(marker.index + marker.marker.length).trim();
    }
    const entries = [];
    const pattern = /([^\d]+?)\s(\d{1,4})(?:\/(\d{1,4}))?/g;
    let match = pattern.exec(text);
    while (match) {
      let title = match[1];
      title = title.replace(/\b(inhaltsverzeichnis|inhalt)\b/gi, " ");
      title = title.replace(/[.\u00b7•·]{2,}/g, " ");
      title = title.replace(/\s+/g, " ").trim();
      if (title.length >= 2) {
        const label = match[3] ? `${match[2]}/${match[3]}` : match[2];
        entries.push({
          title,
          label,
          page: parseInt(match[2], 10),
        });
      }
      match = pattern.exec(text);
    }
    return entries;
  }

  function findLastMarker(text, markers) {
    const lower = text.toLowerCase();
    let best = null;
    markers.forEach((marker) => {
      const idx = lower.lastIndexOf(marker);
      if (idx !== -1 && (!best || idx > best.index)) {
        best = { marker, index: idx };
      }
    });
    return best;
  }

  function extractStructuredTocLabelsFromText(rawText, count) {
    if (!rawText || !count) {
      return [];
    }
    let text = normalizeStructuredTocText(rawText);
    text = text.replace(/\b(inhaltsverzeichnis|inhalt)\b/gi, " ");
    text = text.replace(/\s+/g, " ").trim();
    if (!text) {
      return [];
    }
    const tokens = text.split(" ").filter(Boolean);
    if (tokens.length < count) {
      return [];
    }
    const starters = new Set([
      "praxis",
      "training",
      "extra",
      "anhang",
      "lexikon",
      "register",
      "impressum",
      "lösungen",
      "lösungs",
      "aufgaben",
      "kapitel",
      "thema",
      "themen",
      "projekt",
    ]);
    const labels = [];
    let index = 0;
    for (let i = 0; i < count; i += 1) {
      const remaining = count - i;
      const remainingTokens = tokens.length - index;
      if (remaining <= 1) {
        labels.push(tokens.slice(index).join(" "));
        break;
      }
      let target = Math.round(remainingTokens / remaining);
      target = Math.max(1, target);
      let end = Math.min(tokens.length, index + target);
      if (tokens.length - end < remaining - 1) {
        end = tokens.length - (remaining - 1);
      }
      const lookahead = Math.min(tokens.length, index + target + 4);
      for (let j = index + 1; j < lookahead; j += 1) {
        const token = tokens[j].toLowerCase();
        if (starters.has(token) && tokens.length - j >= remaining - 1) {
          end = j;
          break;
        }
      }
      labels.push(tokens.slice(index, end).join(" "));
      index = end;
    }
    return labels.map((label) => label.replace(/\s+/g, " ").trim());
  }

  function buildStructuredSearchIndexFromAppHtml(appHtml) {
    const raw = String(appHtml || "");
    if (!raw) {
      return [];
    }
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(raw, "text/html");
      const results = [];
      const pages = Array.from(doc.querySelectorAll(".page"));
      pages.forEach((pageEl, index) => {
        const textNode = pageEl.querySelector(".searchable .text");
        const text = textNode ? textNode.textContent.trim() : "";
        if (!text) {
          return;
        }
        const pageNumber = extractStructuredPageNumberFromAppPage(pageEl, index);
        results.push({ page: pageNumber, search: text });
      });
      return results;
    } catch (error) {
      return [];
    }
  }

  function extractPageTitleMapFromAppHtml(raw) {
    const map = new Map();
    if (!raw) {
      return map;
    }
    const regex = /pageToTitle\\['(\\d+)'\\]\\s*=\\s*'([^']*)'/g;
    let match = regex.exec(raw);
    while (match) {
      map.set(match[1], match[2]);
      match = regex.exec(raw);
    }
    return map;
  }

  function buildStructuredPageLabelMapFromAppHtml(appHtml) {
    const raw = String(appHtml || "");
    if (!raw) {
      return null;
    }
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(raw, "text/html");
      const pageToTitle = extractPageTitleMapFromAppHtml(raw);
      const pageLabels = new Map();
      const pages = Array.from(doc.querySelectorAll(".page"));
      pages.forEach((pageEl, index) => {
        const pageNumber = extractStructuredPageNumberFromAppPage(pageEl, index);
        if (!Number.isFinite(pageNumber)) {
          return;
        }
        let label = String(pageEl.getAttribute("data-title") || "").trim();
        if (!label || label.toLowerCase() === "null") {
          const pos = String(pageEl.getAttribute("data-pos") || "").trim();
          if (pos && pageToTitle.has(pos)) {
            label = String(pageToTitle.get(pos) || "").trim();
          }
        }
        if (!label || label.toLowerCase() === "null") {
          return;
        }
        if (REGEX.roman.test(label)) {
          label = label.toLowerCase();
        }
        pageLabels.set(pageNumber, label);
      });
      if (!pageLabels.size) {
        return null;
      }
      const { pageLabels: adjustedLabels, shift } = shiftStructuredPageLabelsIfNeeded(pageLabels);
      const lookup = new Map();
      let arabicStart = null;
      adjustedLabels.forEach((label, pageNumber) => {
        const normalized = normalizePageLabel(label);
        if (normalized && !lookup.has(normalized)) {
          lookup.set(normalized, pageNumber);
        }
        if (arabicStart === null && normalized === "1") {
          arabicStart = pageNumber;
        }
      });
      return { pageLabels: adjustedLabels, lookup, arabicStart, shift };
    } catch (error) {
      return null;
    }
  }

  function shiftStructuredPageLabelsIfNeeded(pageLabels) {
    if (!pageLabels || !pageLabels.size) {
      return { pageLabels, shift: 0 };
    }
    if (pageLabels.has(0)) {
      return { pageLabels, shift: 0 };
    }
    let minPage = Infinity;
    pageLabels.forEach((_, pageNumber) => {
      if (pageNumber < minPage) {
        minPage = pageNumber;
      }
    });
    if (minPage !== 1) {
      return { pageLabels, shift: 0 };
    }
    const firstLabel = pageLabels.get(minPage);
    if (normalizePageLabel(firstLabel) !== "I") {
      return { pageLabels, shift: 0 };
    }
    const shifted = new Map();
    pageLabels.forEach((label, pageNumber) => {
      const nextPage = pageNumber - 1;
      if (nextPage >= 0) {
        shifted.set(nextPage, label);
      }
    });
    return { pageLabels: shifted, shift: -1 };
  }

  function parseStructuredPageNumber(wordPositionSvg, fallback) {
    const raw = String(wordPositionSvg || "");
    const match = raw.match(/page_(\\d+)/i);
    if (match) {
      const value = parseInt(match[1], 10);
      if (Number.isFinite(value)) {
        return value;
      }
    }
    return Number.isFinite(fallback) ? fallback : 0;
  }

  function extractStructuredPageNumberFromAppPage(pageEl, fallback) {
    if (!pageEl) {
      return Number.isFinite(fallback) ? fallback : 0;
    }
    const styleNodes = pageEl.querySelectorAll("[style]");
    for (const node of styleNodes) {
      const style = node.getAttribute("style") || "";
      const match = style.match(/content\/pages\/page_(\\d+)/i);
      if (match) {
        const value = parseInt(match[1], 10);
        if (Number.isFinite(value)) {
          return value;
        }
      }
    }
    const html = pageEl.innerHTML || "";
    const inlineMatch = html.match(/content\/pages\/page_(\\d+)/i);
    if (inlineMatch) {
      const value = parseInt(inlineMatch[1], 10);
      if (Number.isFinite(value)) {
        return value;
      }
    }
    const dataPos = pageEl.getAttribute("data-pos");
    if (dataPos && /^\\d+$/.test(dataPos)) {
      return parseInt(dataPos, 10);
    }
    return Number.isFinite(fallback) ? fallback : 0;
  }

  function getStructuredPageCountFromFileMap(basePath) {
    if (!basePath) {
      return 0;
    }
    const prefix = basePath.replace(REGEX.trailingSlash, "") + "/";
    const baseLower = normalizeFilePath(basePath).toLowerCase();
    const scanEntries = (entries, usesEntryObjects) => {
      let maxPage = -1;
      entries.forEach((entry) => {
        const path = usesEntryObjects ? entry.path : entry;
        if (!path || !path.startsWith(prefix)) {
          return;
        }
        const lower = usesEntryObjects
          ? entry.lower || path.toLowerCase()
          : path.toLowerCase();
        if (
          lower.includes("/content/pages/page_") &&
          isStructuredScaleImagePath(lower) &&
          lower.indexOf("/content/media/") === -1
        ) {
          const match = lower.match(/page_(\\d+)/);
          if (match) {
            const value = parseInt(match[1], 10);
            if (Number.isFinite(value) && value > maxPage) {
              maxPage = value;
            }
          }
        }
      });
      return maxPage;
    };
    let maxPage = -1;
    if (state.fileMap && state.fileMap.size) {
      maxPage = scanEntries(Array.from(state.fileMap.keys()), false);
    }
    if (maxPage < 0 && state.fileEntries && state.fileEntries.length) {
      maxPage = scanEntries(state.fileEntries, true);
    }
    return maxPage >= 0 ? maxPage + 1 : 0;
  }

  function buildToc() {
    els.panelToc.innerHTML = "";
    if (!Array.isArray(state.book.toc)) {
      els.panelToc.textContent = "Kein Inhaltsverzeichnis verfügbar.";
      return;
    }

    const list = createTocList(state.book.toc);
    els.panelToc.appendChild(list);
    updateTocExpansionForPage(state.currentPage);
  }

  function resolveTocTargetPage(page) {
    if (page === null || page === undefined || page === "") {
      return null;
    }
    if (state.bookFormat === "structured") {
      const parsed = parseBookPageInput(String(page));
      if (Number.isFinite(parsed)) {
        return parsed;
      }
    }
    const numeric = Number(page);
    if (Number.isFinite(numeric)) {
      return numeric;
    }
    return null;
  }

  function createTocList(items, path = []) {
    const ul = document.createElement("ul");
    ul.className = "toc-list";
    const allowPageLabel = false;

    items.forEach((item, index) => {
      const itemPath = path.concat(index);
      const li = document.createElement("li");
      li.dataset.tocPath = itemPath.join("-");
      const row = document.createElement("div");
      row.className = "toc-row";
      const button = document.createElement("button");
      button.className = "toc-item";
      const hasChildren = Array.isArray(item.children) && item.children.length > 0;
      const toggleExpanded = () => {
        const nextExpanded = li.classList.contains("collapsed");
        if (nextExpanded) {
          applyTocExpansionForPath(itemPath);
        } else {
          applyTocExpansionForPath(null);
        }
      };
      if (hasChildren) {
        li.classList.add("toc-branch", "collapsed");
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "toc-toggle";
        toggle.setAttribute("aria-label", "Kapitel ein- oder ausklappen");
        toggle.setAttribute("aria-expanded", "false");
        toggle.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          toggleExpanded();
        });
        row.appendChild(toggle);
      } else {
        const spacer = document.createElement("span");
        spacer.className = "toc-toggle-spacer";
        spacer.setAttribute("aria-hidden", "true");
        row.appendChild(spacer);
      }
      const targetPage = resolveTocTargetPage(item.page);
      let labelText = "";
      if (item.label) {
        labelText = String(item.label);
        if (targetPage !== null && targetPage !== undefined) {
          const pageLabel = getPageLabelForPage(targetPage);
          if (
            pageLabel &&
            normalizePageLabel(labelText) === normalizePageLabel(pageLabel)
          ) {
            labelText = "";
          }
        }
      }
      let titleText = item.title || "";
      if (
        allowPageLabel &&
        !item.label &&
        targetPage !== null &&
        targetPage !== undefined &&
        /^\\s*seite\\b/i.test(titleText)
      ) {
        titleText = formatPageLabel(targetPage);
        labelText = "";
      }
      labelText = labelText.replace(/\b(pflichtmodul|wahlmodul)\s*:\s*/gi, "");
      labelText = labelText.replace(/\s{2,}/g, " ").trim();
      titleText = titleText.replace(/\b(pflichtmodul|wahlmodul)\s*:\s*/gi, "");
      titleText = titleText.replace(/\s{2,}/g, " ").trim();
      if (!REGEX.roman.test(labelText)) {
        labelText = normalizeAllCapsDisplay(labelText);
      } else {
        labelText = labelText.toUpperCase();
      }
      titleText = normalizeAllCapsDisplay(titleText);
      const label = labelText ? `${labelText} ` : "";
      button.textContent = `${label}${titleText}`;
      button.addEventListener("click", () => {
        if (hasChildren) {
          toggleExpanded();
        }
        if (targetPage !== null && targetPage !== undefined) {
          goToPage(targetPage, { alignSpread: false });
        }
      });
      row.appendChild(button);
      li.appendChild(row);

      if (hasChildren) {
        const childList = createTocList(item.children, itemPath);
        childList.classList.add("toc-children");
        li.appendChild(childList);
      }

      ul.appendChild(li);
    });

    return ul;
  }

  function findActiveTocPath(items, currentPage) {
    if (!Array.isArray(items) || !Number.isFinite(currentPage)) {
      return null;
    }
    let best = null;
    const visit = (list, path) => {
      list.forEach((item, index) => {
        const itemPath = path.concat(index);
        const targetPage = resolveTocTargetPage(item.page);
        if (Number.isFinite(targetPage) && targetPage <= currentPage) {
          if (!best || targetPage >= best.page) {
            best = { path: itemPath, page: targetPage };
          }
        }
        if (Array.isArray(item.children) && item.children.length) {
          visit(item.children, itemPath);
        }
      });
    };
    visit(items, []);
    return best ? best.path : null;
  }

  function buildTocPathSet(path) {
    const set = new Set();
    if (!Array.isArray(path) || !path.length) {
      return set;
    }
    path.forEach((_, index) => {
      set.add(path.slice(0, index + 1).join("-"));
    });
    return set;
  }

  function applyTocExpansionForPath(path) {
    if (!els.panelToc) {
      return;
    }
    const expandedSet = buildTocPathSet(path);
    const branches = els.panelToc.querySelectorAll(".toc-branch");
    branches.forEach((node) => {
      const key = node.dataset.tocPath || "";
      const expanded = Boolean(key && expandedSet.has(key));
      node.classList.toggle("collapsed", !expanded);
      const toggle = node.querySelector(".toc-toggle");
      if (toggle) {
        toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
      }
    });
  }

  function updateTocExpansionForPage(page) {
    if (!els.panelToc || !Array.isArray(state.book && state.book.toc)) {
      return;
    }
    const current = Number.isFinite(page) ? page : state.currentPage;
    const path = findActiveTocPath(state.book.toc, current);
    applyTocExpansionForPath(path);
  }

  function buildThumbnails() {
    if (!els.panelThumbs) {
      return;
    }
    if (!state.pageCount) {
      return;
    }
    els.panelThumbs.innerHTML = "";
    const grid = document.createElement("div");
    grid.className = "thumbnail-grid";

    const first = getFirstPage();
    const last = getLastPageNumber();
    for (let page = first; page <= last; page += 1) {
      const button = document.createElement("button");
      button.className = "thumbnail";
      button.title = formatPageLabel(page);
      button.addEventListener("click", () => goToPage(page));

      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = getPreviewPath(page);
      img.alt = formatPageLabel(page);
      img.onerror = () => {
        img.onerror = null;
        img.src = getPagePath(page);
      };

      const label = document.createElement("span");
      label.textContent = getPageLabelForPage(page) || String(page);

      button.appendChild(img);
      button.appendChild(label);
      grid.appendChild(button);

      state.thumbnails.set(page, button);
    }

    els.panelThumbs.appendChild(grid);
  }

  async function ensureSearchIndex() {
    if (Array.isArray(state.search)) {
      return state.search;
    }
    if (state.searchBuildPromise) {
      return state.searchBuildPromise;
    }
    const loadId = state.loadRequestId;
    if (state.bookFormat === "legacy") {
      state.searchBuildPromise = fetchJson(resolvePath("search.json"))
        .catch(() => null)
        .then((search) => {
          if (state.loadRequestId !== loadId) {
            return null;
          }
          if (Array.isArray(search)) {
            state.search = search;
            return search;
          }
          return null;
        })
        .finally(() => {
          if (state.loadRequestId === loadId) {
            state.searchBuildPromise = null;
          } else {
            state.searchBuildPromise = null;
          }
        });
      return state.searchBuildPromise;
    }
    if (state.bookFormat !== "structured") {
      return null;
    }
    state.searchBuildPromise = (async () => {
      try {
        let built = [];
        if (state.loadRequestId !== loadId) {
          return null;
        }
        if (state.structuredIndex && Array.isArray(state.structuredIndex.pages)) {
          built = buildStructuredSearchIndex(state.structuredIndex.pages);
        } else if (hasFileAtPath("data.json")) {
          const data = await fetchJson(resolvePath("data.json")).catch(() => null);
          if (data && Array.isArray(data.pages)) {
            built = buildStructuredSearchIndex(data.pages);
          }
        }
        if (!built.length) {
          const appHtml = await fetchText(resolvePath("app.html")).catch(() => "");
          if (appHtml) {
            built = buildStructuredSearchIndexFromAppHtml(appHtml);
          }
        }
        if (state.loadRequestId === loadId) {
          state.search = built;
          return built;
        }
        return null;
      } finally {
        state.searchBuildPromise = null;
      }
    })();
    return state.searchBuildPromise;
  }

  async function runSearch() {
    const query = els.searchInput.value.trim();
    if (!query) {
      els.searchResults.textContent = "Bitte Suchbegriff eingeben.";
      return;
    }

    if (!Array.isArray(state.search)) {
      els.searchResults.textContent = "Suchindex wird erstellt …";
      await ensureSearchIndex();
      if (!Array.isArray(state.search)) {
        els.searchResults.textContent = "Keine Suchdaten verfügbar.";
        return;
      }
    }

    const terms = query.toLowerCase().split(new RegExp("\\s+")).filter(Boolean);
    const results = [];

    for (const entry of state.search) {
      const text = (entry.search || "").toString();
      if (!text) {
        continue;
      }
      const lower = text.toLowerCase();
      const matches = terms.every((term) => lower.includes(term));
      if (matches) {
        const snippet = buildSnippet(text, terms);
        results.push({ page: entry.page, snippet });
      }
    }

    renderSearchResults(results, terms);
  }

  function buildSnippet(text, terms) {
    const lower = text.toLowerCase();
    let matchIndex = -1;
    let matchTerm = terms[0] || "";

    for (const term of terms) {
      const index = lower.indexOf(term);
      if (index !== -1) {
        matchIndex = index;
        matchTerm = term;
        break;
      }
    }

    if (matchIndex === -1) {
      return text.slice(0, 160);
    }

    const context = 80;
    const start = Math.max(0, matchIndex - context);
    const end = Math.min(text.length, matchIndex + matchTerm.length + context);
    let snippet = text.slice(start, end);
    if (start > 0) {
      snippet = `…${snippet}`;
    }
    if (end < text.length) {
      snippet = `${snippet}…`;
    }
    return snippet;
  }

  function getStructuredSearchResultPage(page) {
    const value = Number(page);
    if (!Number.isFinite(value)) {
      return value;
    }
    if (state.bookFormat !== "structured") {
      return value;
    }
    const shift = Number(state.structuredPageLabelShift || 0);
    if (!shift) {
      return value;
    }
    const first = getFirstPage();
    return Math.max(first, value + shift);
  }

  function renderSearchResults(results, terms) {
    els.searchResults.innerHTML = "";
    if (results.length === 0) {
      els.searchResults.textContent = "Keine Treffer gefunden.";
      return;
    }

    const info = document.createElement("div");
    info.className = "search-info";
    info.textContent = `${results.length} Treffer`;
    els.searchResults.appendChild(info);

    results.slice(0, 200).forEach((result) => {
      const item = document.createElement("div");
      item.className = "search-result";
      const pageLine = document.createElement("div");
      pageLine.className = "result-page";
      const targetPage = getStructuredSearchResultPage(result.page);
      pageLine.textContent = formatPageLabel(targetPage);

      const snippet = document.createElement("div");
      snippet.className = "result-snippet";
      snippet.innerHTML = highlightTerms(result.snippet, terms);

      item.appendChild(pageLine);
      item.appendChild(snippet);
      item.addEventListener("click", () => goToPage(targetPage));
      els.searchResults.appendChild(item);
    });

    if (results.length > 200) {
      const more = document.createElement("div");
      more.className = "search-info";
      more.textContent = "Weitere Treffer vorhanden. Suche bitte präzisieren.";
      els.searchResults.appendChild(more);
    }
  }

  function highlightTerms(text, terms) {
    let safe = escapeHtml(text);
    terms.forEach((term) => {
      const regex = new RegExp(escapeRegExp(term), "gi");
      safe = safe.replace(regex, (match) => `<mark>${match}</mark>`);
    });
    return safe;
  }

  function escapeHtml(value) {
    const text = String(value || "");
    return text
      .split("&")
      .join("&amp;")
      .split("<")
      .join("&lt;")
      .split(">")
      .join("&gt;")
      .split('"')
      .join("&quot;")
      .split("'")
      .join("&#39;");
  }

  function escapeRegExp(value) {
    const raw = String(value || "");
    const special = "\\^$.*+?()[]{}|";
    let result = "";
    for (let i = 0; i < raw.length; i += 1) {
      const ch = raw[i];
      if (special.indexOf(ch) !== -1) {
        result += "\\" + ch;
      } else {
        result += ch;
      }
    }
    return result;
  }

  function goToPage(page, options = {}) {
    if (!state.pageCount) {
      return;
    }

    const previousPage = state.currentPage;
    const normalized = normalizePage(page, options);
    if (normalized === null || normalized === undefined) {
      return;
    }
    const transitionDirection =
      !options.silent && normalized !== previousPage ? (normalized > previousPage ? "next" : "prev") : null;
    const transitionGhost = transitionDirection ? createPageTransitionGhost(transitionDirection) : null;
    if (transitionDirection && els.pageSpread) {
      // Prevent one-frame flash of the newly rendered page before transition starts.
      els.pageSpread.style.opacity = "0";
    }

    state.fitMode = "fit-page";
    state.currentPage = normalized;
    renderPages();
    if (transitionDirection) {
      triggerPageTransition(transitionDirection, transitionGhost);
    }

    if (!options.silent) {
      if (document.body.classList.contains("sidebar-open") && window.matchMedia("(max-width: 900px)").matches) {
        setSidebarOpen(false);
      }
    }
  }

  function normalizePage(page, options = {}) {
    const first = getFirstPage();
    const last = getLastPageNumber();
    let value = Math.max(first, Math.min(page, last));

    const alignSpread = options.alignSpread !== false;

    if (state.viewMode === "spread" && alignSpread) {
      const index = value - first;
      if (state.book.firstPageIsCover) {
        if (value === first) {
          return value;
        }
        if (index % 2 === 0) {
          value -= 1;
        }
      } else if (index % 2 === 1) {
        value -= 1;
      }

      value = Math.max(first, Math.min(value, getLastPage()));
    }

    return value;
  }

  function getVisiblePages() {
    if (state.viewMode === "single") {
      return [state.currentPage];
    }

    const first = getFirstPage();
    if (state.book.firstPageIsCover && state.currentPage === first) {
      return [first];
    }

    const left = state.currentPage;
    const right = left + 1;
    if (right <= getLastPageNumber()) {
      return [left, right];
    }
    return [left];
  }

  function renderPages() {
    const pages = getVisiblePages();
    const leftPage = pages[0];
    const rightPage = pages[1];
    const isDual = pages.length === 2;
    els.pageSpread.classList.toggle("spread-mode", state.viewMode === "spread");
    els.pageSpread.classList.toggle("dual-page", isDual);

    if (leftPage !== null && leftPage !== undefined) {
      setPage(els.pageLeft, els.pageLeftImg, els.labelLeft, leftPage);
    }

    if (rightPage !== null && rightPage !== undefined) {
      setPage(els.pageRight, els.pageRightImg, els.labelRight, rightPage);
    } else {
      els.pageRight.classList.add("hidden");
    }

    if (rightPage === null || rightPage === undefined) {
      els.pageRightImg.removeAttribute("src");
      els.pageRightImg.style.width = "";
      els.pageRightImg.style.height = "";
      els.labelRight.textContent = "";
    }

    els.pageInput.value = getDisplayInputValue(pages);
    updateThumbHighlight(pages);
    updateTocExpansionForPage(pages[0]);
    updateMaterialsForPages(pages);
    updateCopyAvailability(pages);
    updateTextOverlays(pages);
    applyFitIfNeeded();

    if (state.viewMode === "spread") {
      if (rightPage !== null && rightPage !== undefined) {
        prefetchPageImage(leftPage - 1);
        prefetchPageImage(rightPage + 1);
      } else {
        prefetchPageImage(leftPage - 1);
        prefetchPageImage(leftPage + 1);
      }
    } else {
      prefetchPageImage(leftPage - 1);
      prefetchPageImage(leftPage + 1);
    }
  }

  function triggerPageFade(container) {
    if (!container) {
      return;
    }
    container.classList.remove("fade-in");
    void container.offsetWidth;
    container.classList.add("fade-in");
    container.addEventListener(
      "animationend",
      () => {
        container.classList.remove("fade-in");
      },
      { once: true }
    );
  }

  function createPageTransitionGhost(direction) {
    if (!els.viewer || !els.pageSpread || !direction) {
      return null;
    }
    const spreadRect = els.pageSpread.getBoundingClientRect();
    if (!spreadRect.width || !spreadRect.height) {
      return null;
    }
    const viewerRect = els.viewer.getBoundingClientRect();
    const left = els.viewer.scrollLeft + (spreadRect.left - viewerRect.left);
    const top = els.viewer.scrollTop + (spreadRect.top - viewerRect.top);

    const staleGhosts = els.viewer.querySelectorAll(".page-transition-ghost");
    staleGhosts.forEach((node) => node.remove());

    const ghost = document.createElement("div");
    ghost.className =
      direction === "prev"
        ? "page-transition-ghost page-transition-ghost-prev"
        : "page-transition-ghost page-transition-ghost-next";
    ghost.style.left = `${left}px`;
    ghost.style.top = `${top}px`;
    ghost.style.width = `${spreadRect.width}px`;
    ghost.style.height = `${spreadRect.height}px`;

    const clone = els.pageSpread.cloneNode(true);
    clone.removeAttribute("id");
    clone.querySelectorAll("[id]").forEach((el) => el.removeAttribute("id"));
    clone.classList.remove("page-transition-next");
    clone.classList.remove("page-transition-prev");
    ghost.appendChild(clone);
    els.viewer.appendChild(ghost);
    return ghost;
  }

  function triggerPageTransition(direction, ghost) {
    if (!els.pageSpread || !els.viewer) {
      if (ghost && ghost.remove) {
        ghost.remove();
      }
      return;
    }
    if (typeof state.pageTransitionCleanup === "function") {
      state.pageTransitionCleanup();
    }
    const isDualSpread = els.pageSpread.classList.contains("dual-page");
    const spreadShift = isDualSpread ? 72 : 56;
    const ghostShift = isDualSpread ? 300 : 220;
    const nextClass = direction === "prev" ? "page-transition-prev" : "page-transition-next";
    const expectedAnimation = direction === "prev" ? "spread-slide-prev" : "spread-slide-next";
    const spreadFromX = direction === "prev" ? -spreadShift : spreadShift;
    const ghostToX = direction === "prev" ? ghostShift : -ghostShift;
    els.pageSpread.classList.remove("page-transition-next");
    els.pageSpread.classList.remove("page-transition-prev");
    els.pageSpread.style.opacity = "0";
    els.pageSpread.style.transform = `translateX(${spreadFromX}px) scale(0.995)`;
    lockPageTurnScrollbars();
    let cleaned = false;
    const cleanup = () => {
      if (cleaned) {
        return;
      }
      cleaned = true;
      els.pageSpread.classList.remove("page-transition-next");
      els.pageSpread.classList.remove("page-transition-prev");
      els.pageSpread.style.removeProperty("--spread-shift");
      els.pageSpread.style.opacity = "";
      els.pageSpread.style.transform = "";
      unlockPageTurnScrollbars();
      if (ghost && ghost.remove) {
        ghost.remove();
      }
      if (state.pageTransitionCleanup === cleanup) {
        state.pageTransitionCleanup = null;
      }
    };
    state.pageTransitionCleanup = cleanup;
    const timeoutId = setTimeout(cleanup, 1400);

    // Prefer JS-driven animation for reliability across browsers/live reload.
    const supportsAnimate = typeof els.pageSpread.animate === "function";
    if (supportsAnimate) {
      const animations = [];
      try {
        const spreadAnimation = els.pageSpread.animate(
          [
            { opacity: 0, transform: `translateX(${spreadFromX}px) scale(0.995)` },
            { opacity: 1, transform: "translateX(0) scale(1)" },
          ],
          {
            duration: 640,
            easing: "cubic-bezier(0.16, 1, 0.3, 1)",
            fill: "both",
          }
        );
        if (spreadAnimation) {
          animations.push(spreadAnimation);
        }
      } catch (error) {}
      if (ghost && typeof ghost.animate === "function") {
        try {
          const ghostAnimation = ghost.animate(
            [
              { opacity: 1, transform: "translateX(0) scale(1)" },
              { opacity: 0, transform: `translateX(${ghostToX}px) scale(0.992)` },
            ],
            {
              duration: 640,
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
              fill: "both",
            }
          );
          if (ghostAnimation) {
            animations.push(ghostAnimation);
          }
        } catch (error) {}
      }
      if (animations.length) {
        Promise.allSettled(
          animations.map((animation) =>
            animation && animation.finished ? animation.finished : Promise.resolve()
          )
        ).finally(() => {
          clearTimeout(timeoutId);
          cleanup();
        });
        return;
      }
    }

    // Fallback for engines without WAAPI support.
    els.pageSpread.style.setProperty("--spread-shift", `${spreadShift}px`);
    if (ghost) {
      ghost.style.setProperty("--ghost-shift", `${ghostShift}px`);
      ghost.classList.remove("page-transition-ghost-active");
    }
    void els.pageSpread.offsetWidth;
    if (ghost) {
      void ghost.offsetWidth;
      ghost.classList.add("page-transition-ghost-active");
    }
    els.pageSpread.classList.add(nextClass);
    els.pageSpread.addEventListener(
      "animationend",
      (event) => {
        if (event.animationName !== expectedAnimation) {
          return;
        }
        clearTimeout(timeoutId);
        cleanup();
      },
      { once: true }
    );
  }

  function maybeStartDeferredStructuredIndexLoad(page, img) {
    if (!state.structuredIndexLoad || state.structuredIndexLoad.started) {
      return;
    }
    if (page !== getFirstPage()) {
      return;
    }
    const start = () => startQueuedStructuredIndexLoad();
    if (img && img.complete && img.naturalWidth) {
      start();
      return;
    }
    if (img) {
      img.addEventListener("load", start, { once: true });
      img.addEventListener("error", start, { once: true });
    }
    if (state.structuredIndexLoad && !state.structuredIndexLoad.timeoutId) {
      state.structuredIndexLoad.timeoutId = setTimeout(start, 1500);
    }
  }

  function setPage(container, img, label, page) {
    container.classList.remove("hidden");
    const pagePath = getPagePath(page);
    const nextPage = String(page);
    const pageChanged = img.dataset.page !== nextPage;
    const pageLabel = formatPageLabel(page);
    img.alt = pageLabel;
    img.dataset.page = nextPage;
    label.textContent = pageLabel;
    if (pagePath) {
      if (pageChanged || !img.getAttribute("src")) {
        const assign = () => {
          img.onload = () => {
            img.style.opacity = "";
          };
          img.onerror = () => {
            img.style.opacity = "";
          };
          img.src = pagePath;
        };
        if (pageChanged) {
          requestAnimationFrame(assign);
        } else {
          assign();
        }
      }
    } else {
      img.removeAttribute("src");
      img.style.opacity = "";
    }
    if (state.pageFadePending && page === getFirstPage()) {
      triggerPageFade(container);
      state.pageFadePending = false;
    }
    maybeStartDeferredStructuredIndexLoad(page, img);
  }

  function prefetchPageImage(page) {
    if (page === null || page === undefined) {
      return;
    }
    if (!state.pageCount) {
      return;
    }
    const first = getFirstPage();
    const last = getLastPageNumber();
    if (page < first || page > last) {
      return;
    }
    const img = new Image();
    img.src = getPagePath(page);
  }

  function updateThumbHighlight(pages) {
    state.thumbnails.forEach((button) => button.classList.remove("active"));
    pages.forEach((page) => {
      const button = state.thumbnails.get(page);
      if (button) {
        button.classList.add("active");
      }
    });
  }

  function getResourceUrl(path, options = {}) {
    const resolved = resolvePath(path);
    const queryIndex = resolved.indexOf("?");
    const hashIndex = resolved.indexOf("#");
    let cut = resolved.length;
    if (queryIndex !== -1) {
      cut = Math.min(cut, queryIndex);
    }
    if (hashIndex !== -1) {
      cut = Math.min(cut, hashIndex);
    }
    const base = resolved.slice(0, cut);
    const suffix = resolved.slice(cut);
    if (state.fileMap.size) {
      const url = getObjectUrlForPath(base, options);
      if (url) {
        return `${url}${suffix}`;
      }
      return "";
    }
    return resolved;
  }

  function updateCopyAvailability(pages) {
    const pageList = pages.filter((page) => page !== null && page !== undefined);
    if (!pageList.length) {
      setCopyAvailable(false);
      return;
    }
    const requestId = (state.copyRequestId += 1);
    setCopyAvailable(false);
    Promise.all(pageList.map((page) => hasTextLayer(page)))
      .then((flags) => {
        if (requestId !== state.copyRequestId) {
          return;
        }
        const available = flags.some(Boolean);
        setCopyAvailable(available);
      })
      .catch(() => {
        if (requestId !== state.copyRequestId) {
          return;
        }
        setCopyAvailable(false);
      });
  }

  function setCopyAvailable(available) {
    const next = Boolean(available);
    state.copyAvailable = next;
    if (els.toggleCopy) {
      els.toggleCopy.disabled = !next;
    }
    if (!next && state.copyMode) {
      setCopyMode(false);
    }
  }

  async function hasTextLayer(page) {
    try {
      if (state.bookFormat === "structured") {
        return true;
      }
      const data = await loadPageData(page);
      if (!data || !data.html) {
        return false;
      }
      const wrapper = document.createElement("div");
      wrapper.innerHTML = data.html;
      const layer = wrapper.querySelector(".textLayer");
      if (!layer) {
        return false;
      }
      const text = (layer.textContent || "").trim();
      return text.length > 0;
    } catch (error) {
      return false;
    }
  }

  function toggleCopyMode() {
    setCopyMode(!state.copyMode);
  }

  function setCopyMode(enabled) {
    if (enabled && !state.copyAvailable) {
      return;
    }
    state.copyMode = !!enabled;
    document.body.classList.toggle("copy-mode", state.copyMode);
    if (els.toggleCopy) {
      els.toggleCopy.classList.toggle("active", state.copyMode);
      els.toggleCopy.setAttribute("aria-pressed", state.copyMode ? "true" : "false");
    }
    updateTextOverlays(getVisiblePages());
    updateGrabCursor();
  }

  function updateTextOverlays(pages) {
    const targets = [
      { page: pages[0], container: els.pageLeft, img: els.pageLeftImg },
      { page: pages[1], container: els.pageRight, img: els.pageRightImg },
    ];

    targets.forEach((target) => {
      if (!target.container) {
        return;
      }
      if (
        !state.copyMode ||
        target.page === null ||
        target.page === undefined ||
        !target.img ||
        !target.img.src
      ) {
        removeTextOverlay(target.container);
        return;
      }
      updateTextOverlayForPage(target.page, target.container, target.img);
    });
  }

  function removeTextOverlay(container) {
    const overlay = container.querySelector(".text-overlay");
    if (overlay) {
      overlay.remove();
    }
  }

  async function updateTextOverlayForPage(page, container, img) {
    if (state.bookFormat === "structured") {
      removeTextOverlay(container);
      return;
    }
    const data = await loadPageData(page).catch(() => null);
    if (!data || !data.html || !data.width || !data.height) {
      removeTextOverlay(container);
      return;
    }
    if (String(img.dataset.page) !== String(page)) {
      return;
    }

    const imgWidth = img.clientWidth || img.naturalWidth || 0;
    const imgHeight = img.clientHeight || img.naturalHeight || 0;
    if (!imgWidth || !imgHeight) {
      return;
    }

    const scaleX = imgWidth / data.width;
    const scaleY = imgHeight / data.height;
    let overlay = container.querySelector(".text-overlay");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.className = "text-overlay";
      container.appendChild(overlay);
    }
    overlay.style.width = `${imgWidth}px`;
    overlay.style.height = `${imgHeight}px`;

    const wrapper = document.createElement("div");
    wrapper.innerHTML = data.html;
    const textLayer = wrapper.querySelector(".textLayer");
    if (!textLayer) {
      removeTextOverlay(container);
      return;
    }
    textLayer.style.position = "absolute";
    textLayer.style.left = "0px";
    textLayer.style.top = "0px";
    textLayer.style.width = `${data.width}px`;
    textLayer.style.height = `${data.height}px`;
    textLayer.style.transformOrigin = "top left";
    textLayer.style.transform = `scale(${scaleX}, ${scaleY})`;

    overlay.innerHTML = "";
    overlay.appendChild(textLayer);
  }

  async function getStructuredPageText(page) {
    const data = await ensureStructuredIndexLoaded();
    if (!data || !Array.isArray(data.pages)) {
      return await getStructuredPageTextFromSearch(page);
    }
    const pageNum = Number(page);
    const index = pageNum - Number(state.pageBase || 0);
    let pageData = null;
    if (state.structuredIndexByOriginal) {
      pageData = state.structuredIndexByOriginal.get(pageNum) || null;
    }
    if (!pageData) {
      if (!Number.isFinite(index) || index < 0 || index >= data.pages.length) {
        return "";
      }
      pageData = data.pages[index];
    }
    const content = pageData && pageData.content ? pageData.content : null;
    const text = content && content.text ? String(content.text) : "";
    if (text) {
      return text.replace(/\s+/g, " ").trim();
    }
    return await getStructuredPageTextFromSearch(page);
  }

  async function getStructuredPageTextFromSearch(page) {
    const pageNum = Number(page);
    if (!Number.isFinite(pageNum)) {
      return "";
    }
    let searchIndex = Array.isArray(state.search) ? state.search : null;
    if (!searchIndex) {
      await ensureSearchIndex();
      searchIndex = Array.isArray(state.search) ? state.search : null;
    }
    if (!searchIndex) {
      return "";
    }
    for (const entry of searchIndex) {
      if (!entry) {
        continue;
      }
      if (Number(entry.page) === pageNum) {
        const text = entry.search ? String(entry.search) : "";
        return text.replace(/\s+/g, " ").trim();
      }
    }
    return "";
  }

  function buildStructuredTextLayer(text, width, height) {
    const value = String(text || "").trim();
    if (!value) {
      return null;
    }
    const textLayer = document.createElement("div");
    textLayer.className = "textLayer";
    textLayer.style.width = `${width}px`;
    textLayer.style.height = `${height}px`;
    textLayer.style.position = "absolute";
    textLayer.style.left = "0px";
    textLayer.style.top = "0px";
    const lineHeight = 16;
    const maxLines = Math.max(1, Math.floor(height / lineHeight));
    const charsPerLine = Math.max(20, Math.floor(width / 7));
    const words = value.split(/\s+/);
    const lines = [];
    let line = "";
    words.forEach((word) => {
      if (!word) {
        return;
      }
      const next = line ? `${line} ${word}` : word;
      if (next.length > charsPerLine && line) {
        lines.push(line);
        line = word;
      } else {
        line = next;
      }
    });
    if (line) {
      lines.push(line);
    }
    for (let i = 0; i < lines.length && i < maxLines; i += 1) {
      const node = document.createElement("div");
      node.textContent = lines[i];
      node.style.position = "absolute";
      node.style.left = "0px";
      node.style.top = `${i * lineHeight}px`;
      node.style.height = `${lineHeight}px`;
      node.style.lineHeight = `${lineHeight}px`;
      node.style.fontSize = "12px";
      node.style.whiteSpace = "nowrap";
      textLayer.appendChild(node);
    }
    return textLayer;
  }

  async function updateStructuredTextOverlayForPage(page, container, img) {
    if (String(img.dataset.page) !== String(page)) {
      return;
    }
    const text = await getStructuredPageText(page);
    if (!text) {
      removeTextOverlay(container);
      return;
    }
    const imgWidth = img.clientWidth || img.naturalWidth || 0;
    const imgHeight = img.clientHeight || img.naturalHeight || 0;
    if (!imgWidth || !imgHeight) {
      return;
    }
    let overlay = container.querySelector(".text-overlay");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.className = "text-overlay";
      container.appendChild(overlay);
    }
    overlay.style.width = `${imgWidth}px`;
    overlay.style.height = `${imgHeight}px`;
    const textLayer = buildStructuredTextLayer(text, imgWidth, imgHeight);
    if (!textLayer) {
      removeTextOverlay(container);
      return;
    }
    overlay.innerHTML = "";
    overlay.appendChild(textLayer);
  }

  function handleSelectionStart(event, container) {
    if (!state.copyMode) {
      return;
    }
    if (event.button !== 0) {
      return;
    }
    event.preventDefault();
    const img = container.querySelector("img");
    if (!img || !img.src) {
      return;
    }
    const overlay = container.querySelector(".text-overlay");
    if (!overlay && state.bookFormat !== "structured") {
      return;
    }
    if (container.setPointerCapture) {
      container.setPointerCapture(event.pointerId);
    }

    const rect = container.getBoundingClientRect();
    const startX = clamp(event.clientX - rect.left, 0, rect.width);
    const startY = clamp(event.clientY - rect.top, 0, rect.height);

    const selection = document.createElement("div");
    selection.className = "selection-rect";
    selection.style.left = `${startX}px`;
    selection.style.top = `${startY}px`;
    selection.style.width = "1px";
    selection.style.height = "1px";
    container.appendChild(selection);

    const stateSelection = {
      container,
      overlay,
      img,
      rect,
      startX,
      startY,
      selection,
    };

    const onMove = (moveEvent) => {
      const currentX = clamp(moveEvent.clientX - rect.left, 0, rect.width);
      const currentY = clamp(moveEvent.clientY - rect.top, 0, rect.height);
      const left = Math.min(startX, currentX);
      const top = Math.min(startY, currentY);
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      selection.style.left = `${left}px`;
      selection.style.top = `${top}px`;
      selection.style.width = `${width}px`;
      selection.style.height = `${height}px`;
    };

    const onUp = (upEvent) => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      if (container.releasePointerCapture) {
        container.releasePointerCapture(upEvent.pointerId);
      }
      const endX = clamp(upEvent.clientX - rect.left, 0, rect.width);
      const endY = clamp(upEvent.clientY - rect.top, 0, rect.height);
      finalizeSelection(stateSelection, endX, endY);
    };

    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  }

  function canGrab() {
    if (!els.viewer) {
      return false;
    }
    if (state.copyMode) {
      return false;
    }
    const epsilon = state.fitMode === "fit-page" ? 3 : 1;
    return (
      els.viewer.scrollWidth - els.viewer.clientWidth > epsilon ||
      els.viewer.scrollHeight - els.viewer.clientHeight > epsilon
    );
  }

  function updateGrabCursor() {
    if (!els.viewer) {
      return;
    }
    const allowGrab = canGrab();
    els.viewer.classList.toggle("can-grab", allowGrab);
    if (!allowGrab) {
      els.viewer.classList.remove("grabbing");
    }
    if (state.copyMode) {
      els.viewer.classList.remove("turn-left");
      els.viewer.classList.remove("turn-right");
    }
  }

  function handleGrabStart(event) {
    if (!canGrab()) {
      return;
    }
    if (event.button !== 0) {
      return;
    }
    if (event.pointerType === "touch") {
      return;
    }
    const turnAction = getPageTurnAction(event.clientX, event.clientY);
    if (turnAction) {
      return;
    }
    if (event.target && event.target.closest && event.target.closest("button, input, textarea, a")) {
      return;
    }
    event.preventDefault();
    state.grab.active = true;
    state.grab.pointerId = event.pointerId;
    state.grab.startX = event.clientX;
    state.grab.startY = event.clientY;
    state.grab.startScrollLeft = els.viewer.scrollLeft;
    state.grab.startScrollTop = els.viewer.scrollTop;
    state.grab.moved = false;
    state.grab.maxDelta = 0;
    state.grab.blockClick = false;
    els.viewer.classList.add("grabbing");
    if (els.viewer.setPointerCapture) {
      els.viewer.setPointerCapture(event.pointerId);
    }
  }

  function handleGrabMove(event) {
    if (!state.grab.active) {
      return;
    }
    if (event.pointerId !== state.grab.pointerId) {
      return;
    }
    event.preventDefault();
    const dx = event.clientX - state.grab.startX;
    const dy = event.clientY - state.grab.startY;
    const maxDelta = Math.max(Math.abs(dx), Math.abs(dy));
    if (maxDelta > state.grab.maxDelta) {
      state.grab.maxDelta = maxDelta;
    }
    if (!state.grab.moved && maxDelta > 6) {
      state.grab.moved = true;
    }
    els.viewer.scrollLeft = state.grab.startScrollLeft - dx;
    els.viewer.scrollTop = state.grab.startScrollTop - dy;
  }

  function handleGrabEnd(event) {
    if (!state.grab.active) {
      return;
    }
    if (event.pointerId !== state.grab.pointerId) {
      return;
    }
    state.grab.active = false;
    state.grab.pointerId = null;
    // Suppress only the synthetic click after a real drag.
    if (state.grab.maxDelta > 12) {
      state.grab.blockClick = true;
    }
    els.viewer.classList.remove("grabbing");
    if (els.viewer.releasePointerCapture) {
      els.viewer.releasePointerCapture(event.pointerId);
    }
    updateGrabCursor();
  }

  function handlePageTurnHover(event) {
    if (!els.viewer) {
      return;
    }
    if (state.copyMode) {
      clearPageTurnHover();
      return;
    }
    if (state.grab.active) {
      clearPageTurnHover();
      return;
    }
    if (state.pageSwipe.active) {
      return;
    }
    const action = getPageTurnAction(event.clientX, event.clientY);
    if (action === "prev") {
      els.viewer.classList.add("turn-left");
