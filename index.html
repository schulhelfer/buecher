      els.viewer.classList.remove("turn-right");
    } else if (action === "next") {
      els.viewer.classList.add("turn-right");
      els.viewer.classList.remove("turn-left");
    } else {
      clearPageTurnHover();
    }
  }

  function clearPageTurnHover() {
    if (!els.viewer) {
      return;
    }
    els.viewer.classList.remove("turn-left");
    els.viewer.classList.remove("turn-right");
  }

  function handlePageTurnClick(event) {
    if (!state.pageCount) {
      return;
    }
    if (state.copyMode) {
      return;
    }
    if (!els.viewer) {
      return;
    }
    if (state.grab.blockClick) {
      state.grab.blockClick = false;
      return;
    }
    if (event.defaultPrevented) {
      return;
    }
    if (event.target && event.target.closest && event.target.closest("button, input, textarea, a")) {
      return;
    }
    const action = getPageTurnAction(event.clientX, event.clientY);
    if (action === "prev") {
      event.preventDefault();
      runPageTurnClickTransition("prev");
    } else if (action === "next") {
      event.preventDefault();
      runPageTurnClickTransition("next");
    }
  }

  function getVisiblePagesForPage(page) {
    if (page === null || page === undefined) {
      return [];
    }
    if (state.viewMode === "single") {
      return [page];
    }
    const first = getFirstPage();
    if (state.book.firstPageIsCover && page === first) {
      return [first];
    }
    const left = page;
    const right = left + 1;
    if (right <= getLastPageNumber()) {
      return [left, right];
    }
    return [left];
  }

  function getVisiblePageSpanWidthInViewer() {
    if (!els.viewer || !els.viewer.getBoundingClientRect) {
      return 0;
    }
    const viewerRect = els.viewer.getBoundingClientRect();
    const containers = [els.pageLeft, els.pageRight].filter(
      (el) => el && !el.classList.contains("hidden")
    );
    if (!containers.length) {
      return 0;
    }
    let minLeft = null;
    let maxRight = null;
    containers.forEach((el) => {
      const rect = el.getBoundingClientRect();
      const left = Math.max(rect.left, viewerRect.left);
      const right = Math.min(rect.right, viewerRect.right);
      if (right <= left) {
        return;
      }
      if (minLeft === null || left < minLeft) {
        minLeft = left;
      }
      if (maxRight === null || right > maxRight) {
        maxRight = right;
      }
    });
    if (minLeft === null || maxRight === null || maxRight <= minLeft) {
      return 0;
    }
    return maxRight - minLeft;
  }

  function getSwipeTargetPage(direction) {
    const first = getFirstPage();
    let candidate = state.currentPage;
    if (direction === "next") {
      if (state.viewMode === "single") {
        candidate = state.currentPage + 1;
      } else if (state.book.firstPageIsCover && state.currentPage === first) {
        candidate = first + 1;
      } else {
        candidate = state.currentPage + 2;
      }
    } else if (direction === "prev") {
      if (state.viewMode === "single") {
        candidate = state.currentPage - 1;
      } else if (state.book.firstPageIsCover && state.currentPage === first + 1) {
        candidate = first;
      } else {
        candidate = state.currentPage - 2;
      }
    } else {
      return null;
    }
    const normalized = normalizePage(candidate);
    if (!Number.isFinite(normalized) || normalized === state.currentPage) {
      return null;
    }
    return normalized;
  }

  function clearPageSwipePreview() {
    const swipe = state.pageSwipe;
    if (swipe.animation && typeof swipe.animation.cancel === "function") {
      try {
        swipe.animation.cancel();
      } catch (error) {}
    }
    swipe.animation = null;
    if (swipe.layer && swipe.layer.remove) {
      swipe.layer.remove();
    }
    if (!state.pageTransitionCleanup) {
      unlockPageTurnScrollbars();
    }
    swipe.layer = null;
    swipe.direction = "";
    swipe.targetPage = null;
    swipe.width = 0;
    swipe.startTranslateX = 0;
    swipe.currentTranslateX = 0;
  }

  function updatePageSwipeTranslate(x) {
    const swipe = state.pageSwipe;
    if (!swipe.layer) {
      return;
    }
    swipe.currentTranslateX = x;
    swipe.layer.style.transform = `translateX(${x}px)`;
  }

  function animatePageSwipeTo(targetX, options = {}) {
    const swipe = state.pageSwipe;
    if (!swipe.layer) {
      return Promise.resolve();
    }
    const fromX = Number.isFinite(swipe.currentTranslateX) ? swipe.currentTranslateX : swipe.startTranslateX;
    if (Math.abs(fromX - targetX) < 0.5) {
      updatePageSwipeTranslate(targetX);
      return Promise.resolve();
    }
    if (swipe.animation && typeof swipe.animation.cancel === "function") {
      try {
        swipe.animation.cancel();
      } catch (error) {}
    }
    swipe.animation = null;
    const duration = Number.isFinite(options.duration) ? options.duration : 260;
    const easing = options.easing || "cubic-bezier(0.22, 1, 0.36, 1)";
    if (typeof swipe.layer.animate === "function") {
      try {
        const animation = swipe.layer.animate(
          [
            { transform: `translateX(${fromX}px)` },
            { transform: `translateX(${targetX}px)` },
          ],
          {
            duration,
            easing,
            fill: "forwards",
          }
        );
        swipe.animation = animation;
        return (animation.finished || Promise.resolve())
          .catch(() => {})
          .then(() => {
            swipe.animation = null;
            updatePageSwipeTranslate(targetX);
          });
      } catch (error) {}
    }
    swipe.layer.style.transition = `transform ${duration}ms ${easing}`;
    swipe.layer.style.transform = `translateX(${targetX}px)`;
    return new Promise((resolve) => {
      setTimeout(() => {
        if (swipe.layer) {
          swipe.layer.style.transition = "";
        }
        updatePageSwipeTranslate(targetX);
        resolve();
      }, duration);
    });
  }

  function createPageSwipeLayer(direction, targetPage) {
    if (!els.viewer || !els.pageSpread || !direction || !Number.isFinite(targetPage)) {
      return null;
    }
    const spreadRect = els.pageSpread.getBoundingClientRect();
    if (!spreadRect.width || !spreadRect.height) {
      return null;
    }
    const viewerRect = els.viewer.getBoundingClientRect();
    const left = els.viewer.scrollLeft + (spreadRect.left - viewerRect.left);
    const top = els.viewer.scrollTop + (spreadRect.top - viewerRect.top);
    const pages = getVisiblePagesForPage(targetPage);
    if (!pages.length) {
      return null;
    }

    const layer = document.createElement("div");
    layer.className =
      direction === "prev" ? "page-swipe-layer page-swipe-prev" : "page-swipe-layer page-swipe-next";
    layer.style.left = `${left}px`;
    layer.style.top = `${top}px`;
    layer.style.width = `${spreadRect.width}px`;
    layer.style.height = `${spreadRect.height}px`;
    layer.style.transition = "none";

    const clone = els.pageSpread.cloneNode(true);
    clone.removeAttribute("id");
    clone.querySelectorAll("[id]").forEach((el) => el.removeAttribute("id"));
    clone.querySelectorAll(".text-overlay").forEach((el) => el.remove());
    clone.querySelectorAll(".selection-rect").forEach((el) => el.remove());
    clone.querySelectorAll(".copy-toast").forEach((el) => el.remove());

    const containers = Array.from(clone.querySelectorAll(".page-container"));
    const images = Array.from(clone.querySelectorAll("img"));
    const labels = Array.from(clone.querySelectorAll(".page-label"));
    const assignClonePage = (index, page) => {
      const container = containers[index];
      const img = images[index];
      const label = labels[index];
      if (!container || !img) {
        return;
      }
      if (page === null || page === undefined) {
        container.classList.add("hidden");
        img.removeAttribute("src");
        img.removeAttribute("data-page");
        if (label) {
          label.textContent = "";
        }
        return;
      }
      container.classList.remove("hidden");
      const pageLabel = formatPageLabel(page);
      const pagePath = getPagePath(page);
      img.alt = pageLabel;
      img.dataset.page = String(page);
      if (pagePath) {
        img.src = pagePath;
      } else {
        img.removeAttribute("src");
      }
      if (label) {
        label.textContent = pageLabel;
      }
    };
    assignClonePage(0, pages[0]);
    assignClonePage(1, pages[1]);
    clone.classList.toggle("spread-mode", state.viewMode === "spread");
    clone.classList.toggle("dual-page", pages.length === 2);

    layer.appendChild(clone);
    els.viewer.appendChild(layer);
    return layer;
  }

  function runPageTurnClickTransition(direction) {
    if (!direction || !els.viewer || !els.pageSpread) {
      return;
    }
    const targetPage = getSwipeTargetPage(direction);
    if (!Number.isFinite(targetPage)) {
      return;
    }
    if (typeof state.pageTransitionCleanup === "function") {
      state.pageTransitionCleanup();
    }
    clearPageSwipePreview();
    const layer = createPageSwipeLayer(direction, targetPage);
    if (!layer) {
      goToPage(targetPage, { alignSpread: false });
      return;
    }
    const width =
      getVisiblePageSpanWidthInViewer() ||
      layer.getBoundingClientRect().width ||
      els.pageSpread.getBoundingClientRect().width;
    if (!width) {
      layer.remove();
      goToPage(targetPage, { alignSpread: false });
      return;
    }
    state.pageSwipe.direction = direction;
    state.pageSwipe.targetPage = targetPage;
    state.pageSwipe.layer = layer;
    state.pageSwipe.width = width;
    state.pageSwipe.startTranslateX = direction === "next" ? width : -width;
    state.pageSwipe.currentTranslateX = state.pageSwipe.startTranslateX;
    updatePageSwipeTranslate(state.pageSwipe.startTranslateX);
    lockPageTurnScrollbars();
    animatePageSwipeTo(0, {
      duration: 520,
      easing: "cubic-bezier(0.22, 1, 0.36, 1)",
    }).then(() => {
      goToPage(targetPage, { silent: true, alignSpread: false });
      requestAnimationFrame(() => {
        clearPageSwipePreview();
      });
    });
  }

  function handlePageSwipeStart(event) {
    if (!state.pageCount) {
      return;
    }
    if (state.copyMode) {
      return;
    }
    if (event.button !== 0) {
      return;
    }
    if (
      event.target &&
      event.target.closest &&
      event.target.closest("button, input, textarea, a, label")
    ) {
      return;
    }
    // Keep mouse drag-to-pan when viewport is scrollable, except in page-turn edge zones.
    const edgeTurnAction = getPageTurnAction(event.clientX, event.clientY);
    if (event.pointerType === "mouse" && canGrab() && !edgeTurnAction) {
      return;
    }
    clearPageSwipePreview();
    state.pageSwipe.active = true;
    state.pageSwipe.pointerId = event.pointerId;
    state.pageSwipe.startX = event.clientX;
    state.pageSwipe.startY = event.clientY;
    state.pageSwipe.lastX = event.clientX;
    state.pageSwipe.lastY = event.clientY;
    state.pageSwipe.direction = "";
    state.pageSwipe.targetPage = null;
    state.pageSwipe.width = 0;
    state.pageSwipe.startTranslateX = 0;
    state.pageSwipe.currentTranslateX = 0;
    if (els.viewer) {
      els.viewer.classList.add("swiping");
      lockPageTurnScrollbars();
      els.viewer.classList.remove("turn-left");
      els.viewer.classList.remove("turn-right");
    }
    if (els.pageSpread && els.pageSpread.setPointerCapture) {
      els.pageSpread.setPointerCapture(event.pointerId);
    }
  }

  function handlePageSwipeMove(event) {
    if (!state.pageSwipe.active) {
      return;
    }
    if (event.pointerId !== state.pageSwipe.pointerId) {
      return;
    }
    state.pageSwipe.lastX = event.clientX;
    state.pageSwipe.lastY = event.clientY;
    if (!els.viewer) {
      return;
    }
    const swipe = state.pageSwipe;
    const dx = event.clientX - state.pageSwipe.startX;
    const dy = event.clientY - state.pageSwipe.startY;
    const minDirection = 6;
    if (!swipe.direction) {
      if (Math.abs(dx) < minDirection || Math.abs(dx) <= Math.abs(dy) * 1.1) {
        els.viewer.classList.remove("turn-left");
        els.viewer.classList.remove("turn-right");
        return;
      }
      swipe.direction = dx < 0 ? "next" : "prev";
      swipe.targetPage = getSwipeTargetPage(swipe.direction);
      if (!Number.isFinite(swipe.targetPage)) {
        clearPageSwipePreview();
        return;
      }
      swipe.layer = createPageSwipeLayer(swipe.direction, swipe.targetPage);
      if (!swipe.layer) {
        clearPageSwipePreview();
        return;
      }
      swipe.width =
        getVisiblePageSpanWidthInViewer() ||
        swipe.layer.getBoundingClientRect().width ||
        els.pageSpread.getBoundingClientRect().width;
      swipe.startTranslateX = swipe.direction === "next" ? swipe.width : -swipe.width;
      swipe.currentTranslateX = swipe.startTranslateX;
      updatePageSwipeTranslate(swipe.startTranslateX);
    }
    if (!swipe.layer || !swipe.width) {
      return;
    }
    if (event.cancelable) {
      event.preventDefault();
    }
    let nextX = swipe.startTranslateX + dx;
    if (swipe.direction === "next") {
      nextX = Math.max(0, Math.min(swipe.width, nextX));
    } else {
      nextX = Math.min(0, Math.max(-swipe.width, nextX));
    }
    updatePageSwipeTranslate(nextX);
    state.grab.blockClick = true;
    els.viewer.classList.remove("turn-left");
    els.viewer.classList.remove("turn-right");
  }

  function handlePageSwipeEnd(event) {
    if (!state.pageSwipe.active) {
      return;
    }
    if (event.pointerId !== state.pageSwipe.pointerId) {
      return;
    }
    if (els.pageSpread && els.pageSpread.releasePointerCapture) {
      els.pageSpread.releasePointerCapture(event.pointerId);
    }
    const swipe = state.pageSwipe;
    const direction = swipe.direction;
    const targetPage = swipe.targetPage;
    const width = swipe.width;
    const currentX = swipe.currentTranslateX;
    const startX = swipe.startTranslateX;
    state.pageSwipe.active = false;
    state.pageSwipe.pointerId = null;
    if (els.viewer) {
      els.viewer.classList.remove("swiping");
      els.viewer.classList.remove("turn-left");
      els.viewer.classList.remove("turn-right");
    }
    if (!swipe.layer || !width || !direction) {
      clearPageSwipePreview();
      return;
    }
    state.grab.blockClick = true;
    const progress =
      direction === "next"
        ? (width - currentX) / width
        : (currentX + width) / width;
    const shouldCommit = progress >= 0.10;
    const targetX = shouldCommit ? 0 : startX;
    animatePageSwipeTo(targetX, {
      duration: shouldCommit ? 260 : 220,
      easing: "cubic-bezier(0.22, 1, 0.36, 1)",
    }).then(() => {
      if (shouldCommit && Number.isFinite(targetPage)) {
        goToPage(targetPage, { silent: true, alignSpread: false });
        requestAnimationFrame(() => {
          clearPageSwipePreview();
        });
        return;
      }
      clearPageSwipePreview();
    });
  }

  function handlePageSwipeCancel(event) {
    if (!state.pageSwipe.active) {
      return;
    }
    if (event.pointerId !== state.pageSwipe.pointerId) {
      return;
    }
    if (els.pageSpread && els.pageSpread.releasePointerCapture) {
      els.pageSpread.releasePointerCapture(event.pointerId);
    }
    state.pageSwipe.active = false;
    state.pageSwipe.pointerId = null;
    if (els.viewer) {
      els.viewer.classList.remove("swiping");
      els.viewer.classList.remove("turn-left");
      els.viewer.classList.remove("turn-right");
    }
    if (state.pageSwipe.layer && state.pageSwipe.width) {
      animatePageSwipeTo(state.pageSwipe.startTranslateX, {
        duration: 180,
        easing: "cubic-bezier(0.22, 1, 0.36, 1)",
      }).then(() => {
        clearPageSwipePreview();
      });
    } else {
      clearPageSwipePreview();
    }
  }

  function getPageTurnAction(clientX, clientY) {
    const edgeRatio = 0.1;
    const viewerRect = els.viewer && els.viewer.getBoundingClientRect
      ? els.viewer.getBoundingClientRect()
      : null;
    const visibleRect = (rect) => {
      if (!rect) {
        return null;
      }
      if (!viewerRect) {
        return rect;
      }
      const left = Math.max(rect.left, viewerRect.left);
      const right = Math.min(rect.right, viewerRect.right);
      const top = Math.max(rect.top, viewerRect.top);
      const bottom = Math.min(rect.bottom, viewerRect.bottom);
      if (right <= left || bottom <= top) {
        return null;
      }
      return { left, right, top, bottom };
    };
    const left =
      els.pageLeft && !els.pageLeft.classList.contains("hidden") ? els.pageLeft : null;
    const right =
      els.pageRight && !els.pageRight.classList.contains("hidden") ? els.pageRight : null;
    const dual = Boolean(left && right);

    if (dual && left && right) {
      const leftRect = left.getBoundingClientRect();
      const rightRect = right.getBoundingClientRect();
      const totalLeft = Math.min(leftRect.left, rightRect.left);
      const totalRight = Math.max(leftRect.right, rightRect.right);
      const totalTop = Math.min(leftRect.top, rightRect.top);
      const totalBottom = Math.max(leftRect.bottom, rightRect.bottom);
      const visible = visibleRect({
        left: totalLeft,
        right: totalRight,
        top: totalTop,
        bottom: totalBottom,
      });
      if (visible && clientX >= visible.left && clientX <= visible.right && clientY >= visible.top && clientY <= visible.bottom) {
        const edgeSize = Math.max(12, (visible.right - visible.left) * edgeRatio);
        if (clientX <= visible.left + edgeSize) {
          return "prev";
        }
        if (clientX >= visible.right - edgeSize) {
          return "next";
        }
      }
      return null;
    }

    if (left) {
      const rect = left.getBoundingClientRect();
      const visible = visibleRect(rect);
      if (visible && clientX >= visible.left && clientX <= visible.right && clientY >= visible.top && clientY <= visible.bottom) {
        const localX = clientX - visible.left;
        const edgeSize = Math.max(12, (visible.right - visible.left) * edgeRatio);
        if (localX <= edgeSize) {
          return "prev";
        }
        if (!dual && localX >= (visible.right - visible.left) - edgeSize) {
          return "next";
        }
      }
    }

    if (right) {
      const rect = right.getBoundingClientRect();
      const visible = visibleRect(rect);
      if (visible && clientX >= visible.left && clientX <= visible.right && clientY >= visible.top && clientY <= visible.bottom) {
        const localX = clientX - visible.left;
        const edgeSize = Math.max(12, (visible.right - visible.left) * edgeRatio);
        if (localX >= (visible.right - visible.left) - edgeSize) {
          return "next";
        }
        if (!dual && localX <= edgeSize) {
          return "prev";
        }
      }
    }

    return null;
  }

  function finalizeSelection(selectionState, endX, endY) {
    const { container, overlay, rect, startX, startY, selection } = selectionState;
    const left = Math.min(startX, endX);
    const top = Math.min(startY, endY);
    const width = Math.abs(endX - startX);
    const height = Math.abs(endY - startY);
    if (selection) {
      selection.remove();
    }
    if (width < 4 || height < 4) {
      return;
    }
    if (state.bookFormat === "structured") {
      void copySelectionImageToClipboard(selectionState, { left, top, width, height });
      return;
    }

    const selectionRect = {
      left: rect.left + left,
      top: rect.top + top,
      right: rect.left + left + width,
      bottom: rect.top + top + height,
    };

    const textLayer = overlay.querySelector(".textLayer");
    if (!textLayer) {
      return;
    }

    const pieces = [];
    const nodes = Array.from(textLayer.querySelectorAll("div"));
    nodes.forEach((node) => {
      const nodeRect = node.getBoundingClientRect();
      if (!rectsIntersect(selectionRect, nodeRect)) {
        return;
      }
      const text = (node.textContent || "").trim();
      if (text) {
        pieces.push(text);
      }
    });

    const rawText = pieces.join(" ");
    const cleaned = rawText.replace(new RegExp("\\\\s+", "g"), " ").trim();
    if (!cleaned) {
      setStatus("Kein Text in der Auswahl.", false);
      setTimeout(hideStatus, 1200);
      return;
    }
    copyToClipboard(cleaned, {
      container,
      x: left + width / 2,
      y: top + height / 2,
    });
  }

  async function copySelectionImageToClipboard(selectionState, box) {
    const { container, img, rect } = selectionState;
    if (!container || !img || !img.src) {
      return;
    }
    if (!img.complete || !img.naturalWidth || !img.naturalHeight) {
      setStatus("Bild noch nicht geladen.", false);
      setTimeout(hideStatus, 1200);
      return;
    }

    const imgRect = img.getBoundingClientRect();
    const selLeft = rect.left + box.left;
    const selTop = rect.top + box.top;
    const selRight = rect.left + box.left + box.width;
    const selBottom = rect.top + box.top + box.height;

    const cropLeft = Math.max(selLeft, imgRect.left);
    const cropTop = Math.max(selTop, imgRect.top);
    const cropRight = Math.min(selRight, imgRect.right);
    const cropBottom = Math.min(selBottom, imgRect.bottom);

    if (cropRight <= cropLeft || cropBottom <= cropTop) {
      setStatus("Kein Bildausschnitt ausgewählt.", false);
      setTimeout(hideStatus, 1200);
      return;
    }

    const scaleX = img.naturalWidth / imgRect.width;
    const scaleY = img.naturalHeight / imgRect.height;
    const sx = Math.max(0, (cropLeft - imgRect.left) * scaleX);
    const sy = Math.max(0, (cropTop - imgRect.top) * scaleY);
    const sw = Math.max(1, (cropRight - cropLeft) * scaleX);
    const sh = Math.max(1, (cropBottom - cropTop) * scaleY);

    const canvas = document.createElement("canvas");
    canvas.width = Math.round(sw);
    canvas.height = Math.round(sh);
    const ctx = canvas.getContext("2d");
    if (!ctx) {
      setStatus("Bild kopieren nicht möglich.", true);
      return;
    }
    try {
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    } catch (error) {
      setStatus("Bild kopieren nicht möglich.", true);
      return;
    }

    const blob = await new Promise((resolve) => {
      canvas.toBlob(resolve, "image/png");
    });
    if (!blob) {
      setStatus("Bild kopieren nicht möglich.", true);
      return;
    }
    if (navigator.clipboard && navigator.clipboard.write && window.ClipboardItem) {
      try {
        const item = new ClipboardItem({ "image/png": blob });
        await navigator.clipboard.write([item]);
        showCopyToast(
          container,
          box.left + box.width / 2,
          box.top + box.height / 2,
          "Bild kopiert."
        );
        setCopyMode(false);
        return;
      } catch (error) {
        setStatus("Bild kopieren nicht möglich.", true);
        return;
      }
    }
    setStatus("Bild kopieren nicht möglich.", true);
  }

  function rectsIntersect(a, b) {
    return !(b.left > a.right || b.right < a.left || b.top > a.bottom || b.bottom < a.top);
  }

  function copyToClipboard(text, toastTarget) {
    const showSuccess = () => {
      if (toastTarget && toastTarget.container) {
        showCopyToast(
          toastTarget.container,
          toastTarget.x,
          toastTarget.y,
          "Text kopiert."
        );
      } else {
        setStatus("Text kopiert.", false);
        setTimeout(hideStatus, 1200);
      }
      setCopyMode(false);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard
        .writeText(text)
        .then(showSuccess)
        .catch(() => fallbackCopy(text, toastTarget));
      return;
    }
    fallbackCopy(text, toastTarget);
  }

  function fallbackCopy(text, toastTarget) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "absolute";
    textarea.style.left = "-9999px";
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand("copy");
      if (toastTarget && toastTarget.container) {
        showCopyToast(
          toastTarget.container,
          toastTarget.x,
          toastTarget.y,
          "Text kopiert."
        );
      } else {
        setStatus("Text kopiert.", false);
        setTimeout(hideStatus, 1200);
      }
    } catch (error) {
      setStatus("Kopieren nicht möglich.", true);
    }
    textarea.remove();
  }

  function updateMaterialsForPages(pages) {
    if (!els.panelMaterial) {
      return;
    }
    if (!els.panelMaterial.classList.contains("active")) {
      return;
    }

    const requestId = (state.materialRequestId += 1);
    const container = els.panelMaterial;
    container.innerHTML = "";

    const loading = document.createElement("div");
    loading.className = "material-info";
    loading.textContent = "Material wird geladen …";
    container.appendChild(loading);

    Promise.all(pages.map((page) => loadMaterialsForPage(page)))
      .then((groups) => {
        if (requestId !== state.materialRequestId) {
          return;
        }
        try {
          container.innerHTML = "";
          let hasAny = false;

          pages.forEach((page, index) => {
            const rawEntries = Array.isArray(groups[index]) ? groups[index] : [];
            const entries = dedupeMaterialEntries(rawEntries);
            if (!entries.length) {
              return;
            }
            hasAny = true;

            const list = document.createElement("div");
            list.className = "material-list";
            const grouped = groupMaterials(entries);
            grouped.forEach((group) => {
              const node = createMaterialGroupItem(group);
              if (node) {
                list.appendChild(node);
              }
            });
            container.appendChild(list);
          });

          if (!hasAny) {
            container.textContent = "Keine Materialien für diese Seite.";
          }
        } catch (error) {
          container.textContent = "Keine Materialien für diese Seite.";
        }
      })
      .catch(() => {
        container.textContent = "Keine Materialien für diese Seite.";
      });
  }

  function groupMaterials(entries) {
    const groups = new Map();
    entries.forEach((entry) => {
      if (!entry) {
        return;
      }
      const baseName = getMaterialBaseName(entry);
      const key = baseName.toLowerCase() || String(entry.file || "").toLowerCase();
      const normalizedLabel = normalizeMaterialLabel(entry.label);
      const existing = groups.get(key);
      if (existing) {
        existing.entries.push(entry);
        if (!existing.label && normalizedLabel) {
          existing.label = normalizedLabel;
        }
        return;
      }
      groups.set(key, {
        title: baseName || entry.name || entry.file,
        label: normalizedLabel || "",
        entries: [entry],
      });
    });
    groups.forEach((group) => {
      if (!group || !Array.isArray(group.entries) || !group.entries.length) {
        return;
      }
      let pageHint = null;
      group.entries.forEach((entry) => {
        const hint = getMaterialPageHint(entry);
        if (Number.isFinite(hint)) {
          pageHint = hint;
        }
      });
      if (Number.isFinite(pageHint)) {
        group.entries.forEach((entry) => {
          if (!entry || Number.isFinite(entry.page)) {
            return;
          }
          entry.page = pageHint;
        });
      }
    });
    return Array.from(groups.values());
  }

  function getMaterialGroupKey(group) {
    if (!group || !Array.isArray(group.entries) || !group.entries.length) {
      return "";
    }
    const keys = [];
    group.entries.forEach((entry) => {
      const key = getMaterialEntryKey(entry);
      if (key) {
        keys.push(key);
      }
    });
    if (!keys.length) {
      return "";
    }
    keys.sort();
    return keys.join("|");
  }

  function getMaterialEntryKey(entry) {
    if (!entry) {
      return "";
    }
    const raw = entry.path || entry.file || entry.url || "";
    if (raw) {
      return normalizeMaterialKey(raw);
    }
    return normalizeMaterialKey(getMaterialUrl(entry));
  }

  function normalizeMaterialKey(value) {
    const raw = String(value || "").trim();
    if (!raw) {
      return "";
    }
    return stripMaterialPageParam(raw);
  }

  function stripMaterialPageParam(value) {
    if (!/\.html?(?:[?#]|$)/i.test(value)) {
      return value;
    }
    const hashIndex = value.indexOf("#");
    const baseWithQuery = hashIndex === -1 ? value : value.slice(0, hashIndex);
    const hash = hashIndex === -1 ? "" : value.slice(hashIndex + 1);
    const queryIndex = baseWithQuery.indexOf("?");
    const base = queryIndex === -1 ? baseWithQuery : baseWithQuery.slice(0, queryIndex);
    const query = queryIndex === -1 ? "" : baseWithQuery.slice(queryIndex + 1);
    const cleanedQuery = stripPageParamFromQuery(query);
    const cleanedHash = stripPageParamFromQuery(hash);
    let result = base;
    if (cleanedQuery) {
      result += `?${cleanedQuery}`;
    }
    if (cleanedHash) {
      result += `#${cleanedHash}`;
    }
    return result;
  }

  function stripPageParamFromQuery(value) {
    if (!value) {
      return "";
    }
    const parts = value.split("&").filter(Boolean);
    const filtered = parts.filter((part) => !/^page=/i.test(part));
    return filtered.join("&");
  }

  function getMaterialPageHint(entry) {
    if (!entry) {
      return null;
    }
    if (Number.isFinite(entry.page)) {
      return entry.page;
    }
    const path = String(entry.path || entry.url || "");
    return parseMaterialPageFromPath(path);
  }

  function parseMaterialPageFromPath(value) {
    const raw = String(value || "");
    if (!raw) {
      return null;
    }
    if (!/\.html?(?:[?#]|$)/i.test(raw)) {
      return null;
    }
    const match = raw.match(/[?&#]page=(\d+)/i);
    if (!match) {
      return null;
    }
    const page = parseInt(match[1], 10);
    if (!Number.isFinite(page)) {
      return null;
    }
    return page;
  }

  function normalizeMaterialLabel(label) {
    const raw = String(label || "").trim();
    if (!raw) {
      return "";
    }
    const lower = raw.toLowerCase();
    if (
      lower.indexOf("/") !== -1 ||
      lower.indexOf("vnd.") !== -1 ||
      lower.indexOf("xmlformats") !== -1 ||
      lower.startsWith("application") ||
      lower.startsWith("image") ||
      lower.startsWith("text")
    ) {
      return "";
    }
    return raw;
  }

  function stripLeadingToFirstLetter(value) {
    const raw = String(value || "").trim();
    if (!raw) {
      return "";
    }
    const cleaned = raw.replace(/^[^\p{L}]*/u, "");
    return cleaned || raw;
  }

  function getMaterialBaseName(entry) {
    if (!entry) {
      return "";
    }
    const raw = String(entry.name || entry.file || entry.path || "");
    const name = raw.split("/").pop() || raw;
    const dot = name.lastIndexOf(".");
    if (dot > 0) {
      return name.slice(0, dot);
    }
    return name;
  }

  function getMaterialExtension(entry) {
    const fromExt = String(entry.extension || "").trim();
    if (fromExt) {
      const mime = fromExt.toLowerCase();
      if (mime === "tgd-epaper" || mime === "tgd_epaper" || mime === "tgdepaper") {
        return "HTML";
      }
      if (mime.indexOf("/") !== -1) {
        const mapped = getExtensionFromMime(mime);
        if (mapped) {
          return mapped;
        }
        const subtype = mime.split("/").pop();
        let short = subtype.replace(/^vnd\\./, "");
        short = short.split(/[.+-]/).pop() || short;
        return short ? short.toUpperCase() : "DATEI";
      }
      return fromExt.replace(".", "").toUpperCase();
    }
    const file = String(entry.file || entry.path || entry.url || "");
    const name = file.split("/").pop() || file;
    const dot = name.lastIndexOf(".");
    if (dot > -1 && dot < name.length - 1) {
      return name.slice(dot + 1).toUpperCase();
    }
    return "DATEI";
  }

  function resolveResourcePath(path) {
    const normalized = normalizeFilePath(path);
    const base = normalizeFilePath(state.basePath || "");
    let resolved = "";
    if (base) {
      const trimmed = trimPathToBase(normalized, base);
      if (trimmed !== null) {
        resolved = trimmed;
      } else {
        resolved = resolvePath(path);
      }
    } else {
      resolved = resolvePath(path);
    }
    return stripRootFolderForFileLocation(resolved);
  }

  function getMaterialSortKey(entry) {
    if (!entry) {
      return 1;
    }
    const ext = getMaterialExtension(entry);
    const mime = String(entry.extension || "").toLowerCase();
    const file = String(entry.file || entry.path || entry.url || "").toLowerCase();
    if (ext === "PDF" || mime === "application/pdf" || file.endsWith(".pdf")) {
      return 0;
    }
    return 1;
  }

  function getExtensionFromMime(mime) {
    const map = {
      "application/pdf": "PDF",
      "application/msword": "DOC",
      "application/vnd.openxmlformats-officedocument.wordprocessingml.document": "DOCX",
      "application/vnd.ms-powerpoint": "PPT",
      "application/vnd.openxmlformats-officedocument.presentationml.presentation": "PPTX",
      "application/vnd.ms-excel": "XLS",
      "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": "XLSX",
      "application/zip": "ZIP",
      "application/x-zip-compressed": "ZIP",
      "text/plain": "TXT",
      "image/jpeg": "JPG",
      "image/png": "PNG",
      "image/gif": "GIF",
      "audio/mpeg": "MP3",
      "video/mp4": "MP4",
    };
    return map[mime] || "";
  }

  function stripQueryAndHashFromPath(value) {
    const raw = String(value || "");
    if (!raw) {
      return "";
    }
    const queryIndex = raw.indexOf("?");
    const hashIndex = raw.indexOf("#");
    let cut = raw.length;
    if (queryIndex !== -1) {
      cut = Math.min(cut, queryIndex);
    }
    if (hashIndex !== -1) {
      cut = Math.min(cut, hashIndex);
    }
    return raw.slice(0, cut);
  }

  function hasNonFileUrlScheme(value) {
    const raw = String(value || "");
    if (/^[a-z]:[\\/]/i.test(raw)) {
      return false;
    }
    return /^[a-z][a-z0-9+.-]*:/i.test(raw);
  }

  function normalizeLocalMaterialReference(value) {
    const raw = String(value || "").trim();
    if (!raw) {
      return "";
    }
    if (REGEX.httpProtocol.test(raw)) {
      return "";
    }
    if (hasNonFileUrlScheme(raw) && !REGEX.fileProtocol.test(raw)) {
      return "";
    }
    const bare = stripQueryAndHashFromPath(raw);
    let path = normalizeFilePath(bare);
    if (!path) {
      return "";
    }
    const base = normalizeFilePath(state.basePath || "");
    if (base) {
      const trimmed = stripPathPrefix(path, base);
      if (trimmed !== null) {
        path = trimmed;
      } else {
        const contained = stripPathToBase(path, base);
        if (contained !== null) {
          path = contained;
        }
      }
    }
    return stripRootFolderForFileLocation(path);
  }

  function canCheckLocalMaterialTargets() {
    return Boolean(state.fileMap.size || state.fileEntries.length);
  }

  function hasLocalMaterialTarget(path) {
    if (!path) {
      return false;
    }
    const normalized = normalizeFilePath(path).toLowerCase();
    if (
      state.bookFormat === "structured" &&
      normalized.includes("content/media/") &&
      !hasMediaFilesInMap() &&
      !state.fileEntries.length
    ) {
      // Dieses Format lädt initial ohne content/media in den File-Map.
      // In diesem Zustand dürfen Materiallinks nicht fälschlich ausgeblendet werden.
      return true;
    }
    if (!canCheckLocalMaterialTargets()) {
      return true;
    }
    return hasFileAtPath(path, { allowMedia: true });
  }

  function getMaterialUrl(entry) {
    if (!entry) {
      return "";
    }
    if (entry.url) {
      const rawUrl = String(entry.url).trim();
      if (!rawUrl) {
        return "";
      }
      if (
        REGEX.httpProtocol.test(rawUrl) ||
        rawUrl.startsWith("//") ||
        (hasNonFileUrlScheme(rawUrl) && !REGEX.fileProtocol.test(rawUrl))
      ) {
        return appendPdfPageTarget(rawUrl, entry);
      }
      if (
        REGEX.fileProtocol.test(rawUrl) ||
        /^[a-z]:[\\/]/i.test(rawUrl) ||
        rawUrl.startsWith("#") ||
        rawUrl.startsWith("?")
      ) {
        return appendPdfPageTarget(rawUrl, entry);
      }
      let path = rawUrl;
      if (state.bookFormat === "structured") {
        path = resolveStructuredMaterialLink(path);
      }
      const checkPath = normalizeLocalMaterialReference(path);
      if (checkPath && !hasLocalMaterialTarget(checkPath)) {
        return "";
      }
      const normalizedPath = normalizeFilePath(path);
      if (!normalizedPath) {
        return appendPdfPageTarget(rawUrl, entry);
      }
      const resolved = resolveResourcePath(normalizedPath);
      if (shouldPreferDirectMaterialPath(normalizedPath)) {
        return appendPdfPageTarget(resolved || rawUrl, entry);
      }
      const url = getResourceUrl(normalizedPath, { allowMedia: true });
      return appendPdfPageTarget(url || resolved || rawUrl, entry);
    }
    if (entry.path) {
      let path = entry.path;
      if (state.bookFormat === "structured") {
        path = resolveStructuredMaterialLink(path);
      }
      if (state.bookFormat === "structured" && /\\.html?(?:[?#]|$)/i.test(path)) {
        return appendPdfPageTarget(resolveResourcePath(path), entry);
      }
      const checkPath = normalizeLocalMaterialReference(path);
      if (checkPath && !hasLocalMaterialTarget(checkPath)) {
        return "";
      }
      const resolved = resolveResourcePath(path);
      if (shouldPreferDirectMaterialPath(path)) {
        return appendPdfPageTarget(resolved, entry);
      }
      const url = getResourceUrl(path, { allowMedia: true });
      return appendPdfPageTarget(url || resolved, entry);
    }
    if (entry.file) {
      const relative = `media/${entry.file}`;
      if (!hasLocalMaterialTarget(relative)) {
        return "";
      }
      const resolved = resolveResourcePath(relative);
      if (shouldPreferDirectMaterialPath(relative)) {
        return appendPdfPageTarget(resolved, entry);
      }
      const url = getResourceUrl(relative, { allowMedia: true });
      return appendPdfPageTarget(url || resolved, entry);
    }
    return "";
  }

  function shouldPreferDirectMaterialPath(path) {
    if (state.bookFormat !== "structured") {
      return false;
    }
    if (!path) {
      return false;
    }
    if (!window.location || window.location.protocol !== "file:") {
      return false;
    }
    const normalized = normalizeFilePath(path);
    return normalized ? !REGEX.httpProtocol.test(normalized) : false;
  }

  function appendPdfPageTarget(url, entry) {
    if (!url || !entry || !isPdfMaterialEntry(entry)) {
      return url || "";
    }
    const page = Number(entry.page);
    if (!Number.isFinite(page) || page <= 0) {
      return url;
    }
    const hashIndex = url.indexOf("#");
    if (hashIndex !== -1) {
      const base = url.slice(0, hashIndex);
      const hash = url.slice(hashIndex + 1);
      if (/(^|[&])page=/.test(hash)) {
        return url;
      }
      const joiner = hash ? "&" : "";
      return `${base}#${hash}${joiner}page=${page}`;
    }
    return `${url}#page=${page}`;
  }

  function isPdfMaterialEntry(entry) {
    if (!entry) {
      return false;
    }
    const ext = getMaterialExtension(entry);
    if (ext === "PDF") {
      return true;
    }
    const mime = String(entry.extension || "").toLowerCase();
    if (mime === "application/pdf") {
      return true;
    }
    const file = String(entry.file || entry.path || entry.url || "").toLowerCase();
    return file.endsWith(".pdf") || file.includes(".pdf?");
  }

  function resolveStructuredMaterialLink(value) {
    const normalized = normalizeStructuredMaterialPath(value);
    if (!normalized) {
      return "";
    }
    const appRelativeMatch = normalized.match(/^app\.html([?#].*)?$/i);
    if (appRelativeMatch) {
      const page = parseMaterialPageFromPath(normalized);
      const pkg = findStructuredMediaPackageForPage(page);
      if (pkg) {
        const suffix = appRelativeMatch[1] || "";
        return `content/media/${pkg}/app.html${suffix}`;
      }
    }
    const pageMatch = normalized.match(
      /^content\/media\/([^/]+)\/content\/pages\/page_(\d+)\//i
    );
    if (pageMatch) {
      return `content/media/${pageMatch[1]}/app.html?page=${pageMatch[2]}`;
    }
    const pagesRootMatch = normalized.match(
      /^content\/media\/([^/]+)\/content\/pages\/?$/i
    );
    if (pagesRootMatch) {
      return `content/media/${pagesRootMatch[1]}/app.html`;
    }
    return normalized;
  }

  function findStructuredMediaPackageForPage(pageNum) {
    if (!Number.isFinite(pageNum) || pageNum <= 0) {
      return "";
    }
    const target = String(Math.round(pageNum));
    const counts = new Map();
    const collect = (value) => {
      const lower = String(value || "").toLowerCase();
      const match = lower.match(
        /\/content\/media\/([^/]+)\/content\/pages\/page_(\d+)\/scale[1-4]\.(png|jpe?g|webp)$/
      );
      if (!match || match[2] !== target) {
        return;
      }
      const pkg = match[1];
      counts.set(pkg, (counts.get(pkg) || 0) + 1);
    };
    if (state.fileMapLower.size) {
      for (const lowerKey of state.fileMapLower.keys()) {
        collect(lowerKey);
      }
    }
    if (!counts.size && state.fileEntries.length) {
      state.fileEntries.forEach((entry) => {
        collect(entry.lower || entry.path);
      });
    }
    if (!counts.size) {
      return "";
    }
    let best = "";
    let bestCount = -1;
    counts.forEach((count, pkg) => {
      if (count > bestCount || (count === bestCount && pkg.localeCompare(best, "de") < 0)) {
        best = pkg;
        bestCount = count;
      }
    });
    return best;
  }

  function decodePathSegment(value) {
    try {
      return decodeURIComponent(value);
    } catch (error) {
      return value;
    }
  }

  function stripPathPrefix(path, prefix) {
    if (!path || !prefix) {
      return null;
    }
    const pathSegments = String(path).split("/").filter(Boolean);
    const prefixSegments = String(prefix).split("/").filter(Boolean);
    if (!prefixSegments.length || pathSegments.length <= prefixSegments.length) {
      return null;
    }
    for (let i = 0; i < prefixSegments.length; i += 1) {
      const pathSeg = decodePathSegment(pathSegments[i]).toLowerCase();
      const prefixSeg = decodePathSegment(prefixSegments[i]).toLowerCase();
      if (pathSeg !== prefixSeg) {
        return null;
      }
    }
    return pathSegments.slice(prefixSegments.length).join("/");
  }

  function stripPathToBase(path, base) {
    if (!path || !base) {
      return null;
    }
    const pathSegments = String(path).split("/").filter(Boolean);
    const baseSegments = String(base).split("/").filter(Boolean);
    if (!baseSegments.length || pathSegments.length <= baseSegments.length) {
      return null;
    }
    const pathLower = pathSegments.map((segment) =>
      decodePathSegment(segment).toLowerCase()
    );
    const baseLower = baseSegments.map((segment) =>
      decodePathSegment(segment).toLowerCase()
    );
    for (let start = pathLower.length - baseLower.length - 1; start >= 0; start -= 1) {
      let matches = true;
      for (let i = 0; i < baseLower.length; i += 1) {
        if (pathLower[start + i] !== baseLower[i]) {
          matches = false;
          break;
        }
      }
      if (matches) {
        return pathSegments.slice(start + baseLower.length).join("/");
      }
    }
    return null;
  }

  function trimPathToBase(path, base) {
    if (!path || !base) {
      return null;
    }
    const pathSegments = String(path).split("/").filter(Boolean);
    const baseSegments = String(base).split("/").filter(Boolean);
    if (!baseSegments.length || pathSegments.length < baseSegments.length) {
      return null;
    }
    const pathLower = pathSegments.map((segment) =>
      decodePathSegment(segment).toLowerCase()
    );
    const baseLower = baseSegments.map((segment) =>
      decodePathSegment(segment).toLowerCase()
    );
    for (let start = pathLower.length - baseLower.length; start >= 0; start -= 1) {
      let matches = true;
      for (let i = 0; i < baseLower.length; i += 1) {
        if (pathLower[start + i] !== baseLower[i]) {
          matches = false;
          break;
        }
      }
      if (matches) {
        return pathSegments.slice(start).join("/");
      }
    }
    return null;
  }

  function stripRootFolderForFileLocation(path) {
    if (!path) {
      return path;
    }
    if (!window.location || window.location.protocol !== "file:") {
      return path;
    }
    const root = normalizeFilePath(state.rootFolder || "");
    if (!root) {
      return path;
    }
    const locationPath = normalizeFilePath(window.location.pathname || "");
    const segments = locationPath.split("/").filter(Boolean);
    if (segments.length < 2) {
      return path;
    }
    const parentDir = decodePathSegment(segments[segments.length - 2]).toLowerCase();
    const rootLower = decodePathSegment(root).toLowerCase();
    if (parentDir !== rootLower) {
      return path;
    }
    const pathSegments = String(path).split("/").filter(Boolean);
    if (!pathSegments.length) {
      return path;
    }
    const first = decodePathSegment(pathSegments[0]).toLowerCase();
    if (first !== rootLower) {
      return path;
    }
    return pathSegments.slice(1).join("/");
  }

  function normalizeStructuredMaterialPath(value) {
    const cleaned = normalizeFilePath(value);
    if (!cleaned) {
      return "";
    }
    const base = normalizeFilePath(state.basePath || "");
    if (base) {
      const stripped = stripPathPrefix(cleaned, base);
      if (stripped !== null) {
        return stripped;
      }
      const contained = stripPathToBase(cleaned, base);
      if (contained !== null) {
        return contained;
      }
    }
    return cleaned;
  }

  function createMaterialGroupItem(group) {
    if (!group || !Array.isArray(group.entries) || !group.entries.length) {
      return null;
    }
    const rawTitle = String(group.title || "").trim();
    const displayTitle = stripLeadingToFirstLetter(rawTitle) || rawTitle;
    if (!rawTitle || !/[\\p{L}]/u.test(rawTitle)) {
      return null;
    }
    const item = document.createElement("div");
    item.className = "material-item";

    let hasAction = false;
    if (group.entries.length === 1) {
      const entry = group.entries[0];
      const url = getMaterialUrl(entry);
      if (url) {
        hasAction = true;
        item.classList.add("clickable");
        item.addEventListener("click", () => {
          window.open(url, "_blank", "noopener");
        });
        item.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            window.open(url, "_blank", "noopener");
          }
        });
        item.tabIndex = 0;
      }
    }

    const title = document.createElement("div");
    title.className = "material-title";
    title.textContent = displayTitle;
    item.appendChild(title);

    if (group.label) {
      const label = document.createElement("div");
      label.className = "material-meta";
      label.textContent = group.label;
      item.appendChild(label);
    }

    const formats = document.createElement("div");
    formats.className = "material-formats";
    const sortedEntries = group.entries.slice().sort((a, b) => {
      const aKey = getMaterialSortKey(a);
      const bKey = getMaterialSortKey(b);
      if (aKey !== bKey) {
        return aKey - bKey;
      }
      const aExt = getMaterialExtension(a);
      const bExt = getMaterialExtension(b);
      return aExt.localeCompare(bExt, "de");
    });
    sortedEntries.forEach((entry) => {
      if (!entry || (!entry.file && !entry.path && !entry.url)) {
        return;
      }
      const url = getMaterialUrl(entry);
      if (!url) {
        return;
      }
      hasAction = true;
      const link = document.createElement("a");
      link.className = "material-format";
      link.href = url;
      link.target = "_blank";
      link.rel = "noopener";
      link.textContent = getMaterialExtension(entry);
      link.addEventListener("click", (event) => event.stopPropagation());
      formats.appendChild(link);
    });
    if (formats.children.length) {
      item.appendChild(formats);
    }

    if (!hasAction) {
      return null;
    }
    return item;
  }

  async function loadMaterialsForPage(page) {
    if (state.pageMediaCache.has(page)) {
      return state.pageMediaCache.get(page);
    }
    if (state.bookFormat === "structured") {
      const entries = await loadStructuredMaterialsForPage(page);
      state.pageMediaCache.set(page, entries);
      return entries;
    }
    try {
      const data = await loadPageData(page);
      const entries = extractMaterialsFromPageData(data);
      state.pageMediaCache.set(page, entries);
      return entries;
    } catch (error) {
      return [];
    }
  }

  function loadPageData(page) {
    if (state.bookFormat === "structured") {
      return Promise.resolve(null);
    }
    const cached = state.pageDataCache.get(page);
    if (cached) {
      if (typeof cached.then === "function") {
        return cached;
      }
      return Promise.resolve(cached);
    }
    const promise = fetchJson(resolvePath(`pages/${page}.json`))
      .then((data) => {
        state.pageDataCache.set(page, data);
        return data;
      })
      .catch((error) => {
        state.pageDataCache.delete(page);
        throw error;
      });
    state.pageDataCache.set(page, promise);
    return promise;
  }

  function extractMaterialsFromPageData(data) {
    const entries = [];
    const spots = Array.isArray(data && data.spots) ? data.spots : [];
    spots.forEach((spot) => {
      const label = spot.label || spot.type || "Material";
      const description = spot.description || "";
      const media = spot.media;
      if (media && media.file) {
        entries.push({
          file: media.file,
          name: media.name || label || media.file,
          description,
          label,
          extension: media.mimeType || media.extension || "",
        });
      }
      const medien = Array.isArray(spot.medien) ? spot.medien : [];
      medien.forEach((item) => {
        if (!item.file) {
          return;
        }
        entries.push({
          file: item.file,
          name: item.name || label || item.file,
          description: item.description || description,
          label,
          extension: item.extension || item.mimeType || "",
        });
      });

      const linkEntries = Array.isArray(spot.links)
        ? spot.links
        : spot.links && typeof spot.links === "object"
        ? [spot.links]
        : [];
      linkEntries.forEach((item) => {
        if (!item || typeof item !== "object") {
          return;
        }
        const href = String(item.href || item.url || item.link || "").trim();
        if (!href) {
          return;
        }
        entries.push({
          url: href,
          name: String(item.name || label || href).trim() || href,
          description: item.description || description,
          label,
          extension: "LINK",
        });
      });
    });
    return entries;
  }

  async function ensureStructuredIndexLoaded() {
    if (state.bookFormat !== "structured") {
      return null;
    }
    if (state.structuredIndex) {
      return state.structuredIndex;
    }
    if (state.structuredIndexPromise) {
      return state.structuredIndexPromise;
    }
    if (!hasFileAtPath("data.json")) {
      return null;
    }
    const loadId = state.loadRequestId;
    const dataPath = resolvePath("data.json");
    state.structuredIndexLoad = null;
    const promise = fetchJson(dataPath)
      .then((data) => {
        state.structuredIndexPromise = null;
        if (!data || !Array.isArray(data.pages)) {
          return null;
        }
        if (state.loadRequestId !== loadId) {
          return null;
        }
        state.structuredIndex = data;
        state.structuredIndexByOriginal = null;
        const originalMap = new Map();
        data.pages.forEach((pageData, index) => {
          if (!pageData || typeof pageData !== "object") {
            return;
          }
          const originalIndex =
            typeof pageData.originalIndex === "number"
              ? pageData.originalIndex
              : Number.isFinite(pageData.originalIndex)
              ? Number(pageData.originalIndex)
              : null;
          if (Number.isFinite(originalIndex)) {
            if (!originalMap.has(originalIndex)) {
              originalMap.set(originalIndex, pageData);
            }
          }
        });
        if (originalMap.size) {
          state.structuredIndexByOriginal = originalMap;
        }
        const newCount = data.pages.length;
        if (Number.isFinite(newCount) && newCount > 0 && newCount !== state.pageCount) {
          state.pageCount = newCount;
          if (state.book) {
            state.book.pagesCount = newCount;
          }
          setPageCountText(getBookPageCount());
        }
        return data;
      })
      .catch(() => {
        state.structuredIndexPromise = null;
        return null;
      });
    state.structuredIndexPromise = promise;
    return promise;
  }

  function buildStructuredMaterialReferenceList(data) {
    if (!data || typeof data !== "object") {
      return [];
    }
    const refs = [];

    const registerMaterialObject = (material) => {
      if (!material || typeof material !== "object") {
        return;
      }
      refs.push(material);
      const keys = Object.keys(material);
      keys.forEach((key) => {
        if (key !== "attached") {
          return;
        }
        const attached = material.attached;
        if (!attached || typeof attached !== "object") {
          return;
        }
        if (Array.isArray(attached)) {
          attached.forEach((item) => registerMaterialObject(item));
        } else {
          registerMaterialObject(attached);
        }
      });
    };

    const visitMaterialsArray = (materials) => {
      if (!Array.isArray(materials)) {
        return;
      }
      materials.forEach((material) => {
        if (material && typeof material === "object") {
          registerMaterialObject(material);
        }
      });
    };

    const visitAnchor = (anchor) => {
      if (!anchor || typeof anchor !== "object") {
        return;
      }
      const keys = Object.keys(anchor);
      keys.forEach((key) => {
        if (key === "materials") {
          visitMaterialsArray(anchor.materials);
        }
      });
    };

    const visitLayer = (layer) => {
      if (!layer || typeof layer !== "object") {
        return;
      }
      const keys = Object.keys(layer);
      keys.forEach((key) => {
        if (key === "materials") {
          visitMaterialsArray(layer.materials);
        } else if (key === "anchors") {
          const anchors = layer.anchors;
          if (Array.isArray(anchors)) {
            anchors.forEach((anchor) => visitAnchor(anchor));
          }
        }
      });
    };

    const visitPage = (page) => {
      if (!page || typeof page !== "object") {
        return;
      }
      const keys = Object.keys(page);
      keys.forEach((key) => {
        if (key === "layers") {
          const layers = page.layers;
          if (Array.isArray(layers)) {
            layers.forEach((layer) => visitLayer(layer));
          }
        } else if (key === "materials") {
          visitMaterialsArray(page.materials);
        } else if (key === "anchors") {
          const anchors = page.anchors;
          if (Array.isArray(anchors)) {
            anchors.forEach((anchor) => visitAnchor(anchor));
          }
        }
      });
    };

    if (Array.isArray(data.pages)) {
      data.pages.forEach((page) => visitPage(page));
    }
    return refs;
  }

  function getStructuredMaterialLookup(data) {
    if (!data || typeof data !== "object") {
      return null;
    }
    const lookup =
      data.materials || data.media || data.material || data.medien || null;
    if (Array.isArray(lookup)) {
      return lookup;
    }
    if (Array.isArray(data.__materialRefs)) {
      return data.__materialRefs;
    }
    if (!Array.isArray(data.pages)) {
      return null;
    }
    const built = buildStructuredMaterialReferenceList(data);
    data.__materialRefs = built;
    return built;
  }

  function extractStructuredMaterialEntries(material, lookup) {
    if (!material || typeof material !== "object") {
      return [];
    }
    const content = material.content || {};
    const external = content.External || content.external || null;
    const container = external ? external.e || external.E || external : null;
    const files = container && Array.isArray(container.files) ? container.files : [];
    if (!files.length) {
      return [];
    }
    const title = String(container.title || material.title || material.label || "").trim();
    const subtitle = String(container.subtitle || material.subtitle || "").trim();
    const description = String(container.text || "").trim();
    const entries = [];
    files.forEach((file) => {
      if (!file || typeof file !== "object") {
        return;
      }
      const src = String(file.src || file.url || file.path || "").trim();
      if (!src) {
        return;
      }
      const isRemote = /^https?:/i.test(src);
      entries.push({
        url: isRemote ? src : "",
        path: isRemote ? "" : normalizeStructuredMaterialPath(src),
        name:
          title ||
          String(file.title || file.label || file.name || src).trim() ||
          src,
        label: subtitle || String(file.label || "").trim(),
        description,
        extension: file.extension || file.type || file.mimeType || (isRemote ? "LINK" : ""),
      });
    });
    return entries;
  }

  function extractStructuredMaterialsFromIndexPage(pageData, lookup) {
    const entries = [];
    if (!pageData || typeof pageData !== "object") {
      return entries;
    }
    const resolveMaterialRef = (material) => {
      if (!lookup) {
        return material;
      }
      if (typeof material === "number" && Number.isFinite(material)) {
        return lookup[material] || material;
      }
      if (typeof material === "string" && REGEX.numeric.test(material)) {
        const index = parseInt(material, 10);
        if (Number.isFinite(index)) {
          return lookup[index] || material;
        }
      }
      return material;
    };

    const addMaterials = (materials) => {
      if (!Array.isArray(materials)) {
        return;
      }
      materials.forEach((material) => {
        const target = resolveMaterialRef(material);
        const extracted = extractStructuredMaterialEntries(target, lookup);
        if (extracted.length) {
          entries.push(...extracted);
        }
      });
    };
    const layers = Array.isArray(pageData.layers) ? pageData.layers : [];
    layers.forEach((layer) => {
      if (!layer || typeof layer !== "object") {
        return;
      }
      addMaterials(layer.materials);
      const anchors = Array.isArray(layer.anchors) ? layer.anchors : [];
      anchors.forEach((anchor) => {
        if (!anchor || typeof anchor !== "object") {
          return;
        }
        addMaterials(anchor.materials);
      });
    });
    return entries;
  }

  function getAppHtmlMaterialLabel(anchor) {
    if (!anchor) {
      return "";
    }
    const explicit =
      anchor.getAttribute("data-material-name") ||
      Array.from(anchor.attributes || [])
        .filter((attr) => /^data-[a-z0-9-]+-name$/i.test(attr.name))
        .map((attr) => String(attr.value || "").trim())
        .find(Boolean) ||
      "";
    if (explicit) {
      return explicit;
    }
    const content = anchor.closest(".content");
    if (content) {
      const label = content.querySelector("h3 label") || content.querySelector("h3");
      if (label && label.textContent) {
        return label.textContent.trim();
      }
    }
    return "";
  }

  function buildStructuredMaterialsFromAppHtml(appHtml) {
    const map = new Map();
    const raw = String(appHtml || "");
    if (!raw) {
      return map;
    }
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(raw, "text/html");
      const pages = Array.from(doc.querySelectorAll(".page"));
      pages.forEach((pageEl, index) => {
        const pageNumber = extractStructuredPageNumberFromAppPage(pageEl, index);
        if (!Number.isFinite(pageNumber)) {
          return;
        }
        const anchors = Array.from(pageEl.querySelectorAll(".materials a[href]"));
        if (!anchors.length) {
          return;
        }
        const entries = [];
        anchors.forEach((anchor) => {
          const href = String(anchor.getAttribute("href") || "").trim();
          if (!href || href.startsWith("?page=") || href.startsWith("#page=")) {
            return;
          }
          const isRemote = /^https?:/i.test(href);
          const label = getAppHtmlMaterialLabel(anchor);
          const entry = {
            url: isRemote ? href : "",
            path: isRemote ? "" : normalizeStructuredMaterialPath(href),
            name: label || href.split("/").pop() || href,
            label: "",
            extension: anchor.getAttribute("data-file-type") || (isRemote ? "LINK" : ""),
          };
          entries.push(entry);
        });
        if (entries.length) {
          map.set(pageNumber, entries);
        }
      });
    } catch (error) {
      return map;
    }
    return map;
  }

  async function ensureStructuredAppMaterialsIndex() {
    if (state.bookFormat !== "structured") {
      return null;
    }
    if (state.structuredAppMaterials) {
      return state.structuredAppMaterials;
    }
    if (state.structuredAppMaterialsPromise) {
      return state.structuredAppMaterialsPromise;
    }
    state.structuredAppMaterialsPromise = (async () => {
      const appHtml = await fetchText(resolvePath("app.html")).catch(() => "");
      state.structuredAppMaterials = buildStructuredMaterialsFromAppHtml(appHtml);
      return state.structuredAppMaterials;
    })().finally(() => {
      state.structuredAppMaterialsPromise = null;
    });
    return state.structuredAppMaterialsPromise;
  }

  function hasMaterialsInIndexPage(pageData) {
    if (!pageData || typeof pageData !== "object") {
      return false;
    }
    const layers = Array.isArray(pageData.layers) ? pageData.layers : [];
    for (const layer of layers) {
      if (!layer || typeof layer !== "object") {
        continue;
      }
      const materials = layer.materials;
      if (Array.isArray(materials) && materials.length) {
        return true;
      }
      const anchors = Array.isArray(layer.anchors) ? layer.anchors : [];
      for (const anchor of anchors) {
        if (!anchor || typeof anchor !== "object") {
          continue;
        }
        const anchorMaterials = anchor.materials;
        if (Array.isArray(anchorMaterials) && anchorMaterials.length) {
          return true;
        }
      }
    }
    return false;
  }

  function dedupeMaterialEntries(entries) {
    const seen = new Set();
    const seenPagesByBase = new Map();
    const result = [];
    entries.forEach((entry) => {
      if (!entry) {
        return;
      }
      if (shouldHideMaterialEntry(entry)) {
        return;
      }
      const keyBase = (entry.url || entry.path || entry.file || "").toLowerCase();
      if (!keyBase) {
        return;
      }
      const extKey = String(entry.extension || "").toLowerCase();
      const pageHint = getMaterialPageHint(entry);
      if (Number.isFinite(pageHint)) {
        const normalizedBase = normalizeMaterialKey(keyBase);
        const baseKey = `${normalizedBase}|${extKey}`;
        const seenPages = seenPagesByBase.get(baseKey) || [];
        if (seenPages.some((page) => Math.abs(page - pageHint) <= 1)) {
          return;
        }
        seenPages.push(pageHint);
        seenPagesByBase.set(baseKey, seenPages);
      }
      const key = `${keyBase}|${extKey}`;
      if (seen.has(key)) {
        return;
      }
      seen.add(key);
      result.push(entry);
    });
    return result;
  }

  function shouldHideMaterialEntry(entry) {
    if (!entry || typeof entry !== "object") {
      return false;
    }
    const textParts = [
      entry.name,
      entry.label,
      entry.description,
      entry.url,
      entry.path,
      entry.file,
    ];
    const haystack = textParts
      .map((value) => String(value || "").trim())
      .filter(Boolean)
      .join(" ");
    if (!haystack) {
      return false;
    }
    return HIDDEN_MATERIAL_PATTERNS.some((pattern) => pattern.test(haystack));
  }

  async function loadStructuredIndexMaterialsForPage(page) {
    const data = await ensureStructuredIndexLoaded();
    if (!data || !Array.isArray(data.pages)) {
      return [];
    }
    const index = Number(page) - Number(state.pageBase || 0);
    if (!Number.isFinite(index) || index < 0) {
      return [];
    }
    const lookup = getStructuredMaterialLookup(data);
    let pageData = null;
    if (state.structuredIndexByOriginal) {
      pageData = state.structuredIndexByOriginal.get(Number(page)) || null;
    }
    if (!pageData) {
      pageData = data.pages[index];
    }
    if (!pageData) {
      return [];
    }
    return extractStructuredMaterialsFromIndexPage(pageData, lookup);
  }

  async function loadStructuredMaterialsForPage(page) {
    const entries = [];
    const indexEntries = await loadStructuredIndexMaterialsForPage(page);
    if (indexEntries.length) {
      entries.push(...indexEntries);
    }
    if (!entries.length) {
      const appIndex = await ensureStructuredAppMaterialsIndex();
      if (appIndex && appIndex.size) {
        const pageNum = Number(page);
        if (Number.isFinite(pageNum) && appIndex.has(pageNum)) {
          entries.push(...(appIndex.get(pageNum) || []));
        }
      }
    }

    if (!entries.length) {
      const index = await ensureStructuredMaterialsIndex();
      if (!index) {
        return [];
      }
      const pageNum = Number(page);
      index.pagePackages.forEach((pkg) => {
        const relPath = resolveStructuredMediaPageImagePath(pkg, pageNum);
        if (!relPath) {
          return;
        }
        const title =
          (index.packageTitles && index.packageTitles.get(pkg)) || formatStructuredPackageName(pkg);
        entries.push({
          path: relPath,
          name: title,
          label: "",
        });
      });

      index.kvRanges.forEach((range) => {
        if (pageNum < range.start || pageNum > range.end) {
          return;
        }
        if (!hasFileAtPath(range.path, { allowMedia: true })) {
          return;
        }
        entries.push({
          path: range.path,
          name: range.title,
          label: "",
        });
      });
    }

    return dedupeMaterialEntries(entries);
  }

  function resolveStructuredMediaPageImagePath(pkg, pageNum) {
    const base = `content/media/${pkg}/content/pages/page_${pageNum}/`;
    for (const scale of getStructuredScaleCandidates()) {
      const relPath = `${base}${scale}`;
      if (hasFileAtPath(relPath, { allowMedia: true })) {
        return relPath;
      }
    }
    return "";
  }

  async function ensureStructuredMaterialsIndex() {
    if (state.bookFormat !== "structured") {
      return null;
    }
    if (state.structuredMaterials) {
      return state.structuredMaterials;
    }
    const built = await buildStructuredMaterialsIndex();
    state.structuredMaterials = built;
    return built;
  }

  async function buildStructuredMaterialsIndex() {
    const base = normalizeFilePath(state.basePath || "");
    const baseLower = base.toLowerCase();
    const pagePackages = new Map();
    const kvRanges = [];

    if (state.directoryHandle && !hasMediaFilesInMap()) {
      await buildFileMapForBookFromDirectoryHandle(state.basePath, {
        mediaOnly: true,
        append: true,
      });
    }

    const scanEntry = (lowerKey, actualKey) => {
      if (baseLower && !lowerKey.startsWith(baseLower + "/")) {
        return;
      }
      const rel = baseLower ? actualKey.slice(baseLower.length + 1) : actualKey;
      const relLower = rel.toLowerCase();
      if (!relLower.startsWith("content/media/")) {
        return;
      }
      const pageMatch = relLower.match(
        /^content\/media\/([^/]+)\/content\/pages\/page_\\d+\/scale[1-4]\\.(png|jpe?g|webp)$/
      );
      if (pageMatch) {
        pagePackages.set(pageMatch[1], true);
        return;
      }
      if (relLower.startsWith("content/media/kv/") && relLower.endsWith(".pdf")) {
        const range = parseKvPageRange(relLower);
        if (range) {
          kvRanges.push({
            path: rel,
            start: range.start,
            end: range.end,
            title: formatKvTitle(range.start, range.end),
          });
        }
      }
    };

    if (state.fileMapLower.size) {
      for (const [lowerKey, actualKey] of state.fileMapLower.entries()) {
        scanEntry(lowerKey, actualKey);
      }
    }
    if (!pagePackages.size && !kvRanges.length && state.fileEntries.length) {
      for (const entry of state.fileEntries) {
        scanEntry(entry.lower || entry.path.toLowerCase(), entry.path);
      }
    }

    if (!pagePackages.size && !kvRanges.length) {
      return { pagePackages: [], packageTitles: new Map(), kvRanges };
    }

    const packageList = Array.from(pagePackages.keys()).sort((a, b) =>
      a.localeCompare(b, "de")
    );
    const packageTitles = new Map();
    for (const pkg of packageList) {
      packageTitles.set(pkg, formatStructuredPackageName(pkg));
    }

    kvRanges.sort((a, b) => a.start - b.start || a.end - b.end);
    return { pagePackages: packageList, packageTitles, kvRanges };
  }

  function formatStructuredPackageName(pkg) {
    const map = {
      ah: "Arbeitsheft",
      loe: "Lösungen",
      servb: "Serviceband",
      kv: "Kopiervorlagen",
      ueb: "Übungen",
      "ah_loes": "Arbeitsheft Lösungen",
    };
    return map[pkg] || pkg;
  }

  function parseKvPageRange(value) {
    const name = String(value || "").split("/").pop() || "";
    const base = name.replace(/\\.pdf$/i, "");
    const match = base.match(/_(\\d{1,4})(?:_(\\d{1,4}))?$/);
    if (!match) {
      return null;
    }
    const start = parseInt(match[1], 10);
    const end = parseInt(match[2] || match[1], 10);
    if (!Number.isFinite(start) || !Number.isFinite(end)) {
      return null;
    }
    return { start, end };
  }

  function formatKvTitle(start, end) {
    if (start === end) {
      return `${formatStructuredPackageName("kv")} S. ${start}`;
    }
    return `${formatStructuredPackageName("kv")} S. ${start}–${end}`;
  }

  function hasFileAtPath(relativePath, options = {}) {
    const fullPath = resolvePath(relativePath);
    if (state.fileMap.size) {
      if (getFileFromMap(fullPath, options)) {
        return true;
      }
    }
    return Boolean(getFileFromEntries(fullPath, options));
  }

  function getPagePath(page) {
    if (state.bookFormat === "structured") {
      return getResourceUrl(getStructuredPageImagePath(page));
    }
    return getResourceUrl(`pages/${page}.jpg`);
  }

  function getPreviewPath(page) {
    if (state.bookFormat === "structured") {
      return getPagePath(page);
    }
    return getResourceUrl(`pages/${page}_preview.jpg`);
  }

  function getPageOffset() {
    return Number((state.book && state.book.pageOffset) || 0);
  }

  function fileToBookPage(filePage) {
    return filePage - getPageOffset();
  }

  function bookToFilePage(bookPage) {
    return bookPage + getPageOffset();
  }

  function getBookPageCount() {
    return Math.max(0, state.pageCount - getPageOffset());
  }

  function getZeroBasedArabicStart() {
    if (Number.isFinite(state.zeroBasedArabicStart) && state.zeroBasedArabicStart >= 1) {
      return Math.round(state.zeroBasedArabicStart);
    }
    const config = getStructuredBookConfigForBasePath(state.basePath);
    if (config && Number.isFinite(config.zeroBasedArabicStart) && config.zeroBasedArabicStart >= 1) {
      return Math.round(config.zeroBasedArabicStart);
    }
    return 4;
  }

  function normalizePageLabelInput(value) {
    return String(value || "")
      .replace(/^\s*(seite|s\.?)\s*/i, "")
      .trim();
  }

  function normalizePageLabel(value) {
    return normalizePageLabelInput(value).toUpperCase();
  }

  function getMaxArabicLabelFromMap(labelMap) {
    if (!labelMap || !labelMap.size) {
      return null;
    }
    let maxValue = null;
    labelMap.forEach((label) => {
      const normalized = normalizePageLabel(label);
      if (!normalized || !REGEX.numeric.test(normalized)) {
        return;
      }
      const value = parseInt(normalized, 10);
      if (!Number.isFinite(value)) {
        return;
      }
      if (maxValue === null || value > maxValue) {
        maxValue = value;
      }
    });
    return maxValue;
  }

  function normalizeAllCapsDisplay(text) {
    const raw = String(text || "").trim();
    if (!raw) {
      return raw;
    }
    const letters = raw.match(/[A-Za-zÄÖÜäöüß]/g);
    if (!letters || !letters.length) {
      return raw;
    }
    const allUpper = letters.every((ch) => ch === ch.toUpperCase());
    if (!allUpper) {
      return raw;
    }
    const lowered = raw.toLowerCase();
    return lowered.charAt(0).toUpperCase() + lowered.slice(1);
  }

  function getPageLabelForPage(filePage) {
    const pageNumber = Number(filePage);
    if (!Number.isFinite(pageNumber)) {
      return "";
    }
    if (state.pageLabels && state.pageLabels.size) {
      if (state.pageLabels.has(pageNumber)) {
        return state.pageLabels.get(pageNumber);
      }
      return "";
    }
    if (isZeroBased()) {
      const arabicStart = getZeroBasedArabicStart();
      if (pageNumber < arabicStart) {
        return toRoman(pageNumber + 1).toLowerCase();
      }
      const arabicLabel = pageNumber - arabicStart + 1;
      return String(arabicLabel);
    }
    const offset = getPageOffset();
    if (pageNumber <= offset) {
      const roman = toRoman(pageNumber);
      return roman ? roman.toLowerCase() : "";
    }
    const bookPage = fileToBookPage(pageNumber);
    if (bookPage >= 1) {
      return String(bookPage);
    }
    return "";
  }

  function getPageFromLabelInput(value) {
    if (!state.pageLabelLookup || !state.pageLabelLookup.size) {
      return null;
    }
    const normalized = normalizePageLabel(value);
    if (!normalized) {
      return null;
    }
    if (state.pageLabelLookup.has(normalized)) {
      return state.pageLabelLookup.get(normalized);
    }
    return null;
  }

  function getDisplayPageCountLabel(total) {
    if (!total) {
      return total;
    }
    if (state.bookFormat === "structured" && state.pageLabels && state.pageLabels.size) {
      const maxArabic = getMaxArabicLabelFromMap(state.pageLabels);
      if (Number.isFinite(maxArabic) && maxArabic > 0) {
        return String(maxArabic);
      }
    }
    const lastLabel = getPageLabelForPage(getLastPageNumber());
    if (lastLabel) {
      return lastLabel;
    }
    return total;
  }

  function getDisplayInputValue(pages) {
    for (const page of pages) {
      if (page !== null && page !== undefined) {
        return getPageLabelForPage(page);
      }
    }
    return "";
  }

  function formatPageLabel(filePage) {
    const label = getPageLabelForPage(filePage);
    if (!label) {
      return "Vorseite";
    }
    return `Seite ${label}`;
  }

  function parseBookPageInput(value) {
    const raw = normalizePageLabelInput(value);
    if (!raw) {
      return null;
    }

    const labelMatch = getPageFromLabelInput(raw);
    if (labelMatch !== null && labelMatch !== undefined) {
      return labelMatch;
    }

    if (isZeroBased()) {
      if (REGEX.roman.test(raw)) {
        const romanValue = romanToInt(raw);
        if (!romanValue) {
          return null;
        }
        const arabicStart = getZeroBasedArabicStart();
        const requested = Math.min(romanValue - 1, Math.max(0, arabicStart - 1));
        const min = getFirstPage();
        const max = getLastPageNumber();
        const normalized = Math.max(min, Math.min(requested, max));
        return normalized;
      }
      if (REGEX.numeric.test(raw)) {
        const requested = parseInt(raw, 10);
        const arabicStart = getZeroBasedArabicStart();
        const target = arabicStart + Math.max(1, requested) - 1;
        const min = getFirstPage();
        const max = getLastPageNumber();
        const normalized = Math.max(min, Math.min(target, max));
        return normalized;
      }
      return null;
    }

    if (REGEX.roman.test(raw)) {
      const romanValue = romanToInt(raw);
      if (!romanValue) {
        return null;
      }
      const offset = getPageOffset();
      if (romanValue >= 1 && romanValue <= offset) {
        return romanValue;
      }
      return null;
    }

    if (REGEX.numeric.test(raw)) {
      const bookPage = parseInt(raw, 10);
      const max = getBookPageCount();
      if (!max) {
        return null;
      }
      const normalized = Math.max(1, Math.min(bookPage, max));
      return bookToFilePage(normalized);
    }

    return null;
  }

  function romanToInt(value) {
    const map = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
    let total = 0;
    let prev = 0;
    const chars = value.toUpperCase().split("");
    for (let i = chars.length - 1; i >= 0; i -= 1) {
      const current = map[chars[i]] || 0;
      if (current < prev) {
        total -= current;
      } else {
        total += current;
        prev = current;
      }
    }
    return total || null;
  }

  function toRoman(num) {
    const pairs = [
      [1000, "M"],
      [900, "CM"],
      [500, "D"],
      [400, "CD"],
      [100, "C"],
      [90, "XC"],
      [50, "L"],
      [40, "XL"],
      [10, "X"],
      [9, "IX"],
      [5, "V"],
      [4, "IV"],
      [1, "I"],
    ];
    let value = num;
    let result = "";
    pairs.forEach(([arabic, roman]) => {
      while (value >= arabic) {
        result += roman;
        value -= arabic;
      }
    });
    return result || "";
  }

  function goToBookPage(bookPage, options = {}) {
    if (!state.pageCount) {
      return;
    }
    const max = isZeroBased() ? getLastPageNumber() : getBookPageCount();
    const min = isZeroBased() ? getFirstPage() : 1;
    const normalizedBook = Math.max(min, Math.min(bookPage, max));
    const filePage = bookToFilePage(normalizedBook);
    goToPage(filePage, options);
  }

  function goPrev() {
    if (state.viewMode === "single") {
      goToPage(state.currentPage - 1);
      return;
    }

    const first = getFirstPage();
    if (state.book.firstPageIsCover && state.currentPage === first + 1) {
      goToPage(first);
      return;
    }

    goToPage(state.currentPage - 2);
  }

  function goNext() {
    if (state.viewMode === "single") {
      goToPage(state.currentPage + 1);
      return;
    }

    const first = getFirstPage();
    if (state.book.firstPageIsCover && state.currentPage === first) {
      goToPage(first + 1);
      return;
    }
