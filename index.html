    goToPage(state.currentPage + 2);
  }

  function getLastPage() {
    const first = getFirstPage();
    const count = Math.max(0, Number(state.pageCount) || 0);
    if (!count) {
      return first;
    }
    if (state.viewMode === "single") {
      return first + count - 1;
    }
    let lastIndex = count - 1;
    if (state.book.firstPageIsCover) {
      if (lastIndex % 2 === 0) {
        lastIndex -= 1;
      }
    } else if (lastIndex % 2 === 1) {
      lastIndex -= 1;
    }
    return first + Math.max(0, lastIndex);
  }

  function toggleViewMode() {
    state.viewMode = state.viewMode === "spread" ? "single" : "spread";
    updateViewModeLabel();
    state.currentPage = normalizePage(state.currentPage);
    renderPages();
    state.fitMode = "fit-page";
    applyFitIfNeeded();
  }

  function updateViewModeLabel() {
    if (!els.toggleMode) {
      return;
    }
    const isSpread = state.viewMode === "spread";
    const showSingle = isSpread;
    const theme = state.theme === "dark" ? "dark" : "light";
    const icon = showSingle ? VIEW_ICONS.single[theme] : VIEW_ICONS.spread[theme];
    els.toggleMode.innerHTML = `<span class="icon-tile" aria-hidden="true">${icon}</span>`;
    els.toggleMode.setAttribute(
      "aria-label",
      showSingle ? "Zu Einzelseitenansicht wechseln" : "Zu Doppelseitenansicht wechseln"
    );
    els.toggleMode.title = showSingle ? "Zu Einzelseitenansicht wechseln" : "Zu Doppelseitenansicht wechseln";
  }

  function adjustZoom(delta) {
    state.fitMode = null;
    const next = clamp(state.zoom + delta, 0.2, 4);
    state.zoom = next;
    applyZoom();
  }

  function normalizeWheelDeltaY(event) {
    const raw = Number(event && event.deltaY);
    if (!Number.isFinite(raw) || raw === 0) {
      return 0;
    }
    if (event.deltaMode === 1) {
      return raw * 16;
    }
    if (event.deltaMode === 2) {
      const pageHeight = (els.viewer && els.viewer.clientHeight) || window.innerHeight || 800;
      return raw * pageHeight;
    }
    return raw;
  }

  function getWheelZoomDelta(event) {
    const normalized = normalizeWheelDeltaY(event);
    if (!normalized) {
      return 0;
    }
    const magnitude = Math.abs(normalized);
    const isTrackpadLike = event.deltaMode === 0 && magnitude < 120;
    if (isTrackpadLike || event.ctrlKey) {
      const maxStep = event.shiftKey ? 0.04 : 0.025;
      const step = clamp(magnitude * 0.00045, 0.0008, maxStep);
      return normalized > 0 ? -step : step;
    }
    const maxStep = event.shiftKey ? 0.16 : 0.1;
    const step = clamp(magnitude * 0.0014, 0.03, maxStep);
    return normalized > 0 ? -step : step;
  }

  function getZoomAnchorElement(clientX, clientY) {
    const candidates = [els.pageLeft, els.pageRight].filter(
      (el) => el && !el.classList.contains("hidden")
    );
    for (const el of candidates) {
      const rect = el.getBoundingClientRect();
      if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
        return el;
      }
    }
    return els.pageSpread;
  }

  function zoomAtPoint(delta, clientX, clientY) {
    state.fitMode = null;
    const oldZoom = state.zoom;
    const next = clamp(oldZoom + delta, 0.2, 4);
    if (next === oldZoom) {
      return;
    }

    const viewerRect = els.viewer.getBoundingClientRect();
    const pointerX = clientX - viewerRect.left;
    const pointerY = clientY - viewerRect.top;

    const anchorElement = getZoomAnchorElement(clientX, clientY);
    const anchorRect = anchorElement.getBoundingClientRect();
    const anchorLeftInScroll = els.viewer.scrollLeft + (anchorRect.left - viewerRect.left);
    const anchorTopInScroll = els.viewer.scrollTop + (anchorRect.top - viewerRect.top);

    let anchorX = pointerX + els.viewer.scrollLeft - anchorLeftInScroll;
    let anchorY = pointerY + els.viewer.scrollTop - anchorTopInScroll;
    anchorX = clamp(anchorX, 0, anchorRect.width || 0);
    anchorY = clamp(anchorY, 0, anchorRect.height || 0);
    const scale = next / oldZoom;

    state.zoom = next;
    applyZoom();

    window.requestAnimationFrame(() => {
      const updatedAnchorRect = anchorElement.getBoundingClientRect();
      const newAnchorLeftInScroll =
        els.viewer.scrollLeft + (updatedAnchorRect.left - viewerRect.left);
      const newAnchorTopInScroll =
        els.viewer.scrollTop + (updatedAnchorRect.top - viewerRect.top);

      const targetLeft = newAnchorLeftInScroll + anchorX * scale - pointerX;
      const targetTop = newAnchorTopInScroll + anchorY * scale - pointerY;

      els.viewer.scrollLeft = Math.max(0, targetLeft);
      els.viewer.scrollTop = Math.max(0, targetTop);
    });
  }

  function setFitMode(mode) {
    state.fitMode = mode;
    applyFitIfNeeded();
  }

  function applyFitIfNeeded() {
    if (state.fitMode === "fit-width") {
      applyFitWidth();
    } else if (state.fitMode === "fit-page") {
      applyFitPage();
    } else {
      applyZoom();
    }
  }

  function applyFitWidth() {
    const zoom = computeFitWidthZoom();
    if (!zoom) {
      return;
    }
    state.zoom = clamp(zoom, 0.2, 4);
    applyZoom();
  }

  function applyFitPage() {
    const zoom = computeFitPageZoom();
    if (!zoom) {
      return;
    }
    state.zoom = clamp(zoom, 0.2, 4);
    applyZoom();
    if (els.viewer) {
      els.viewer.scrollLeft = 0;
      els.viewer.scrollTop = 0;
    }
    updateGrabCursor();
  }

  function computeFitWidthZoom() {
    const entries = getVisiblePageLayoutEntries();
    if (!entries.length) {
      return null;
    }
    const totalNaturalWidth = entries.reduce((sum, entry) => sum + entry.naturalWidth, 0);
    if (!totalNaturalWidth) {
      return null;
    }

    const available = getAvailableWidth();
    const gap = entries.length > 1 ? getSpreadGap() : 0;
    const totalHorizontalExtras = entries.reduce(
      (sum, entry) => sum + getHorizontalBoxExtras(entry.container),
      0
    );
    const targetWidth = available - gap - totalHorizontalExtras;
    if (targetWidth <= 0) {
      return null;
    }
    return targetWidth / totalNaturalWidth;
  }

  function computeFitPageZoom() {
    const entries = getVisiblePageLayoutEntries();
    if (!entries.length) {
      return null;
    }
    const totalNaturalWidth = entries.reduce((sum, entry) => sum + entry.naturalWidth, 0);
    const maxNaturalHeight = entries.reduce(
      (max, entry) => Math.max(max, entry.naturalHeight),
      0
    );
    if (!totalNaturalWidth || !maxNaturalHeight) {
      return null;
    }

    const availableWidth = getAvailableWidth();
    const availableHeight = getAvailableHeight();
    const gap = entries.length > 1 ? getSpreadGap() : 0;
    const totalHorizontalExtras = entries.reduce(
      (sum, entry) => sum + getHorizontalBoxExtras(entry.container),
      0
    );
    const maxVerticalExtras = entries.reduce(
      (max, entry) => Math.max(max, getVerticalBoxExtras(entry.container)),
      0
    );
    const targetWidth = availableWidth - gap - totalHorizontalExtras;
    const targetHeight = availableHeight - maxVerticalExtras;
    if (targetWidth <= 0 || targetHeight <= 0) {
      return null;
    }
    const fitWidthZoom = targetWidth / totalNaturalWidth;
    const fitHeightZoom = targetHeight / maxNaturalHeight;
    return Math.min(fitWidthZoom, fitHeightZoom);
  }

  function getVisiblePageLayoutEntries() {
    const candidates = [
      { container: els.pageLeft, img: els.pageLeftImg },
      { container: els.pageRight, img: els.pageRightImg },
    ];
    return candidates
      .filter(({ container, img }) => {
        if (!container || container.classList.contains("hidden")) {
          return false;
        }
        if (!img || !img.src || !img.getAttribute("src")) {
          return false;
        }
        const naturalWidth = Number(img.dataset.naturalWidth || img.naturalWidth || 0);
        const naturalHeight = Number(img.dataset.naturalHeight || img.naturalHeight || 0);
        return naturalWidth > 0 && naturalHeight > 0;
      })
      .map(({ container, img }) => ({
        container,
        naturalWidth: Number(img.dataset.naturalWidth || img.naturalWidth || 0),
        naturalHeight: Number(img.dataset.naturalHeight || img.naturalHeight || 0),
      }));
  }

  function getHorizontalBoxExtras(container) {
    if (!container) {
      return 0;
    }
    const style = getComputedStyle(container);
    return (
      (parseFloat(style.paddingLeft) || 0) +
      (parseFloat(style.paddingRight) || 0) +
      (parseFloat(style.borderLeftWidth) || 0) +
      (parseFloat(style.borderRightWidth) || 0)
    );
  }

  function getVerticalBoxExtras(container) {
    if (!container) {
      return 0;
    }
    const style = getComputedStyle(container);
    return (
      (parseFloat(style.paddingTop) || 0) +
      (parseFloat(style.paddingBottom) || 0) +
      (parseFloat(style.borderTopWidth) || 0) +
      (parseFloat(style.borderBottomWidth) || 0)
    );
  }

  function getPrimaryImage() {
    return els.pageLeftImg || null;
  }

  function cacheNaturalSize(img) {
    if (img.naturalWidth && img.naturalHeight) {
      img.dataset.naturalWidth = String(img.naturalWidth);
      img.dataset.naturalHeight = String(img.naturalHeight);
    }
  }

  function applyZoom() {
    [els.pageLeftImg, els.pageRightImg].forEach((img) => {
      if (!img || !img.src) {
        return;
      }
      if (!img.getAttribute("src")) {
        return;
      }
      const naturalWidth = Number(img.dataset.naturalWidth || img.naturalWidth || 0);
      const naturalHeight = Number(img.dataset.naturalHeight || img.naturalHeight || 0);
      if (!naturalWidth) {
        return;
      }
      img.style.width = `${naturalWidth * state.zoom}px`;
      if (naturalHeight) {
        img.style.height = `${naturalHeight * state.zoom}px`;
      }
    });

    if (els.zoomLabel) {
      els.zoomLabel.textContent = `${Math.round(state.zoom * 100)}%`;
    }
    if (state.copyMode) {
      updateTextOverlays(getVisiblePages());
    }
    updateGrabCursor();
    updateSpreadAlignment();
  }

  function getAvailableWidth() {
    const style = getComputedStyle(els.pageSpread);
    const paddingLeft = parseFloat(style.paddingLeft) || 0;
    const paddingRight = parseFloat(style.paddingRight) || 0;
    return els.pageSpread.clientWidth - paddingLeft - paddingRight;
  }

  function getAvailableHeight() {
    const style = getComputedStyle(els.pageSpread);
    const paddingTop = parseFloat(style.paddingTop) || 0;
    const paddingBottom = parseFloat(style.paddingBottom) || 0;
    return els.viewer.clientHeight - paddingTop - paddingBottom;
  }

  function getSpreadGap() {
    const style = getComputedStyle(els.pageSpread);
    return parseFloat(style.gap || style.columnGap || "0") || 0;
  }

  function updateSpreadAlignment() {
    if (!els.pageSpread || !els.viewer) {
      return;
    }
    if (!els.pageLeftImg || !els.pageLeftImg.src) {
      els.pageSpread.classList.remove("align-left");
      return;
    }
    const rightVisible =
      els.pageRight &&
      !els.pageRight.classList.contains("hidden") &&
      els.pageRightImg &&
      els.pageRightImg.src;
    const leftWidth = els.pageLeftImg.clientWidth || 0;
    const rightWidth = rightVisible ? els.pageRightImg.clientWidth || 0 : 0;
    const gap = rightVisible ? getSpreadGap() : 0;
    const style = getComputedStyle(els.pageSpread);
    const paddingLeft = parseFloat(style.paddingLeft) || 0;
    const paddingRight = parseFloat(style.paddingRight) || 0;
    const contentWidth = leftWidth + rightWidth + gap + paddingLeft + paddingRight;
    const needsAlignLeft = contentWidth > els.viewer.clientWidth + 1;
    els.pageSpread.classList.toggle("align-left", needsAlignLeft);
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function showCopyToast(container, x, y, message) {
    if (!container) {
      return;
    }
    const toast = document.createElement("div");
    toast.className = "copy-toast";
    toast.textContent = message;
    toast.style.left = `${x}px`;
    toast.style.top = `${y}px`;
    container.appendChild(toast);

    requestAnimationFrame(() => {
      toast.classList.add("show");
    });

    const visibleMs = 700;
    const removeMs = 1200;
    setTimeout(() => {
      toast.classList.remove("show");
    }, visibleMs);
    setTimeout(() => {
      toast.remove();
    }, removeMs);
  }

  function setStatus(message, isError) {
    state.pageInputError = false;
    els.status.hidden = false;
    els.status.textContent = message;
    els.status.style.color = isError ? "#c0392b" : "var(--text)";
  }

  function hideStatus() {
    els.status.hidden = true;
    state.pageInputError = false;
  }
})();
</script>
<script>
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", async () => {
    let hasReloadedAfterUpdate = false;
    let promptedWaitingWorker = null;
    const settingsVersion = document.getElementById("settings-version");

    const setVersionLabel = (version) => {
      if (!settingsVersion) {
        return;
      }
      if (Number.isFinite(version)) {
        settingsVersion.textContent = `Version ${version}`;
      }
    };

    const requestWorkerVersion = (worker) =>
      new Promise((resolve) => {
        if (!worker) {
          resolve(null);
          return;
        }
        const channel = new MessageChannel();
        channel.port1.onmessage = (event) => {
          const version = event.data && Number(event.data.version);
          resolve(Number.isFinite(version) ? version : null);
        };
        worker.postMessage({ type: "GET_VERSION" }, [channel.port2]);
      });

    const syncVersionLabel = async (registration) => {
      const worker =
        registration.active ||
        registration.waiting ||
        registration.installing ||
        navigator.serviceWorker.controller;
      const version = await requestWorkerVersion(worker);
      setVersionLabel(version);
    };

    const maybePromptForUpdate = (registration) => {
      const waitingWorker = registration.waiting;
      if (!waitingWorker) {
        return;
      }
      if (promptedWaitingWorker === waitingWorker) {
        return;
      }
      promptedWaitingWorker = waitingWorker;
      const confirmed = window.confirm("Neue Version verfügbar – App neu starten");
      if (confirmed) {
        waitingWorker.postMessage({ type: "SKIP_WAITING" });
      }
    };

    try {
      const registration = await navigator.serviceWorker.register("./service-worker.js", {
        scope: "./",
        updateViaCache: "none"
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (hasReloadedAfterUpdate) {
          return;
        }
        hasReloadedAfterUpdate = true;
        window.location.reload();
      });

      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;
        if (!newWorker) {
          return;
        }
        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            syncVersionLabel(registration);
            maybePromptForUpdate(registration);
          }
        });
      });

      await registration.update();
      await syncVersionLabel(registration);
      maybePromptForUpdate(registration);
    } catch (error) {
      console.error("Service Worker konnte nicht registriert werden:", error);
    }
  });
}
</script>
