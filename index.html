<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lehrbücher</title>
  <meta name="description" content="Lehrbücher" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lehrbücher" />
  <meta name="application-name" content="Lehrbücher" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512x512.png" />
  <link rel="shortcut icon" href="icon-32x32.png" />
  <style>
:root {
  --sidebar-width: 320px;
  --toolbar-bg: #ffffff;
  --border: #d9d9d9;
  --text: #1a1a1a;
  --muted: #6a6a6a;
  --shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
  --gap: 16px;
  --material-gap: 6px;
  --bg: #f5f5f5;
  --panel-bg: #ffffff;
  --surface: #fafafa;
  --surface-strong: #f0f0f0;
  --overlay: rgba(0, 0, 0, 0.35);
  --modal-bg: #ffffff;
  --button-hover: #f0f0f0;
  --active-bg: #e8f1ff;
  --icon-stroke: #1a1a1a;
  --cursor-turn-left: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><path d='M28.5 9 L13.5 24 L28.5 39' stroke='%23000' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><path d='M28.5 9 L13.5 24 L28.5 39' stroke='%23fff' stroke-width='5.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") 24 24, w-resize;
  --cursor-turn-right: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><path d='M19.5 9 L34.5 24 L19.5 39' stroke='%23000' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><path d='M19.5 9 L34.5 24 L19.5 39' stroke='%23fff' stroke-width='5.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") 24 24, e-resize;
}

body.theme-dark {
  --toolbar-bg: #1f1f1f;
  --border: #3a3a3a;
  --text: #f1f1f1;
  --muted: #b5b5b5;
  --shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
  --bg: #121212;
  --panel-bg: #1a1a1a;
  --surface: #232323;
  --surface-strong: #2a2a2a;
  --overlay: rgba(0, 0, 0, 0.6);
  --modal-bg: #1f1f1f;
  --button-hover: #2a2a2a;
  --active-bg: #233042;
  --icon-stroke: #f1f1f1;
  --cursor-turn-left: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><path d='M28.5 9 L13.5 24 L28.5 39' stroke='%23000' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><path d='M28.5 9 L13.5 24 L28.5 39' stroke='%23fff' stroke-width='5.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") 24 24, w-resize;
  --cursor-turn-right: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><path d='M19.5 9 L34.5 24 L19.5 39' stroke='%23000' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><path d='M19.5 9 L34.5 24 L19.5 39' stroke='%23fff' stroke-width='5.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") 24 24, e-resize;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  font-size: 16px;
}

button {
  color: var(--text);
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap;
  position: relative;
  --nav-offset: 120px;
  --toolbar-button-size: 48px;
  --toolbar-icon-size: 22px;
  --toolbar-nav-icon-size: 24px;
}

.toolbar .title {
  font-weight: 600;
  margin-right: 0;
  min-width: 0;
  width: fit-content;
}

.toolbar .title.clickable {
  cursor: pointer;
  border-radius: 6px;
}

.toolbar .title.clickable:hover {
  background: var(--button-hover);
}

.toolbar .title.clickable:focus-visible {
  outline: 2px solid rgba(0, 120, 212, 0.5);
  outline-offset: 1px;
}

.toolbar .title-group {
  display: flex;
  align-items: center;
  gap: 10px;
}


.toolbar button,
.toolbar input {
  font: inherit;
}

.toolbar button {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0;
  border-radius: 4px;
  cursor: pointer;
  min-height: var(--toolbar-button-size);
  min-width: var(--toolbar-button-size);
  height: var(--toolbar-button-size);
  width: var(--toolbar-button-size);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
}

.toolbar button .view-icon {
  display: inline-block;
  font-size: 1.05rem;
  letter-spacing: 1px;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.toolbar button:hover {
  background: var(--button-hover);
  box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
}

.toolbar button.active {
  background: var(--active-bg);
  border-color: rgba(0, 120, 212, 0.7);
  box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.35);
}

.toolbar button:active {
  transform: translateY(1px);
}

.toolbar button:focus-visible {
  outline: 2px solid rgba(0, 120, 212, 0.5);
  outline-offset: 1px;
}

#toggle-copy:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  background: var(--surface-strong);
  box-shadow: none;
}

#toggle-copy:disabled:hover {
  background: var(--surface-strong);
  box-shadow: none;
}

.icon-button {
  font-size: var(--toolbar-icon-size);
  line-height: 1;
}

.button-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  line-height: 1;
  transform: translateY(-1px);
}

.toolbar .button-icon {
  transform: none;
}

.nav,
.view-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}

.nav {
  position: absolute;
  left: calc(50% + var(--nav-offset));
  transform: translateX(-50%);
  justify-content: center;
}

.view-controls {
  order: 1;
  justify-content: center;
}

.view-controls button {
  padding: 0;
  font-size: 1.15rem;
  min-height: var(--toolbar-button-size);
  min-width: var(--toolbar-button-size);
  height: var(--toolbar-button-size);
  width: var(--toolbar-button-size);
}

.view-controls .view-icon {
  font-size: 1.35rem;
}

#toggle-mode.mode-button {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  min-width: 0;
  padding: 0;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  box-shadow: none;
  height: var(--toolbar-button-size);
  width: var(--toolbar-button-size);
  justify-content: center;
}

#toggle-mode.mode-button:hover {
  background: var(--button-hover);
  box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
}

#toggle-mode.mode-button .icon-tile {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 4px;
  background: transparent;
}

#toggle-mode.mode-button svg {
  width: 28px;
  height: 28px;
  stroke: var(--icon-stroke);
  fill: none;
  stroke-width: 2.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}


.page-input {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

#page-input {
  width: 80px;
  padding: 0 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  height: var(--toolbar-button-size);
  line-height: var(--toolbar-button-size);
  font-size: 1.2rem;
  font-weight: 700;
  text-align: center;
  -moz-appearance: textfield;
  appearance: textfield;
  background: var(--panel-bg);
  color: var(--text);
}

#page-input::-webkit-outer-spin-button,
#page-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.nav button {
  padding: 0;
  font-size: var(--toolbar-nav-icon-size);
  font-weight: 700;
  line-height: 1;
  min-height: var(--toolbar-button-size);
  min-width: var(--toolbar-button-size);
  height: var(--toolbar-button-size);
  width: var(--toolbar-button-size);
}

.nav #toggle-mode {
  margin-left: 16px;
  width: var(--toolbar-button-size);
  height: var(--toolbar-button-size);
  min-width: var(--toolbar-button-size);
  min-height: var(--toolbar-button-size);
  padding: 0;
}

.nav .page-input {
  font-size: 1.15rem;
}

#page-count {
  font-size: 1.15rem;
  font-weight: 700;
}

.zoom-label {
  color: var(--muted);
  font-size: 0.9rem;
  min-width: 48px;
  text-align: right;
}

.content {
  flex: 1;
  display: flex;
  min-height: 0;
  position: relative;
}

.sidebar {
  width: var(--sidebar-width);
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
  z-index: 20;
  color: var(--text);
}

.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.sidebar-tabs button {
  flex: 1;
  border: none;
  border-right: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 12px 12px;
  cursor: pointer;
  font-size: 1rem;
  min-height: 44px;
  transition: background 0.15s ease, box-shadow 0.15s ease;
}

.sidebar-tabs button:last-child {
  border-right: none;
}

.sidebar-tabs button.active {
  background: var(--panel-bg);
  font-weight: 600;
}

.sidebar-tabs button:hover {
  background: var(--button-hover);
  box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
}

.sidebar-panel {
  display: none;
  overflow: auto;
  padding: 12px;
  flex: 1;
}

.sidebar-panel.active {
  display: block;
}

#panel-toc,
#panel-search {
  opacity: 0;
  transform: translateY(6px);
}

#panel-toc.active,
#panel-search.active {
  animation: toc-fade-in 220ms ease-out;
  opacity: 1;
  transform: translateY(0);
}

@keyframes toc-fade-in {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (prefers-reduced-motion: reduce) {
  #panel-toc,
  #panel-search,
  #panel-material {
    opacity: 1;
    transform: none;
  }

  #panel-toc.active,
  #panel-search.active,
  #panel-material.active {
    animation: none;
  }

  .page-container.fade-in img,
  .page-spread.page-transition-next,
  .page-spread.page-transition-prev,
  .page-transition-ghost.page-transition-ghost-active {
    animation: none;
  }
}

.toc-list {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

.toc-list .toc-list {
  margin-left: 14px;
  padding-left: 10px;
  border-left: 2px solid #eee;
}

.toc-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.toc-toggle,
.toc-toggle-spacer {
  flex: 0 0 22px;
  width: 22px;
  height: 22px;
}

.toc-toggle {
  border: none;
  background: none;
  cursor: pointer;
  color: var(--muted);
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, color 0.15s ease;
}

.toc-toggle::before {
  content: "▸";
  font-size: 0.9rem;
  transition: transform 0.15s ease;
}

.toc-branch:not(.collapsed) > .toc-row .toc-toggle::before {
  transform: rotate(90deg);
}

.toc-toggle:hover {
  background: var(--button-hover);
  color: var(--text);
}

.toc-branch.collapsed > .toc-children {
  display: none;
}

.toc-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 8px;
  margin: 2px 0;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 4px;
  font-size: 0.95rem;
  color: var(--text);
  transition: background 0.15s ease, box-shadow 0.15s ease;
}

.toc-row .toc-item {
  width: auto;
  flex: 1;
}

.toc-item:hover {
  background: var(--button-hover);
  box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
}

.thumbnail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
}

.thumbnail {
  border: none;
  padding: 0;
  background: none;
  cursor: pointer;
  transition: transform 0.1s ease;
}

.thumbnail img {
  width: 100%;
  display: block;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--panel-bg);
  transition: box-shadow 0.15s ease;
}

.thumbnail.active img {
  outline: 2px solid #0078d4;
  outline-offset: 1px;
}

.thumbnail:hover img {
  box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.25);
}

.thumbnail span {
  display: block;
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
}

.search-box {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.search-box input {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  height: 40px;
  font-size: 1rem;
  background: var(--panel-bg);
  color: var(--text);
}

.search-results {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.search-info {
  font-size: 0.85rem;
  color: var(--muted);
}

.material-info {
  font-size: 0.9rem;
  color: var(--muted);
}


.material-list {
  display: flex;
  flex-direction: column;
  gap: var(--material-gap);
  margin: 0;
  padding: 0;
}

#panel-material {
  flex-direction: column;
  gap: var(--material-gap);
  opacity: 0;
  transform: translateY(6px);
}

#panel-material.active {
  display: flex;
  animation: toc-fade-in 220ms ease-out;
  opacity: 1;
  transform: translateY(0);
}

.material-item {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 6px;
  padding: 8px;
  margin: 0;
  text-decoration: none;
  color: var(--text);
  display: block;
  transition: background 0.15s ease, box-shadow 0.15s ease;
}

.material-item.clickable {
  cursor: pointer;
}

.material-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.material-meta {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 4px;
}

.material-item:hover {
  background: var(--button-hover);
  box-shadow:
    inset 4px 0 0 rgba(0, 120, 212, 0.6),
    0 4px 10px rgba(0, 0, 0, 0.12);
  transform: translateY(-1px);
}

.material-formats {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.material-format {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--panel-bg);
  font-size: 0.75rem;
  font-weight: 600;
  text-decoration: none;
  color: var(--text);
  transition: background 0.15s ease, border-color 0.15s ease;
}

.material-format:hover {
  background: #e9f2ff;
  border-color: rgba(0, 120, 212, 0.5);
}

.search-result {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 6px;
  padding: 8px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.15s ease, box-shadow 0.15s ease;
}

.search-result:hover {
  background: var(--button-hover);
  box-shadow: inset 2px 0 0 rgba(0, 120, 212, 0.35);
}

.search-result .result-page {
  font-weight: 600;
  margin-bottom: 4px;
}

.search-result mark {
  background: #ffe58f;
}

.viewer {
  flex: 1;
  overflow: auto;
  position: relative;
  min-width: 0;
}

.viewer.hide-scrollbar {
  overflow: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.viewer.hide-scrollbar::-webkit-scrollbar {
  width: 0;
  height: 0;
  display: none;
}

body.copy-mode .viewer {
  cursor: crosshair;
}

body.page-turn-no-scroll {
  overflow: hidden;
}

.viewer.can-grab {
  cursor: grab;
}

.viewer.turn-left {
  cursor: var(--cursor-turn-left);
}

.viewer.turn-right {
  cursor: var(--cursor-turn-right);
}

.viewer.grabbing {
  cursor: grabbing;
}

.viewer.swiping {
  cursor: grabbing;
}

.page-spread {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: var(--gap);
  padding: 16px;
  min-height: 100%;
}

.page-spread.align-left {
  justify-content: flex-start;
}

.page-spread.spread-mode {
  gap: 0;
}

.page-container {
  position: relative;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

body.copy-mode .page-container {
  cursor: crosshair;
  touch-action: none;
  user-select: none;
}

body.copy-mode .page-container img {
  -webkit-user-drag: none;
  user-select: none;
}

.text-overlay {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
  z-index: 2;
}

.text-overlay .textLayer {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
  opacity: 0;
}

.selection-rect {
  position: absolute;
  border: 2px solid rgba(0, 120, 212, 0.9);
  background: rgba(0, 120, 212, 0.15);
  z-index: 3;
  pointer-events: none;
}

.copy-toast {
  position: absolute;
  z-index: 4;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(26, 26, 26, 0.9);
  color: #ffffff;
  font-size: 0.75rem;
  font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.98);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.copy-toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.page-spread.spread-mode.dual-page .page-container:first-child {
  border-right: none;
}

.page-spread.spread-mode.dual-page .page-container:last-child {
  border-left: none;
}

.page-spread.spread-mode.dual-page .page-container:last-child::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border);
}

.page-container.hidden {
  display: none;
}

.page-container img {
  display: block;
  width: auto;
  height: auto;
  max-width: none;
}

.page-container.fade-in img {
  animation: page-fade 0.5s ease-out;
}

.page-spread.page-transition-next {
  animation: spread-slide-next 620ms cubic-bezier(0.16, 1, 0.3, 1);
  animation-fill-mode: both;
  will-change: transform, opacity;
  transform-origin: center center;
}

.page-spread.page-transition-prev {
  animation: spread-slide-prev 620ms cubic-bezier(0.16, 1, 0.3, 1);
  animation-fill-mode: both;
  will-change: transform, opacity;
  transform-origin: center center;
}

.page-transition-ghost {
  position: absolute;
  pointer-events: none;
  z-index: 35;
  overflow: hidden;
}

.page-swipe-layer {
  position: absolute;
  pointer-events: none;
  z-index: 36;
  overflow: hidden;
  will-change: transform;
}

.page-swipe-layer::before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 24px;
  pointer-events: none;
}

.page-swipe-layer.page-swipe-next::before {
  left: 0;
  background: linear-gradient(to left, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0));
}

.page-swipe-layer.page-swipe-prev::before {
  right: 0;

    els.zoomLabel = document.getElementById("zoom-label");

    els.sidebarBackdrop = document.getElementById("sidebar-backdrop");

    els.panelSearch = document.getElementById("panel-search");
    els.panelMaterial = document.getElementById("panel-material");
    els.searchInput = document.getElementById("search-input");
    els.searchResults = document.getElementById("search-results");
    els.viewer = document.getElementById("viewer");
    els.pageSpread = document.getElementById("page-spread");
    els.pageLeft = document.getElementById("page-left");
    els.pageRight = document.getElementById("page-right");
    els.pageLeftImg = document.getElementById("page-left-img");
    els.pageRightImg = document.getElementById("page-right-img");
    els.labelLeft = document.getElementById("label-left");
    els.labelRight = document.getElementById("label-right");
    els.status = document.getElementById("status");
    els.startScreen = document.getElementById("start-screen");
    els.startInner = document.querySelector(".start-inner");
    els.bookGrid = document.getElementById("book-grid");
    els.startMessage = document.getElementById("start-message");
    els.folderInput = document.getElementById("folder-input");
    els.folderButton = document.getElementById("folder-button");
    els.settingsButton = document.getElementById("toggle-settings");
    els.settingsButtonStart = document.getElementById("toggle-settings-start");
    els.settingsDialog = document.getElementById("settings-dialog");
    els.settingsBackdrop = document.getElementById("settings-backdrop");
    els.settingsClose = document.getElementById("settings-close");

  function bindEvents() {
    els.toggleSidebar.addEventListener("click", toggleSidebar);
    els.sidebarBackdrop.addEventListener("click", () => setSidebarOpen(false));
    if (els.bookTitle) {
      const activateBookTitle = () => {
        if (!state.book) {
          return;
        }
        returnToBookSelection();
      };
      els.bookTitle.addEventListener("click", activateBookTitle);
      els.bookTitle.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }
        event.preventDefault();
        activateBookTitle();
      });
    }

    els.tabButtons.forEach((button) => {
      button.addEventListener("click", () => switchTab(button.dataset.tab));
    });

    if (els.folderInput) {
      const handler = () => handleFolderSelection();
      els.folderInput.addEventListener("change", handler);
      els.folderInput.addEventListener("input", handler);
      window.addEventListener("focus", () => {
        if (!els.folderInput || !(els.folderInput.files && els.folderInput.files.length)) {
          return;
        }
        const signature = getFileListSignature(els.folderInput.files);
        if (signature && signature !== state.lastSelectionSignature) {
          handleFolderSelection();
        }
      });
    }
    if (els.startScreen) {
      els.startScreen.addEventListener("click", (event) => {
        if (!shouldTriggerStartScreenPicker(event)) {
          return;
        }
        handleFolderPickerClick();
      });
    }
    if (els.settingsButton) {
      els.settingsButton.addEventListener("click", openSettingsDialog);
    }
    if (els.settingsButtonStart) {
      els.settingsButtonStart.addEventListener("click", openSettingsDialog);
    }
    if (els.settingsClose) {
      els.settingsClose.addEventListener("click", closeSettingsDialog);
    }
    if (els.settingsBackdrop) {
      els.settingsBackdrop.addEventListener("click", closeSettingsDialog);
    }
    if (els.resetFolder) {
      els.resetFolder.addEventListener("click", resetFolderSelection);
    }
    if (els.toggleTheme) {
      els.toggleTheme.addEventListener("click", () => {
        const next = state.theme === "dark" ? "light" : "dark";
        setTheme(next);
      });
    }

    if (els.firstPage) {
      els.firstPage.addEventListener("click", () => goToPage(getFirstPage()));
    }
    if (els.lastPage) {
      els.lastPage.addEventListener("click", () => goToPage(getLastPage()));
    }
    els.prevPage.addEventListener("click", goPrev);
    els.nextPage.addEventListener("click", goNext);

    const clearPageInputError = () => {
      if (!state.pageInputError) {
        return;
      }
      hideStatus();
      state.pageInputError = false;
    };

    const handlePageInputSubmit = (options = {}) => {
      const { blurOnSuccess = false } = options;
      const raw = String(els.pageInput.value || "").trim();
      if (!raw) {
        clearPageInputError();
        return false;
      }
      const value = parseBookPageInput(raw);
      if (value === null) {
        setStatus("Ungültige Seiteneingabe.", true);
        state.pageInputError = true;
        return false;
      }
      clearPageInputError();
      goToPage(value);
      if (blurOnSuccess) {
        els.pageInput.blur();
      }
      return true;
    };

    els.pageInput.addEventListener("change", () => {
      handlePageInputSubmit();
    });

    els.pageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        handlePageInputSubmit({ blurOnSuccess: true });
      }
    });

    els.toggleMode.addEventListener("click", toggleViewMode);
    if (els.toggleCopy) {
      els.toggleCopy.addEventListener("click", toggleCopyMode);
    }
    if (els.zoomOut) {
      els.zoomOut.addEventListener("click", () => adjustZoom(-0.1));
    }
    if (els.zoomIn) {
      els.zoomIn.addEventListener("click", () => adjustZoom(0.1));
    }
    if (els.fitWidth) {
      els.fitWidth.addEventListener("click", () => setFitMode("fit-width"));
    }
    if (els.fitPage) {
      els.fitPage.addEventListener("click", () => {
        if (document.body.classList.contains("sidebar-open")) {
          setSidebarOpen(false);
          return;
        }
        setFitMode("fit-page");
      });
    }

    els.searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        runSearch();
      }
    });

    els.searchInput.addEventListener("input", () => {
      runSearch();
    });

    document.addEventListener("keydown", (event) => {
      if (event.target instanceof HTMLInputElement || event.target instanceof HTMLTextAreaElement) {
        return;
      }
      if (
        els.startScreen &&
        !els.startScreen.hidden &&
        (event.key === "Enter" || event.key === " ")
      ) {
        if (!isSettingsDialogOpen() && !(els.bookGrid && els.bookGrid.children.length)) {
          event.preventDefault();
          handleFolderPickerClick();
        }
        return;
      }
      if (event.key === "Escape") {
        if (isSettingsDialogOpen()) {
          event.preventDefault();
          closeSettingsDialog();
          return;
        }
        if (state.copyMode) {
          event.preventDefault();
          setCopyMode(false);
          return;
        }
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        goPrev();
      } else if (event.key === "ArrowRight" || event.key === "PageDown") {
        event.preventDefault();
        goNext();
      } else if (event.key === "Home") {
        event.preventDefault();
        goToPage(1);
      } else if (event.key === "End") {
        event.preventDefault();
        goToPage(getLastPage());
      }
    });

    els.viewer.addEventListener(
      "wheel",
      (event) => {
        const zoomDelta = getWheelZoomDelta(event);
        if (!zoomDelta) {
          return;
        }
        event.preventDefault();
        zoomAtPoint(zoomDelta, event.clientX, event.clientY);
      },
      { passive: false }
    );

    els.viewer.addEventListener("pointerdown", handleGrabStart);
    els.viewer.addEventListener("pointermove", handleGrabMove);
    els.viewer.addEventListener("pointerup", handleGrabEnd);
    els.viewer.addEventListener("pointercancel", handleGrabEnd);
    els.viewer.addEventListener("pointermove", handlePageTurnHover);
    els.viewer.addEventListener("pointerleave", clearPageTurnHover);
    els.viewer.addEventListener("click", () => {
      if (
        document.body.classList.contains("sidebar-open") &&
        window.matchMedia("(max-width: 900px)").matches
      ) {
        setSidebarOpen(false);
      }
    });
    if (els.pageSpread) {
      els.pageSpread.addEventListener("dragstart", (event) => {
        event.preventDefault();
      });
      els.pageSpread.addEventListener("click", handlePageTurnClick);
      els.pageSpread.addEventListener("pointerdown", handlePageSwipeStart);
      els.pageSpread.addEventListener("pointermove", handlePageSwipeMove);
      els.pageSpread.addEventListener("pointerup", handlePageSwipeEnd);
      els.pageSpread.addEventListener("pointercancel", handlePageSwipeCancel);
    }

    window.addEventListener("resize", () => {
      if (state.fitMode === "fit-width") {
        applyFitWidth();
      } else if (state.fitMode === "fit-page") {
        applyFitPage();
      }
      updateBookGridSizing();
      if (
        document.body.classList.contains("sidebar-open") &&
        window.matchMedia("(max-width: 900px)").matches
      ) {
        setSidebarOpen(false);
      }
    });

    els.pageLeftImg.addEventListener("load", () => {
      cacheNaturalSize(els.pageLeftImg);
      applyFitIfNeeded();
      if (state.copyMode) {
        updateTextOverlays(getVisiblePages());
      }
    });

    els.pageRightImg.addEventListener("load", () => {
      cacheNaturalSize(els.pageRightImg);
      applyFitIfNeeded();
      if (state.copyMode) {
        updateTextOverlays(getVisiblePages());
      }
    });

    [els.pageLeft, els.pageRight].forEach((container) => {
      if (!container) {
        return;
      }
      container.addEventListener("pointerdown", (event) =>
        handleSelectionStart(event, container)
      );
    });
  }

  function setInitialSidebarState() {
    const isNarrow = window.matchMedia("(max-width: 900px)").matches;
    setSidebarOpen(!isNarrow);
  }

  function toggleSidebar() {
    setSidebarOpen(!document.body.classList.contains("sidebar-open"));
  }

  function setSidebarOpen(isOpen) {
    document.body.classList.toggle("sidebar-open", isOpen);
    if (state.book) {
      state.fitMode = "fit-page";
      window.requestAnimationFrame(() => applyFitIfNeeded());
    }
  }

  function switchTab(tabId) {
    els.tabButtons.forEach((button) => {
      button.classList.toggle("active", button.dataset.tab === tabId);
    });

    if (els.panelToc) {
      els.panelToc.classList.toggle("active", tabId === "toc");
    }
    if (els.panelSearch) {
      els.panelSearch.classList.toggle("active", tabId === "search");
    }
    if (els.panelMaterial) {
      els.panelMaterial.classList.toggle("active", tabId === "material");
    }
    if (tabId === "material") {
      updateMaterialsForPages(getVisiblePages());
    }
    if (tabId === "thumbs" && els.panelThumbs) {
      buildThumbnails();
    }
  }

  async function loadAndInit() {
    showStartScreen();
    setFolderPickerVisible(false);
    await restoreThemeFromStorage();
    const storedHandle = await getStoredDirectoryHandle();
    if (storedHandle) {
      setFolderButtonLabel("Ordner wählen");
      setStartMessage("Öffne Bücherliste…");
    } else {
      setFolderButtonLabel("Ordner wählen");
    }
    const restored = await tryRestoreDirectoryFromStorage(storedHandle);
    if (!restored) {
      if (storedHandle) {
        setStartMessage(
          "Lehrbuch-Ordner vorhanden. Klicke irgendwo, um Zugriff zu erlauben oder Ordner neu auszuwählen."
        );
      } else {
        setStartMessage("Lehrbuch-Ordner fehlt. Klicke irgendwo, um Ordner auszuwählen.");
      }
      setFolderPickerVisible(true);
    }
  }

  async function loadFromPath() {
    const loadId = ++state.loadRequestId;
    setStatus("Lade Buchdaten …", false);
    try {
      await ensureStructuredTocIndex();
      const data = await loadData(loadId);
      if (!data) {
        hideStatus();
        showStartScreen({ keepGrid: true });
        setStartMessage("Buch konnte nicht geladen werden. Bitte Ordner erneut wählen.");
        return;
      }

      state.book = data.book;
      state.search = data.search;
      state.bookFormat = data.format || "legacy";
      state.pageBase = Number.isFinite(data.pageBase) ? data.pageBase : 1;
      state.structuredIndex = data.structuredIndex || null;
      state.structuredMaterials = null;
      state.pageCount = Number(state.book.pagesCount || state.book.pages || 0);
      state.viewMode = "spread";
      state.fitMode = "fit-page";
      const specialTitle = getSpecialTitleForBasePath(state.basePath);
      if (specialTitle && state.book) {
        state.book.title = specialTitle;
      }
      setToolbarTitle(state.book.title || "");
      document.title = state.book.title || "Lehrbücher";

      const bookCount = getBookPageCount();
      setPageCountText(bookCount);
      setSidebarOpen(true);
      if (state.bookFormat === "structured") {
        scheduleStructuredPageLabelLoad(loadId);
      } else {
      state.pageLabels = null;
      state.pageLabelLookup = null;
      state.zeroBasedArabicStart = null;
    }

      buildToc();
      switchTab("toc");
    if (els.panelThumbs && els.panelThumbs.classList.contains("active")) {
      buildThumbnails();
    }
      updateViewModeLabel();

      hideStatus();
      goToPage(getFirstPage(), { silent: true });
    } catch (error) {
      console.error(error);
      setStatus(`Fehler beim Laden: ${error.message || error}`, true);
    }
  }

  async function loadData(loadId) {
    const legacy = await loadLegacyData(loadId);
    if (legacy) {
      return legacy;
    }
    const structuredData = await loadStructuredData(loadId);
    if (structuredData) {
      return structuredData;
    }
    const structuredApp = await loadStructuredAppData(loadId);
    if (structuredApp) {
      return structuredApp;
    }
    setStatus(
      "Konnte book.json/search.json, data.json oder app.html nicht laden. Ordnerauswahl prüfen.",
      true
    );
    return null;
  }

  async function loadLegacyData(loadId) {
    const book = await fetchJson(resolvePath("book.json")).catch(() => null);
    if (!book) {
      return null;
    }
    const specialTitle = getSpecialTitleForBasePath(state.basePath);
    if (specialTitle) {
      book.title = specialTitle;
    }
    if (book.title) {
      book.title = normalizeBookTitleForBasePath(book.title, state.basePath);
    }
    if (Array.isArray(book.toc) && book.toc.length) {
      book.toc = addInhaltsverzeichnisEntry(book.toc, 1);
    }
    return { book, search: null, format: "legacy", pageBase: 1, structuredIndex: null };
  }

  function runStructuredIndexLoad(loadId, dataPath) {
    const loadIndex = async () => {
      const data = await fetchJson(dataPath).catch(() => null);
      if (state.loadRequestId !== loadId) {
        return;
      }
      if (!data || !Array.isArray(data.pages)) {
        return;
      }
      state.structuredIndex = data;
      const newCount = data.pages.length;
      if (Number.isFinite(newCount) && newCount > 0 && newCount !== state.pageCount) {
        state.pageCount = newCount;
        if (state.book) {
          state.book.pagesCount = newCount;
        }
        setPageCountText(getBookPageCount());
      }
    };
    if (typeof window.requestIdleCallback === "function") {
      window.requestIdleCallback(() => loadIndex(), { timeout: 1500 });
    } else {
      setTimeout(loadIndex, 0);
    }
  }

  function scheduleStructuredIndexLoad(loadId, dataPath) {
    runStructuredIndexLoad(loadId, dataPath);
  }

  function runStructuredPageLabelLoad(loadId) {
    if (state.bookFormat !== "structured") {
      return;
    }
    const loadLabels = async () => {
      let appHtml = getCachedAppHtml();
      if (!appHtml) {
        appHtml = await fetchText(resolvePath("app.html")).catch(() => "");
        cacheAppHtml(appHtml);
      }
      if (state.loadRequestId !== loadId) {
        return;
      }
      const built = buildStructuredPageLabelMapFromAppHtml(appHtml);
      if (!built) {
        return;
      }
      state.pageLabels = built.pageLabels;
      state.pageLabelLookup = built.lookup;
      state.zeroBasedArabicStart = Number.isFinite(built.arabicStart)
        ? built.arabicStart
        : null;
      state.structuredPageLabelShift = Number.isFinite(built.shift) ? built.shift : 0;
      setPageCountText(getBookPageCount());
      if (state.pageCount) {
        renderPages();
        if (els.panelThumbs && els.panelThumbs.classList.contains("active")) {
          buildThumbnails();
        }
      }
    };
    if (typeof window.requestIdleCallback === "function") {
      window.requestIdleCallback(() => loadLabels(), { timeout: 1500 });
    } else {
      setTimeout(loadLabels, 0);
    }
  }

  function scheduleStructuredPageLabelLoad(loadId) {
    runStructuredPageLabelLoad(loadId);
  }

  function queueStructuredIndexLoad(loadId, dataPath) {
    state.structuredIndexLoad = {
      loadId,
      dataPath,
      started: false,
      timeoutId: null,
    };
  }

  function startQueuedStructuredIndexLoad() {
    const pending = state.structuredIndexLoad;
    if (!pending || pending.started) {
      return;
    }
    pending.started = true;
    if (pending.timeoutId) {
      clearTimeout(pending.timeoutId);
      pending.timeoutId = null;
    }
    state.structuredIndexLoad = null;
    scheduleStructuredIndexLoad(pending.loadId, pending.dataPath);
  }

  async function loadStructuredData(loadId) {
    if (!hasFileAtPath("data.json")) {
      return null;
    }
    await ensureStructuredTocIndex();
    const productTitle = normalizeBookTitleForBasePath(
      getSpecialTitleForBasePath(state.basePath) ||
        (await readProduktTitleFromMap(resolvePath("produkt.xml"), state.basePath)) ||
        getBookContainerFromPath(state.basePath || "") ||
        (state.basePath ? state.basePath.split("/").pop() : "Buch"),
      state.basePath
    );
    let pagesCount = getStructuredPageCountFromFileMap(state.basePath);
    if (!pagesCount && state.directoryHandle) {
      const dirHandle = await getDirectoryHandleForBasePath(state.basePath);
      if (dirHandle) {
        pagesCount = await getStructuredPageCountFromDirectoryHandle(dirHandle);
      }
    }
    const dataPath = resolvePath("data.json");
    if (pagesCount > 0) {
      queueStructuredIndexLoad(loadId, dataPath);
      const book = {
        title: productTitle,
        pagesCount,
        pageOffset: 0,
        firstPageIsCover: true,
        toc: null,
      };
      const toc = await getStructuredTocForBasePath(state.basePath);
      if (toc) {
        book.toc = toc;
      }
      return { book, search: null, format: "structured", pageBase: 0, structuredIndex: null };
    }
    const data = await fetchJson(dataPath).catch(() => null);
    if (!data || !Array.isArray(data.pages)) {
      return null;
    }
    const book = {
      title: productTitle,
      pagesCount: data.pages.length,
      pageOffset: 0,
      firstPageIsCover: true,
      toc: null,
    };
    const toc = await getStructuredTocForBasePath(state.basePath);
    if (toc) {
      book.toc = toc;
    }
    return { book, search: null, format: "structured", pageBase: 0, structuredIndex: data };
  }

  async function loadStructuredAppData(loadId) {
    const appPath = resolvePath("app.html");
    const appFile = getFileFromMap(appPath) || getFileFromEntries(appPath);
    if (!appFile) {
      let appHtml = getCachedAppHtml();
      if (!appHtml) {
        appHtml = await fetchText(appPath).catch(() => "");
        cacheAppHtml(appHtml);
      }
      if (!appHtml) {
        return null;
      }
    } else if (appFile.size === 0) {
      return null;
    }
    let pagesCount = getStructuredPageCountFromFileMap(state.basePath);
    if (!pagesCount && state.directoryHandle) {
      const dirHandle = await getDirectoryHandleForBasePath(state.basePath);
      if (dirHandle) {
        pagesCount = await getStructuredPageCountFromDirectoryHandle(dirHandle);
      }
    }
    if (!pagesCount) {
      return null;
    }
    await ensureStructuredTocIndex();
    const productTitle = normalizeBookTitleForBasePath(
      getSpecialTitleForBasePath(state.basePath) ||
        (await readProduktTitleFromMap(resolvePath("produkt.xml"), state.basePath)) ||
        getBookContainerFromPath(state.basePath || "") ||
        (state.basePath ? state.basePath.split("/").pop() : "Buch"),
      state.basePath
    );
    const search = null;
    const book = {
      title: productTitle,
      pagesCount,
      pageOffset: 0,
      firstPageIsCover: true,
      toc: null,
    };
    const toc = await getStructuredTocForBasePath(state.basePath);
    if (toc) {
      book.toc = toc;
    }
    return { book, search, format: "structured", pageBase: 0, structuredIndex: null };
  }

  function showStartScreen(options = {}) {
    if (!els.startScreen) {
      setStatus("Startseite fehlt.", true);
      return;
    }
    els.startScreen.hidden = false;
    hideStatus();
    if (els.bookGrid && !options.keepGrid) {
      els.bookGrid.innerHTML = "";
    }
  }

  function hideStartScreen() {
    if (els.startScreen) {
      els.startScreen.hidden = true;
    }
  }

  function setStartMessage(message) {
    if (els.startMessage) {
      els.startMessage.textContent = message;
    }
  }

  function setToolbarTitle(title) {
    if (!els.bookTitle) {
      return;
    }
    const value = title || "";
    const isClickable = value.trim().length > 0;
    els.bookTitle.textContent = value;
    els.bookTitle.classList.toggle("clickable", isClickable);
    els.bookTitle.tabIndex = isClickable ? 0 : -1;
    if (isClickable) {
      const tooltip = "Zurück zur Buchauswahl";
      els.bookTitle.title = tooltip;
      els.bookTitle.setAttribute("aria-label", tooltip);
      els.bookTitle.setAttribute("aria-disabled", "false");
    } else {
      els.bookTitle.removeAttribute("title");
      els.bookTitle.removeAttribute("aria-label");
      els.bookTitle.setAttribute("aria-disabled", "true");
    }
  }

  function setPageCountText(total) {
    if (!els.pageCount) {
      return;
    }
    const count = Number.isFinite(total) ? total : 0;
    const display = getDisplayPageCountLabel(count);
    els.pageCount.textContent = `/${"\u00a0"}${display}`;
  }

  function resetViewerForLoad() {
    if (els.pageLeft) {
      els.pageLeft.classList.add("hidden");
      removeTextOverlay(els.pageLeft);
    }
    if (els.pageRight) {
      els.pageRight.classList.add("hidden");
      removeTextOverlay(els.pageRight);
    }
    if (els.pageLeftImg) {
      els.pageLeftImg.removeAttribute("src");
      els.pageLeftImg.style.width = "";
      els.pageLeftImg.style.height = "";
      delete els.pageLeftImg.dataset.page;
    }
    if (els.pageRightImg) {
      els.pageRightImg.removeAttribute("src");
      els.pageRightImg.style.width = "";
      els.pageRightImg.style.height = "";
      delete els.pageRightImg.dataset.page;
    }
    if (els.labelLeft) {
      els.labelLeft.textContent = "";
    }
    if (els.labelRight) {
      els.labelRight.textContent = "";
    }
    if (els.pageInput) {
      els.pageInput.value = "";
    }
    if (els.panelToc) {
      els.panelToc.innerHTML = "";
    }
    if (els.searchInput) {
      els.searchInput.value = "";
    }
    if (els.searchResults) {
      els.searchResults.innerHTML = "";
    }
    if (els.panelMaterial) {
      els.panelMaterial.innerHTML = "";
    }
    setPageCountText(0);
  }

  function setFolderPickerVisible(visible) {
    if (!els.folderInput) {
      return;
    }
    if (els.folderButton) {
      els.folderButton.hidden = !visible;
    }
    els.folderInput.hidden = false;
  }

  function setFolderButtonLabel(label) {
    if (els.folderButton) {
      els.folderButton.textContent = label;
      const isAccessLabel = String(label || "").toLowerCase().includes("zugriff");
      els.folderButton.classList.toggle("large", isAccessLabel);
    }
  }

  function shouldTriggerStartScreenPicker(event) {
    if (!els.startScreen || els.startScreen.hidden) {
      return false;
    }
    if (isSettingsDialogOpen()) {
      return false;
    }
    if (els.bookGrid && els.bookGrid.children.length) {
      return false;
    }
    const target = event && event.target instanceof Element ? event.target : null;
    if (!target) {
      return false;
    }
    if (
      target.closest(
        "button, a, input, label, .book-card, #settings-dialog, #settings-backdrop"
      )
    ) {
      return false;
    }

  function openSettingsDb() {
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) {
        resolve(null);
        return;
      }
      const request = indexedDB.open(STORAGE.dbName, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(STORAGE.storeName)) {
          db.createObjectStore(STORAGE.storeName);
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function readSetting(key) {
    const db = await openSettingsDb();
    if (!db) {
      return null;
    }
    return new Promise((resolve) => {
      const tx = db.transaction(STORAGE.storeName, "readonly");
      const store = tx.objectStore(STORAGE.storeName);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result || null);
      request.onerror = () => resolve(null);
      tx.oncomplete = () => db.close();
    });
  }

  async function writeSetting(key, value) {
    const db = await openSettingsDb();
    if (!db) {
      return;
    }
    return new Promise((resolve) => {
      const tx = db.transaction(STORAGE.storeName, "readwrite");
      const store = tx.objectStore(STORAGE.storeName);
      store.put(value, key);
      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        resolve();
      };
    });
  }

  async function deleteSetting(key) {
    const db = await openSettingsDb();
    if (!db) {
      return;
    }
    return new Promise((resolve) => {
      const tx = db.transaction(STORAGE.storeName, "readwrite");
      const store = tx.objectStore(STORAGE.storeName);
      store.delete(key);
      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        resolve();
      };
    });
  }

  async function ensureDirectoryPermission(handle, options = {}) {
    if (!handle) {
      return "denied";
    }
    const { requestIfNeeded = false } = options;
    const mode = { mode: "read" };
    let permission = "prompt";
    try {
      permission = await handle.queryPermission(mode);
    } catch (error) {
      console.error(error);
      return "denied";
    }
    if (permission === "granted") {
      return permission;
    }
    if (!requestIfNeeded || typeof handle.requestPermission !== "function") {
      return permission;
    }
    try {
      permission = await handle.requestPermission(mode);
      return permission;
    } catch (error) {
      if (error && (error.name === "SecurityError" || error.name === "NotAllowedError")) {
        return "prompt";
      }
      console.error(error);
      return "denied";
    }
  }

  async function listFilesFromDirectory(handle, rootFolder) {
    const entries = [];

    const walk = async (dirHandle, segments) => {
      for await (const entry of dirHandle.values()) {
        if (entry.kind === "file") {
          const file = await entry.getFile();
          const path = [rootFolder, ...segments, entry.name].filter(Boolean).join("/");
          entries.push({ path, file });
        } else if (entry.kind === "directory") {
          await walk(entry, segments.concat(entry.name));
        }
      }
    };

    await walk(handle, []);
    return entries;
  }

  async function discoverBooksFromDirectoryHandle(handle) {
    const books = [];
    try {
      for await (const entry of handle.values()) {
        if (!entry || entry.kind !== "directory") {
          continue;
        }
        const bookDir = entry;
        const basePath = [state.rootFolder, bookDir.name].filter(Boolean).join("/");
        const book = await readBookFromDirectoryHandle(bookDir, basePath);
        if (book) {
          books.push(book);
        } else {
          const mediaBook = await readStructuredMediaBooksFromDirectoryHandle(bookDir, basePath);
          if (mediaBook) {
            books.push(mediaBook);
          }
        }
      }
    } catch (error) {
      console.error(error);
    }
    books.sort(compareBookTitles);
    return books;
  }

  async function readBookFromDirectoryHandle(bookDir, basePath) {
    await ensureStructuredTocIndex();
    const legacy = await readLegacyBookFromDirectoryHandle(bookDir, basePath);
    if (legacy) {

    }
    return readStructuredBookFromDirectoryHandle(bookDir, basePath);

  async function readLegacyBookFromDirectoryHandle(bookDir, basePath) {
    const bookJsonHandle = await getFileHandleSafe(bookDir, "book.json");
    if (!bookJsonHandle) {
      return null;
    }
    const specialTitle = getSpecialTitleForBasePath(basePath);
    let title = specialTitle || bookDir.name;
    const bookMeta = await readJsonFromHandle(bookJsonHandle);
    if (bookMeta && bookMeta.title) {
      title = bookMeta.title;
    }
    if (specialTitle) {
      title = specialTitle;
    }
    title = normalizeBookTitleForBasePath(title, basePath);
    const coverUrl = await getCoverUrlForBookDir(bookDir, basePath);
    return {
      basePath,
      folder: bookDir.name,
      title,
      coverUrl,
      format: "legacy",
    };
  }

  async function readStructuredBookFromDirectoryHandle(bookDir, basePath) {
    const dataHandle = await getFileHandleSafe(bookDir, "data.json");
    const appHandle = await getFileHandleSafe(bookDir, "app.html");
    let hasStructuredContent = Boolean(dataHandle || appHandle);
    if (!hasStructuredContent) {
      const contentDir = await getDirectoryHandleSafe(bookDir, "content");
      const pagesDir = await getDirectoryHandleSafe(contentDir, "pages");
      if (pagesDir) {
        try {
          for await (const entry of pagesDir.values()) {
            if (!entry || entry.kind !== "directory") {
              continue;
            }
            if (/^page_\d+$/i.test(entry.name || "")) {
              hasStructuredContent = true;
              break;
            }
          }
        } catch (error) {
          hasStructuredContent = false;
        }
      }
    }
    if (!hasStructuredContent) {
      return null;
    }
    const specialTitle = getSpecialTitleForBasePath(basePath);
    let title = specialTitle || bookDir.name;
    const productHandle = await getFileHandleSafe(bookDir, "produkt.xml");
    if (productHandle) {
      const text = await readTextFromHandle(productHandle);
      const parsed = extractProduktTitle(text, basePath);
      if (parsed) {
        title = parsed;
      }
    }
    if (specialTitle) {
      title = specialTitle;
    }
    title = normalizeBookTitleForBasePath(title, basePath);
    const coverUrl = await getStructuredCoverUrlForBookDir(bookDir, basePath);
    return {
      basePath,
      folder: bookDir.name,
      title,
      coverUrl,
      format: "structured",
    };
  }

  async function getStructuredPageCountFromDirectoryHandle(bookDir) {
    const contentDir = await getDirectoryHandleSafe(bookDir, "content");
    const pagesDir = await getDirectoryHandleSafe(contentDir, "pages");
    if (!pagesDir) {
      return 0;
    }
    let maxPage = -1;
    try {
      for await (const entry of pagesDir.values()) {
        if (!entry || entry.kind !== "directory") {
          continue;
        }
        const match = String(entry.name || "").match(/^page_(\d+)$/);
        if (!match) {
          continue;
        }
        const value = parseInt(match[1], 10);
        if (Number.isFinite(value) && value > maxPage) {
          maxPage = value;
        }
      }
    } catch (error) {
      return 0;
    }
    return maxPage >= 0 ? maxPage + 1 : 0;
  }

  async function getCoverUrlForBookDir(bookDir, basePath) {
    const coverKey = `cover:${basePath}`;
    const cached = state.fileUrlCache.get(coverKey);
    if (cached) {
      return cached;
    }
    try {
      const pagesDir = await bookDir.getDirectoryHandle("pages");
      const preferred = [
        "1_preview.jpg",
        "01_preview.jpg",
        "001_preview.jpg",
        "0001_preview.jpg",
        "1.jpg",
        "01.jpg",
        "001.jpg",
        "0001.jpg",
      ];
      for (const name of preferred) {
        const fileHandle = await getFileHandleSafe(pagesDir, name);
        if (fileHandle) {
          const file = await fileHandle.getFile();
          const url = URL.createObjectURL(file);
          state.fileUrlCache.set(coverKey, url);
          return url;
        }
      }
      for await (const entry of pagesDir.values()) {
        if (!entry || entry.kind !== "file") {
          continue;
        }
        if (!isImageFile(entry.name)) {
          continue;
        }
        const file = await entry.getFile();
        const url = URL.createObjectURL(file);
        state.fileUrlCache.set(coverKey, url);
        return url;
      }
    } catch (error) {
      return "";

    return "";

  async function getStructuredCoverUrlForBookDir(bookDir, basePath) {
    const coverKey = `cover:${basePath}:structured`;

  function getSelectionStats() {
    let bookJson = 0;
    let pageImages = 0;
    let structuredData = 0;
    let structuredApp = 0;
    let structuredPages = 0;
    const entries = state.fileEntries.length
      ? state.fileEntries
      : Array.from(state.fileMap.entries()).map(([path, file]) => ({
          path,
          lower: path.toLowerCase(),
          file,
        }));
    entries.forEach(({ path, lower, file }) => {
      if (lower.endsWith("/book.json")) {
        bookJson += 1;
      }
      if (lower.endsWith("/data.json") && lower.indexOf("/content/media/") === -1) {
        structuredData += 1;
      }
      if (lower.endsWith("/app.html") && lower.indexOf("/content/media/") === -1) {
        structuredApp += 1;
      }
      if (lower.includes("/pages/") && isImageFile(path, file)) {
        pageImages += 1;
      }
      if (
        lower.includes("/content/pages/page_") &&
        isStructuredScaleImagePath(lower) &&
        lower.indexOf("/content/media/") === -1
      ) {
        structuredPages += 1;
      }
    });
    return { bookJson, pageImages, structuredData, structuredApp, structuredPages };
  }

  function getSamplePaths(limit) {
    const samples = [];
    const entries = state.fileEntries.length
      ? state.fileEntries
      : Array.from(state.fileMap.keys()).map((path) => ({ path }));

  function getFileListSignature(fileList) {
    if (!fileList || !fileList.length) {
      return "";
    }
    const first = fileList[0];
    const last = fileList[fileList.length - 1];
    const firstName =
      (first && (first.webkitRelativePath || first.name)) || "";
    const lastName =
      (last && (last.webkitRelativePath || last.name)) || "";
    return `${fileList.length}|${firstName}|${lastName}`;
  }

  function buildFileMapFromSelection(fileList) {
    clearFileCache();
    const files = Array.from(fileList || []);
    let root = "";
    let hasRelative = false;
    const entries = [];

    files.forEach((file) => {
      const relPath = file.webkitRelativePath || file.name;
      const normalized = normalizeFilePath(relPath);
      if (!normalized) {
        return;
      }
      if (file.webkitRelativePath && file.webkitRelativePath.includes("/")) {
        hasRelative = true;
      }
      entries.push({
        path: normalized,
        lower: normalized.toLowerCase(),
        file,
      });
      const lower = normalized.toLowerCase();
      if (
        lower.endsWith("/book.json") ||
        lower.endsWith("/data.json") ||
        lower.endsWith("/app.html") ||
        lower.endsWith("/produkt.xml")
      ) {
        registerFile(normalized, file);
      }
      if (!root) {
        const parts = normalized.split("/");
        root = parts[0] || "";
      }
    });

    state.rootFolder = root;
    state.hasRelativePaths = hasRelative;
    state.fileEntries = entries;
  }

  async function discoverBooksFromFileMap() {
    await ensureStructuredTocIndex();
    const legacyCovers = new Map();
    const structuredCovers = new Map();
    const bookJsonPaths = [];
    const structuredDataPaths = [];
    const structuredAppPaths = [];

    const entries = state.fileEntries.length
      ? state.fileEntries
      : Array.from(state.fileMap.entries()).map(([path, file]) => ({
          path,
          lower: path.toLowerCase(),
          file,
        }));

    entries.forEach(({ path, lower }) => {
      if (lower.endsWith("/book.json")) {
        bookJsonPaths.push(path);
      }
      if (lower.endsWith("/data.json")) {
        if (lower.indexOf("/content/media/") === -1) {
          structuredDataPaths.push(path);
        }
      }
      if (lower.endsWith("/app.html")) {
        if (lower.indexOf("/content/media/") === -1) {
          structuredAppPaths.push(path);
        }
      }
    });

    entries.forEach(({ path, lower, file }) => {
      const pagesIndex = lower.indexOf("/pages/");
      if (pagesIndex !== -1 && isImageFile(path, file)) {
        if (lower.includes("/content/pages/")) {
          return;
        }
        const basePath = path.slice(0, pagesIndex);
        if (!basePath) {
          return;
        }
        const folder = basePath.split("/").pop() || basePath;
        const filename = path.split("/").pop() || "";
        const numberMatch = filename.match(REGEX.digits);
        const pageNum = numberMatch ? parseInt(numberMatch[0], 10) : Number.MAX_SAFE_INTEGER;
        const existing = legacyCovers.get(basePath);
        if (
          !existing ||
          pageNum < existing.pageNum ||
          (pageNum === existing.pageNum && filename.localeCompare(existing.filename, "de") < 0)
        ) {
          legacyCovers.set(basePath, {
            basePath,
            folder,
            coverPath: path,
            pageNum,
            filename,
            file,
          });
        }
      }

      if (
        lower.includes("/content/pages/page_") &&
        isStructuredScaleImagePath(lower) &&
        lower.indexOf("/content/media/") === -1
      ) {
        const markerIndex = lower.indexOf("/content/pages/page_");
        const basePath = path.slice(0, markerIndex);
        if (!basePath) {
          return;
        }
        const folder = basePath.split("/").pop() || basePath;
        const pageMatch = lower.match(/page_(\\d+)/);
        const pageNum = pageMatch ? parseInt(pageMatch[1], 10) : Number.MAX_SAFE_INTEGER;
        const existing = structuredCovers.get(basePath);
        const scaleRank = getStructuredCoverScaleRankFromPath(lower);
        if (
          !existing ||
          pageNum < existing.pageNum ||
          (pageNum === existing.pageNum && scaleRank < existing.scaleRank)
        ) {
          structuredCovers.set(basePath, {
            basePath,
            folder,
            coverPath: path,
            pageNum,
            scaleRank,
            file,
          });
        }
      }

    });

    const legacyBasePaths =
      bookJsonPaths.length > 0
        ? bookJsonPaths.map((path) => path.slice(0, -"/book.json".length))
        : Array.from(legacyCovers.keys());
    const structuredBasePaths = new Set();
    if (structuredDataPaths.length > 0) {
      structuredDataPaths.forEach((path) => {
        structuredBasePaths.add(path.slice(0, -"/data.json".length));
      });
    }
    if (structuredAppPaths.length > 0) {
      structuredAppPaths.forEach((path) => {
        structuredBasePaths.add(path.slice(0, -"/app.html".length));
      });
    }
    Array.from(structuredCovers.keys()).forEach((basePath) => structuredBasePaths.add(basePath));
    // content/media ist immer Material und nie eine Buchseite.

    const books = [];
    legacyBasePaths.forEach((basePath) => {
      const coverEntry = legacyCovers.get(basePath);
      const folder = basePath.split("/").pop() || basePath;
      const coverUrl =
        coverEntry && coverEntry.file
          ? getObjectUrlForFile(`cover:${basePath}:legacy`, coverEntry.file)
          : "";
      books.push({
        basePath,
        folder,
        title: normalizeBookTitleForBasePath(getSpecialTitleForBasePath(basePath) || folder, basePath),
        coverPath: coverEntry ? coverEntry.coverPath : "",
        coverUrl,
        format: "legacy",
      });
    });
    structuredBasePaths.forEach((basePath) => {
      let coverEntry = structuredCovers.get(basePath);
      if (!coverEntry) {
        coverEntry = findStructuredCoverForBasePathFromEntries(basePath) || findStructuredCoverForBasePath(basePath);
      }
      const folder = basePath.split("/").pop() || basePath;
      const coverUrl =
        coverEntry && coverEntry.file
          ? getObjectUrlForFile(`cover:${basePath}:structured`, coverEntry.file)
          : "";
      books.push({
        basePath,
        folder,
        title: normalizeBookTitleForBasePath(getSpecialTitleForBasePath(basePath) || folder, basePath),
        coverPath: coverEntry ? coverEntry.coverPath : "",
        coverUrl,
        format: "structured",
      });
    });

    books.sort(compareBookTitles);
    return books;
  }

  const TITLE_COLLATOR = new Intl.Collator("de", {
    sensitivity: "base",
    numeric: true,
    ignorePunctuation: true,
  });

  function getSortableTitle(book) {
    return String((book && (book.title || book.folder)) || "").trim();
  }

  function compareBookTitles(a, b) {
    return TITLE_COLLATOR.compare(getSortableTitle(a), getSortableTitle(b));
  }

  function sortBooksInPlace(books) {
    if (!Array.isArray(books)) {
      return;

    books.sort(compareBookTitles);

  function renderBookGrid(books) {

  function updateBookGridSizing() {
    if (!els.bookGrid || !els.startInner) {
      return;
    }
    if (!els.bookGrid.children.length) {
      return;
    }
    if (els.startScreen && els.startScreen.hasAttribute("hidden")) {
      return;
    }
    const innerStyles = getComputedStyle(els.startInner);
    const innerPadLeft = parseFloat(innerStyles.paddingLeft) || 0;
    const innerPadRight = parseFloat(innerStyles.paddingRight) || 0;
    const innerPadBottom = parseFloat(innerStyles.paddingBottom) || 0;
    const innerRect = els.startInner.getBoundingClientRect();
    const gridRect = els.bookGrid.getBoundingClientRect();
    const contentWidth = els.startInner.clientWidth - innerPadLeft - innerPadRight;
    const contentBottom =
      innerRect.top + els.startInner.clientHeight - innerPadBottom;
    const safety = 2;
    const availableWidth = Math.max(0, contentWidth - safety);
    const availableHeight = Math.max(0, contentBottom - gridRect.top - safety);
    if (!availableWidth || !availableHeight) {
      return;
    }
    const styles = getComputedStyle(els.bookGrid);
    const gapValue = parseFloat(styles.rowGap || styles.gap) || 16;
    const coverRatio = 4 / 3;
    const sampleCard = els.bookGrid.querySelector(".book-card");
    const sampleCardStyles = sampleCard ? getComputedStyle(sampleCard) : null;
    const cardPaddingX =
      (sampleCardStyles
        ? (parseFloat(sampleCardStyles.paddingLeft) || 0) +
          (parseFloat(sampleCardStyles.paddingRight) || 0) +
          (parseFloat(sampleCardStyles.borderLeftWidth) || 0) +
          (parseFloat(sampleCardStyles.borderRightWidth) || 0)
        : 22);
    const cardPaddingY =
      (sampleCardStyles
        ? (parseFloat(sampleCardStyles.paddingTop) || 0) +
          (parseFloat(sampleCardStyles.paddingBottom) || 0) +
          (parseFloat(sampleCardStyles.borderTopWidth) || 0) +
          (parseFloat(sampleCardStyles.borderBottomWidth) || 0)
        : 22);
    const cardInnerGap =
      (sampleCardStyles
        ? parseFloat(sampleCardStyles.rowGap || sampleCardStyles.gap)
        : 0) || 8;

    function computeMetrics(cardWidth) {
      const titleSize = Math.max(12, Math.min(16, Math.round(cardWidth * 0.11)));
      const titleLines = cardWidth < 120 ? 1 : cardWidth < 160 ? 2 : 3;
      const titleReserve = Math.max(
        24,
        Math.round(titleSize * 1.2 * titleLines)
      );
      const coverWidth = Math.max(0, cardWidth - cardPaddingX);
      const coverHeight = Math.round(coverWidth * coverRatio);
      const cardHeight = coverHeight + titleReserve + cardPaddingY + cardInnerGap;
      return { cardHeight, coverHeight, titleSize, titleReserve, titleLines };
    }

    const count = els.bookGrid.children.length;
    let bestSize = 0;
    let bestCols = 1;

    for (let cols = 1; cols <= count; cols += 1) {
      const rows = Math.ceil(count / cols);
      const cellWidth = (availableWidth - gapValue * (cols - 1)) / cols;
      const cellHeight = (availableHeight - gapValue * (rows - 1)) / rows;

      if (computeMetrics(1).cardHeight > cellHeight) {
        continue;
      }

      let low = 1;
      let high = cellWidth;

      for (let i = 0; i < 24; i += 1) {
        const mid = (low + high) / 2;
        if (computeMetrics(mid).cardHeight <= cellHeight) {
          low = mid;
        } else {
          high = mid;
        }
      }

      const size = low;
      if (size > bestSize) {
        bestSize = size;
        bestCols = cols;
      }
    }

    if (!bestSize) {
      return;
    }

    const maxSize = 190;
    const rows = Math.ceil(count / bestCols);
    const maxByWidth = Math.floor(
      (availableWidth - gapValue * (bestCols - 1)) / bestCols
    );
    let cardSize = Math.max(
      1,
      Math.min(maxSize, Math.floor(bestSize), Math.max(1, maxByWidth))
    );
    let metrics = computeMetrics(cardSize);
    let cardHeight = metrics.cardHeight;
    let gridHeight = rows * cardHeight + gapValue * (rows - 1);
    while (cardSize > 1 && gridHeight > availableHeight) {
      cardSize -= 1;
      metrics = computeMetrics(cardSize);
      cardHeight = metrics.cardHeight;
      gridHeight = rows * cardHeight + gapValue * (rows - 1);
    }
    const titleSize = metrics.titleSize;
    const titleReserve = metrics.titleReserve;
    const titleLines = metrics.titleLines;
    const coverHeight = metrics.coverHeight;

    els.bookGrid.style.gridTemplateColumns = `repeat(${bestCols}, ${cardSize}px)`;
    els.bookGrid.style.gridAutoRows = `${cardHeight}px`;
    els.bookGrid.style.setProperty("--book-card-size", `${cardSize}px`);
    els.bookGrid.style.setProperty("--book-card-height", `${cardHeight}px`);
    els.bookGrid.style.setProperty("--book-cover-height", `${coverHeight}px`);
    els.bookGrid.style.setProperty("--book-title-size", `${titleSize}px`);
    els.bookGrid.style.setProperty("--book-title-reserve", `${titleReserve}px`);
    els.bookGrid.style.setProperty("--book-title-lines", `${titleLines}`);
    requestAnimationFrame(fitBookGridTitles);
  }
  
function fitBookGridTitles() {
  if (!els.bookGrid) {
    return;
  }
  const cards = Array.from(els.bookGrid.querySelectorAll(".book-card"));
  if (!cards.length) {
    return;
  }

  const gridStyles = getComputedStyle(els.bookGrid);
  const cardHeight =
    parseFloat(gridStyles.getPropertyValue("--book-card-height")) ||
    cards[0].getBoundingClientRect().height;

  let titleSize = parseFloat(gridStyles.getPropertyValue("--book-title-size")) || 14;
  const coverHeight =
    parseFloat(gridStyles.getPropertyValue("--book-cover-height")) || 180;

  const cardStyles = getComputedStyle(cards[0]);
  const padY =
    (parseFloat(cardStyles.paddingTop) || 0) +
    (parseFloat(cardStyles.paddingBottom) || 0);
  const borderY =
    (parseFloat(cardStyles.borderTopWidth) || 0) +
    (parseFloat(cardStyles.borderBottomWidth) || 0);
  const gapY = parseFloat(cardStyles.rowGap || cardStyles.gap) || 0;

  const minTitleSize = 9;
  const applyTitleSize = (px) => {
    els.bookGrid.style.setProperty("--book-title-size", `${px}px`);
  };

  const maxTitleHeight = () =>
    Math.max(0, cardHeight - padY - borderY - gapY - coverHeight);

  const allTitlesFit = () => {
    const maxH = maxTitleHeight();
    for (const card of cards) {
      const title = card.querySelector(".book-title");
      if (!title) {
        continue;
      }
      if (title.scrollHeight > maxH + 0.5) {
        return false;
      }
    }
    return true;
  };

  applyTitleSize(titleSize);
  for (let i = 0; i < 48 && !allTitlesFit() && titleSize > minTitleSize; i += 1) {
    titleSize -= 1;
    applyTitleSize(titleSize);
  }

  for (let i = 0; i < 48 && !allTitlesFit() && titleSize > 7; i += 1) {
    titleSize -= 1;
    applyTitleSize(titleSize);
  }
}

  function scheduleBookTitleEnrichment(books) {
    if (!books || !books.length) {
      return;
    }
    if (state.directoryHandle) {
      return;
    }
    if (typeof window.requestIdleCallback === "function") {
      window.requestIdleCallback(
        () => enrichBookTitles(books),
        { timeout: 2000 }
      );
    } else {
      setTimeout(() => enrichBookTitles(books), 0);
    }
  }

  async function enrichBookTitles(books) {
    if (state.directoryHandle) {
      return;
    }
    await ensureStructuredTocIndex();
    let updated = false;
    for (const book of books) {
      const basePath = book.basePath;
      if (!basePath) {
        continue;
      }
      if (state.bookMetaCache.has(basePath)) {
        const cachedTitle = state.bookMetaCache.get(basePath);
        if (cachedTitle) {
          updateBookTitleInGrid(basePath, cachedTitle);
        }
        continue;
      }
      const bookMeta = await readJsonFromMap(`${basePath}/book.json`);
      const specialTitle = getSpecialTitleForBasePath(basePath);
      let title = (bookMeta && bookMeta.title ? bookMeta.title : "") || "";
      if (!title) {
        title = await readProduktTitleFromMap(`${basePath}/produkt.xml`, basePath);
      }
      if (specialTitle) {
        title = specialTitle;
      }
      title = normalizeBookTitleForBasePath(title, basePath);
      state.bookMetaCache.set(basePath, title);
      if (title) {
        updateBookTitleInGrid(basePath, title);
        book.title = title;
        updated = true;
      }
    }
    if (updated) {
      renderBookGrid(books);
    }
  }

  function updateBookTitleInGrid(basePath, title) {
    if (!els.bookGrid || !basePath || !title) {
      return;
    }
    const selector = `.book-title[data-base-path="${cssEscape(basePath)}"]`;
    const node = els.bookGrid.querySelector(selector);
    if (node) {
      node.textContent = title;
    }
  }

  function cssEscape(value) {
    if (window.CSS && typeof window.CSS.escape === "function") {
      return window.CSS.escape(value);
    }
    return String(value || "").replace(/["\\]/g, "\\$&");
  }

  async function selectBook(book) {
    clearPageSwipePreview();
    state.pageSwipe.active = false;
    state.pageSwipe.pointerId = null;
    state.basePath = book.basePath;
    state.pageMediaCache.clear();
    state.pageDataCache.clear();
    state.thumbnails.clear();
    state.structuredMaterials = null;
    state.structuredAppMaterials = null;
    state.structuredAppMaterialsPromise = null;
    state.structuredIndex = null;
    state.structuredIndexLoad = null;
    state.structuredIndexPromise = null;
    state.structuredIndexByOriginal = null;
    state.searchBuildPromise = null;
    state.tocBuildPromise = null;
    state.appHtmlCache = null;
    state.appHtmlCacheBasePath = "";
    state.pageLabels = null;
    state.pageLabelLookup = null;
    state.zeroBasedArabicStart = null;
    state.structuredPageLabelShift = 0;
    state.pageFadePending = true;
    setCopyAvailable(false);
    resetViewerForLoad();
    setToolbarTitle("");
